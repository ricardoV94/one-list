<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  body { font-family: sans-serif; padding: 40px; text-align: center; }
  canvas { border: 1px solid #ccc; margin: 16px; }
  a { display: inline-block; margin: 8px 16px; padding: 10px 20px; background: #7bae7f; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; }
</style>
</head>
<body>
<h2>Download Icons</h2>
<p>Click the links below to download (font must load first - wait a moment)</p>
<div id="canvases"></div>
<div id="links"></div>

<script>
const sizes = [192, 512];

// Wait for font to load
document.fonts.ready.then(() => {
  setTimeout(() => {
    sizes.forEach(size => {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const s = size / 512;

      // Background with rounded rect
      ctx.fillStyle = '#7bae7f';
      const r = 96 * s;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();

      // "1" text
      ctx.fillStyle = '#ffffff';
      ctx.font = `700 ${280 * s}px 'Josefin Sans', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('1', 180 * s, 290 * s);

      // List lines
      const lines = [
        { x: 300, y: 190, w: 100, h: 16, a: 0.5 },
        { x: 300, y: 230, w: 80,  h: 16, a: 0.35 },
        { x: 300, y: 270, w: 90,  h: 16, a: 0.25 },
      ];
      lines.forEach(l => {
        ctx.fillStyle = `rgba(255,255,255,${l.a})`;
        const rx = (l.h / 2) * s;
        const x = l.x * s, y = l.y * s, w = l.w * s, h = l.h * s;
        ctx.beginPath();
        ctx.moveTo(x + rx, y);
        ctx.lineTo(x + w - rx, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + rx);
        ctx.lineTo(x + w, y + h - rx);
        ctx.quadraticCurveTo(x + w, y + h, x + w - rx, y + h);
        ctx.lineTo(x + rx, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - rx);
        ctx.lineTo(x, y + rx);
        ctx.quadraticCurveTo(x, y, x + rx, y);
        ctx.closePath();
        ctx.fill();
      });

      document.getElementById('canvases').appendChild(canvas);

      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = `icon-${size}.png`;
      link.textContent = `Download icon-${size}.png`;
      document.getElementById('links').appendChild(link);
    });
  }, 500);
});
</script>
</body>
</html>

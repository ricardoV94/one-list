<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- interactive-widget=resizes-content: the on-screen keyboard shrinks the
       layout viewport instead of overlaying it, so the sticky toolbar and caret
       scrolling use the visible area (keyboard-aware) on supporting browsers. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <meta name="theme-color" content="#7bae7f">
  <link rel="manifest" href="/manifest.json">
  <!-- App icon: Josefin Sans 700, sage #7bae7f -->
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">

       HTML parsing; otherwise they're only discovered after the classic scripts run. -->

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js">
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js">

  <title>One List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* Kill the mobile tap flash (the grey/blue box on tap) app-wide — every button
       and interactive row has its own :active feedback, so the native highlight is
       just noise (and looked like a stray blue background on some controls). */
    * { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      /* A little extra right padding so the per-paragraph edit handle, which sits ~20px
         into the right gutter, isn't shaved by overflow-x: clip on narrow screens. */
      padding: 16px 24px 16px 20px;
      background: #f5f5f5;
      color: #222;
      /* `clip` (not `hidden`) contains horizontal overflow WITHOUT making body a
         scroll container — `overflow-x: hidden` computes overflow-y to auto, which
         breaks `position: sticky` for the edit toolbar (notably on mobile). */
      overflow-x: clip;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    header h1 { font-size: 1.4rem; flex: 1; }

    .header-icons {
      display: flex;
      gap: 4px;
    }

    .header-icons button {
      padding: 0 10px;
      height: 36px;
      font-size: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icons button.active {
      background: #7bae7f;
      color: #fff;
      border-color: #7bae7f;
    }

    #auth-btn {
      padding: 8px 16px;
      font-size: 0.9rem;
      background: #7bae7f;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #auth-section {
      display: none;
      text-align: center;
      margin-top: 40vh;
    }

    #auth-section button {
      padding: 12px 24px;
      font-size: 1rem;
      background: #7bae7f;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #app { display: none; }
    /* Revealed by showApp() once notes are rendered from the localStorage cache
       (~700ms), independent of Auth — so no blank-until-Auth wait. */

    /* Lightweight bottom snackbar for "queued while still connecting" feedback. */
    .sync-toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 16px; border-radius: 20px;
      font-size: 0.9rem; max-width: 84vw; text-align: center; z-index: 9998;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25); pointer-events: none;
      animation: sync-toast-in 2.4s ease forwards;
    }
    @keyframes sync-toast-in {
      0%   { opacity: 0; transform: translateX(-50%) translateY(8px); }
      8%   { opacity: 1; transform: translateX(-50%) translateY(0); }
      88%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(8px); }
    }
    .dark .sync-toast { background: #e0e0e0; color: #222; }

    #input-area { display: none; margin-bottom: 16px; }
    /* Visibility only — the card chrome, borderless textarea and bled action row are
       all shared from the .entry-card / .edit-textarea rules (grouped selectors below)
       so the composer presents as a blank note in edit mode with zero duplication. */
    #input-area.open { display: block; }
    #search-area { display: none; }

    /* #new-entry styling is shared from the .edit-textarea rule above. */

    .esc-hint {
      font-size: 0.8rem;
      color: #888;
    }

    #search-area.open {
      display: block;
      position: sticky;
      top: 0;
      background: #f5f5f5;
      padding: 8px 0;
      z-index: 10;
      margin-bottom: 8px;
    }

    #search-wrap { position: relative; }
    #search-input {
      width: 100%;
      padding: 10px 36px 10px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }
    #search-input:focus { border-color: #7bae7f; box-shadow: 0 0 0 2px rgba(123,174,127,0.3); }
    /* Hide the browser's native search clear button; we use our own for consistency */
    #search-input::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
    #search-clear {
      display: none;
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: #222;
      line-height: 0;
    }
    #search-clear.visible { display: block; }

    .entry-card, #input-area.open {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      position: relative; /* positioning context for the card-anchored .edit-ridge */
    }

    .entry-card.shared { border-left: 3px solid #7bae7f; }
    /* A note shared to me that I've set aside (unlinked) — rose left bar, the
       mirror of the sage "shared" bar. Only seen in the Shared view. */
    .entry-card.unlinked { border-left: 3px solid #d4728c; }
    /* Count of notes I've set aside — a rose pill on the view filter, nudging me
       toward Shared where I can recover them. */
    .view-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px; padding: 0 4px; margin-left: 5px;
      font-size: 0.68rem; font-weight: 600; line-height: 1;
      background: #d4728c; color: #fff; border-radius: 8px;
    }
    /* Blue ridge on the card's right edge, sized (top/height) by JS to the edited row
       (solid, .edit-ridge) or the hovered one (soft, .edit-ridge.soft — the preview of
       where a click would land, shown even while another row is being edited). */
    .edit-ridge {
      position: absolute; right: -1px; width: 3px; display: none; z-index: 5;
      background: var(--edit-cue); pointer-events: none;
    }
    .edit-ridge.soft { background: var(--edit-cue-soft); z-index: 4; }

    .entry-date {
      font-size: 0.8rem;
      color: #bbb;
      margin-left: auto;
      white-space: nowrap;
    }

    .entry-content {
      word-break: break-word;
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .entry-content p { margin: 0 0 8px 0; }
    .entry-content p:last-child { margin-bottom: 0; }
    .entry-content ul, .entry-content ol { margin: 0 0 8px 0; padding-left: 24px; }
    .entry-content code { background: #eee; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
    .entry-content pre { background: #eee; padding: 8px; border-radius: 6px; overflow: auto; max-height: 60vh; margin: 0 0 8px 0; position: relative; }
    .code-copy-btn {
      position: absolute; top: 4px; right: 4px;
      padding: 4px 6px; border: 1px solid #ddd; border-radius: 6px;
      background: #fff; cursor: pointer; opacity: 0; transition: opacity 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .pre-wrap { position: relative; }
    .pre-wrap:hover .code-copy-btn { opacity: 1; }
    .code-copy-btn.copied { opacity: 1; }
    .entry-content pre code { background: none; padding: 0; }
    .entry-content blockquote { border-left: 3px solid #ccc; margin: 0 0 8px 0; padding-left: 12px; color: #666; }
    .entry-content h1 { font-size: 1.2rem; margin: 0 0 6px 0; }
    .entry-content h2 { font-size: 1.0rem; margin: 0 0 5px 0; }
    .entry-content h3 { font-size: 0.9rem; margin: 0 0 4px 0; color: #555; font-weight: 600; }
    .entry-content h4 { font-size: 0.82rem; margin: 0 0 4px 0; color: #555; font-weight: 600; }
    .entry-content h5 { font-size: 0.76rem; margin: 0 0 4px 0; color: #666; font-weight: 600; }
    .entry-content h6 { font-size: 0.7rem; margin: 0 0 4px 0; color: #777; font-weight: 600; }
    .entry-content a { color: #5e9462; }
    .entry-content img { max-width: 100%; height: auto; border-radius: 6px; display: block; margin: 4px 0; }
    .entry-content li:has(input[type="checkbox"]) { list-style: none; margin-left: -24px; display: flex; align-items: center; }
    .entry-content li:has(input[type="checkbox"]) input[type="checkbox"] { margin-right: 6px; }
    .entry-content li:has(input[type="checkbox"]) .todo-text { flex: 1; }
    .entry-content li:has(input[type="checkbox"]) > ul { margin-left: 24px; }
    .entry-content input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; min-width: 18px;
      border: 2px solid #888; border-radius: 4px;
      cursor: pointer; flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .entry-content input[type="checkbox"]:checked {
      background: #7bae7f; border-color: #7bae7f;
    }
    .entry-content input[type="checkbox"]:checked::after {
      content: '✓'; color: white; font-size: 13px; font-weight: bold;
    }
    .entry-content input[type="checkbox"]:hover {
      border-color: #7bae7f;
    }

    /* ── Todo items - ( ) — circular checkbox ── */
    .entry-content li.todo-item { list-style: none; margin-left: -24px; display: flex; align-items: center; padding: 3px 0; }
    .entry-content li.todo-item + li.todo-item { border-top: 1px solid #eee; }
    .history-viewing .entry-content li.todo-item + li.todo-item { border-top: none; }
    .history-viewing .entry-content li.todo-item { padding: 0; }
    .entry-content li.todo-item:not(.dragging) { transition: transform 0.12s; }
    .entry-content li.todo-item input[type="checkbox"] { border-radius: 50%; margin-right: 6px; }
    .entry-content li.todo-item .todo-text { flex: 1; min-height: 1.3em; line-height: 1.3; }
    .entry-content li.todo-item.checked .todo-text { color: #aaa; text-decoration: line-through; }

    /* ── Per-item editing ──
       Click a list row to edit just its text; click the gutter (either side of the
       rows — the extra 20px block padding carves a click strip left AND right) to
       edit the whole list as a block. The bare input inherits the row font, and the
       edit cue rides on the row (.editing-item) like the block editors. */
    .md-block.list-block { cursor: pointer; padding-left: 20px; padding-right: 20px; }
    .md-block.list-block li { cursor: text; }
    .item-edit {
      flex: 1; width: 100%; min-width: 0; padding: 0;
      font: inherit; color: inherit; line-height: 1.3; min-height: 1.3em;
      border: none; outline: none; background: none;
      resize: none; overflow-y: hidden; display: block; /* textarea: wrap + autosize */
    }
    .entry-content li.todo-item.checked .item-edit { color: #aaa; text-decoration: line-through; }
    /* The edited row just gets a faint shade; the blue ridge is drawn separately by
       .edit-ridge, anchored to the CARD's right edge and sized to the row. The row
       bleeds right to the card edge (−20 margin, +20 padding keeps its text put) so
       the edit handle, which hangs off the row's right edge, lands in the card's
       right gutter for nested list rows too. */
    .entry-content li.editing-item {
      position: relative; background: var(--edit-shade);
      margin-right: -20px; padding-right: 20px;
    }
    /* Hover handle on a rendered row: make the row the handle's positioning context
       (so the rail sizes to THIS row, not the whole list) and bleed its right edge to
       the card gutter exactly like editing-item — so the button lands in the same spot
       whether you hover or click into the row. */
    .entry-content li.hover-row { position: relative; margin-right: -20px; padding-right: 20px; }
    .entry-content li.todo-item.hover-row { padding: 3px 20px 3px 0; }
    .entry-content li.todo-item.editing-item { padding: 3px 20px 3px 0; }

    .entry-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      /* Constant full-width divider between the content and the button row. */
      border-top: 1px solid #eee;
      padding-top: 8px;
    }
    /* Inside a card (or the composer, now that it has the same padding) the row bleeds
       to the edges (negative side/bottom margins cancel the 12px padding) so the divider
       spans the full width and the buttons keep an even 8px below them. */
    .entry-card .entry-actions, #input-area.open .entry-actions { margin: 0 -12px -12px; padding: 8px 12px; }
    /* The action row sticks to the viewport bottom in VIEW mode too, so on a long
       note the buttons stay reachable without scrolling to its very end. Its own
       background lets the content scroll cleanly underneath. (Edit mode overrides
       the offset below to sit above the keyboard.) */
    .entry-card .entry-actions {
      position: sticky; bottom: 0; z-index: 3;
      background: #fff;
      border-radius: 0 0 8px 8px;
    }

    /* While editing, the button row sticks to the viewport bottom so it's always
       reachable — replacing the old height-cap + internal-scroll hack. Its own
       background lets the content scroll cleanly underneath. */
    /* --kb-inset lifts the bar above the on-screen keyboard (set from the
       VisualViewport API); 0 on desktop / when no keyboard is shown. */
    .entry-card.editing .entry-actions, #input-area.open .entry-actions {
      position: sticky; bottom: var(--kb-inset, 0px); z-index: 5;
      background: #fff;
      border-radius: 0 0 8px 8px;
    }

    .entry-actions button {
      padding: 6px 10px;
      font-size: 0.85rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .entry-actions button:active { background: #eee; }
    .entry-actions button:disabled { opacity: 0.4; cursor: default; }
    /* Blue (the --edit-cue used for the editing bar) marks save as the edit/confirm
       action; the variable flips automatically in dark mode. */
    .entry-actions button.btn-save { background: var(--edit-cue); border-color: var(--edit-cue); color: #fff; }
    .entry-actions button.btn-save:active { filter: brightness(0.92); }
    .icon-bg { fill: #fff; }


    .history-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #888;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .history-nav button {
      padding: 6px 10px;
      font-size: 0.85rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .history-nav button:disabled { opacity: 0.3; cursor: default; }

    .history-viewing .entry-content { opacity: 0.7; }

    /* ── Per-block editing ──
       An active block editor is near-invisible: same font/size/position as the
       rendered text it replaces, no frame — the one cue is a blue bar on the
       card's right edge (the mirror of a shared note's sage left bar) plus a
       faint shade fill. --edit-cue-soft previews that bar on hover. */
    :root {
      --edit-cue: #5b8fd6; --edit-cue-soft: rgba(91,143,214,0.45); --edit-shade: rgba(0,0,0,0.035);
      /* Per-action hues: the edited row's shade + right ridge borrow the colour of the
         action underway — green while copying, rose while a delete is armed, blue while
         dragging. Copy/delete shades are translucent tints; the drag shade is OPAQUE so
         the row doesn't reveal the rows sliding underneath it. */
      --cue-copy: #7bae7f;              --cue-delete: #d4728c;
      --shade-copy: rgba(123,174,127,0.16); --shade-delete: rgba(212,114,140,0.16); --shade-drag: #e9f1fb;
    }
    .dark {
      --edit-cue: #7fb0e8; --edit-cue-soft: rgba(127,176,232,0.4); --edit-shade: rgba(255,255,255,0.045);
      --cue-copy: #8fc593;              --cue-delete: #e2829c;
      --shade-copy: rgba(127,200,131,0.18); --shade-delete: rgba(226,130,156,0.2); --shade-drag: #2b3542;
    }
    /* Card-scoped so BOTH the shade (on the edited row / .block-edit) and the ridge
       (card-anchored .edit-ridge) recolour together. Drag keeps the ridge blue — only
       its shade turns (opaque) blue. */
    .entry-card.act-copy   { --edit-shade: var(--shade-copy); }
    .entry-card.act-delete { --edit-shade: var(--shade-delete); }
    .entry-card.act-drag   { --edit-shade: var(--shade-drag); }
    /* A rendered block/row driven by its hover handle shows the same copy/delete/drag
       tint the open editor would — keyed to the handle's host, not every block. */
    .entry-card.act-copy   .hover-target,
    .entry-card.act-delete .hover-target,
    .entry-card.act-drag   .hover-target { background: var(--edit-shade); }
    .entry-card.act-copy   .edit-ridge:not(.soft) { background: var(--cue-copy); }
    .entry-card.act-delete .edit-ridge:not(.soft) { background: var(--cue-delete); }
    /* Blocks bleed into the card's 12px padding so the hover tint / edit ridge
       spans the full note width without shifting the rendered text. */
    .md-block { position: relative; margin: 0 -12px; padding: 0 12px; }
    /* Each block wraps one top-level element whose own bottom margin is zeroed by
       :last-child rules; carry the inter-block rhythm on the block instead. */
    .md-block + .md-block { margin-top: 1.3em; }
    .md-block > :last-child { margin-bottom: 0; }
    .md-block:not(.list-block) { cursor: text; }
    /* Hover/edit cue (the blue ridge) is the card-anchored .edit-ridge, positioned
       by JS to whichever block/row is hovered or edited. */
    /* The wrap replaces a .md-block in place, so it must carry the SAME inter-block
       rhythm — otherwise entering edit collapses the 1.3em gaps around it (the block
       jumps up, the paragraph breaks below "eat up"). Mirror .md-block + .md-block. */
    .block-edit-wrap { position: relative; margin: 0 -12px; }
    .md-block + .block-edit-wrap,
    .block-edit-wrap + .md-block,
    .block-edit-wrap + .block-edit-wrap { margin-top: 1.3em; }
    /* ── Drag-to-reorder (edit-mode only) ── */
    .md-block:not(.dragging) { transition: transform 0.12s; }
    .md-block.list-block li:not(.dragging) { transition: transform 0.12s; }
    /* One unified pop-out handle on the closest edge of the OPEN editor: a single
       blue tab holding the drag grip (reorder) on top, then copy-section and
       trash-section icons, all white-on-blue split by faint dividers. The .edit-handle
       is a full-height rail (a scroll track, click-through) pinned just outside the
       text column; the tab inside is `position: sticky` so it rides the top of the
       viewport as a tall paragraph scrolls and slides off with its last line —
       CSS-native, so there's no scroll-follow jitter. */
    /* Right offset (−20px) === the outer extent, but width is 10px WIDER so the tab's
       inner edge reaches back into the card, eating ~10px of the card's 12px text
       padding (a 2px gap keeps buttons off the text). Thicker buttons, no overflow —
       the outer edge is unchanged, so list-row gutters (margin-right:−20px) still line up. */
    .edit-handle {
      position: absolute; top: 0; bottom: 0; right: -20px;
      width: 30px;
      pointer-events: none;      /* rail is just a track; the tab takes the events */
      z-index: 6;
      -webkit-user-select: none; user-select: none;
    }
    .edit-handle-tab {
      position: sticky; top: 8px;
      pointer-events: auto;
      display: flex; flex-direction: column;
      overflow: hidden;
      /* Now that the tab reaches back INTO the card (its left edge floats over white
         rather than hugging the card's edge), it reads as a free-floating pill —
         so it's fully bordered and rounded on all four corners. */
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    /* Hover handle (view mode, no editor): the pill is centered on its block/row
       rather than sticky-to-top — a short paragraph gets the grip on its line, not
       the pill hanging off the top edge. (Edit mode keeps the sticky scroll-follow.) */
    .edit-handle.hover-handle .edit-handle-tab {
      /* left:0 + right:0 makes the pill fill the rail (30px) exactly like the
         in-flow edit-mode tab; centered vertically instead of stuck to the top. */
      position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%);
    }
    /* At rest the grip matches copy + trash — white with dark dots. It only goes blue
       (white dots) while actually dragging (.dragging on the drag element). The trash's
       two-tap cooldown tints just the trash button rose (confirmButton). */
    .edit-handle-grip {
      height: 42px;
      background: #fff; color: #555;
      display: flex; align-items: center; justify-content: center;
      cursor: grab; touch-action: none;
    }
    .edit-handle-grip:active { cursor: grabbing; }
    .dragging .edit-handle-grip { background: var(--edit-cue); color: rgba(255,255,255,0.95); }
    /* Grip dots render smaller than the copy/trash line icons; size them up to match. */
    .edit-handle-grip > svg { pointer-events: none; width: 18px; height: 18px; }
    .edit-handle-btn {
      height: 34px; padding: 0;
      background: #fff; color: #555; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .edit-handle-btn:active { background: #eee; }
    .edit-handle-tab > * + * { border-top: 1px solid #ddd; }
    .block-edit-wrap.dragging { box-shadow: 0 6px 16px rgba(0,0,0,0.16); z-index: 10; }
    .entry-content li.editing-item.dragging { z-index: 10; box-shadow: 0 6px 16px rgba(0,0,0,0.16); }
    /* Rendered blocks reordered straight from hover (no edit session) lift the same;
       an opaque card-coloured fill keeps text below from showing through mid-slide. */
    .md-block.dragging { box-shadow: 0 6px 16px rgba(0,0,0,0.16); z-index: 10; background: #fff; }

    .block-edit {

      width: 100%; margin: 0; padding: 0 12px;

    .new-zone { height: 20px; margin: -12px -12px 0; cursor: text; border-radius: 8px 8px 0 0; }
    .new-zone.bottom { height: 18px; margin: 0 -12px; border-radius: 0; }

    /* Whole-note editor: near-invisible like the block editors — raw source in the

       on the card's right edge (.editing-full), the mirror of a shared note's sage
       left bar. */
    .edit-textarea, #new-entry {
      width: 100%;
      min-height: 80px;
      padding: 0;
      font: inherit;
      line-height: 1.3;
      border: none;
      border-radius: 0;
      background: transparent;
      color: inherit;
      outline: none;
      resize: none;
      margin-bottom: 8px;
      overflow-y: hidden;

    .entry-card.editing .entry-actions,

    .entry-actions .esc-hint:empty { display: none; }
    /* Buttons step down a size on smaller screens so the 8-icon edit row fits —

    /* On narrower screens the text (esc-hint, history date) drops to its own

    @media (max-width: 500px) {

    /* ── View filter popover (opens below) ── */

    }

    .cycle-popover button.active { background: #f0f7f0; color: #5e9462; }

    /* ── Dark mode ── */

  <!-- defer: don't block HTML parsing; deferred scripts still run in document

  <script type="module">
    window.__bootMark('sdk-loaded'); // runs after the Firebase SDK imports resolve

      ADD_TAGS: ['input'],

    // Post-process rendered HTML to set up todo items

      contentEl.querySelectorAll('li').forEach(li => {

    }

    const pendingCheckboxUpdates = new Set();
    // Matches both - [ ] and - ( ) checkbox syntaxes
    const CB_RE = /^(\s*[-*]\s+)(?:\[([ xX])\]|\(([ xX]| )\))/gm;

    // Re-render contentEl from markdown and re-attach all handlers
    function rerenderContent(contentEl, entry) {
      renderBlocks(contentEl, entry);
    }

    // ── Block model (source lines → [{start,end}] ranges) ──
    const isBlank = l => !l.trim();
    const isFence = l => /^\s*(```|~~~)/.test(l);
    const isListLine = l => /^\s*([-*+]\s|\d+[.)]\s)/.test(l);
    const isHeading = l => /^\s{0,3}#{1,6}\s/.test(l);
    const isQuote = l => /^\s*>/.test(l);
    function splitBlocks(src) {
      const lines = src.split('\n');
      const blocks = [];
      let i = 0;
      while (i < lines.length) {
        if (isBlank(lines[i])) { i++; continue; }
        const start = i;
        if (isFence(lines[i])) {
          i++;
          while (i < lines.length && !isFence(lines[i])) i++;
          if (i < lines.length) i++; // closing fence
        } else if (isHeading(lines[i])) {
          i++;
        } else if (isListLine(lines[i])) {
          while (i < lines.length && (isListLine(lines[i]) || /^\s+\S/.test(lines[i]))) i++;
        } else if (isQuote(lines[i])) {
          while (i < lines.length && isQuote(lines[i])) i++;
        } else {
          while (i < lines.length && !isBlank(lines[i]) && !isHeading(lines[i])
                 && !isListLine(lines[i]) && !isFence(lines[i]) && !isQuote(lines[i])) i++;
        }
        blocks.push({ start, end: i - 1 });
      }
      return blocks;
    }
    const blockText = (content, b) => content.split('\n').slice(b.start, b.end + 1).join('\n');

    // Map a click point inside rendered HTML back to an offset in the block's
    // markdown source: take the clicked text node, find its text in the source,
    // add the in-node offset. Falls back to end-of-block.
    function sourceOffsetFromPoint(x, y, src) {
      let node = null, off = 0;
      if (document.caretPositionFromPoint) {
        const p = document.caretPositionFromPoint(x, y);
        if (p) { node = p.offsetNode; off = p.offset; }
      } else if (document.caretRangeFromPoint) {
        const r = document.caretRangeFromPoint(x, y);
        if (r) { node = r.startContainer; off = r.startOffset; }
      }
      if (!node || node.nodeType !== Node.TEXT_NODE) return src.length;
      const t = node.textContent;
      let pos = src.indexOf(t);
      if (pos === -1) {
        const trimmed = t.trim();
        pos = trimmed ? src.indexOf(trimmed) : -1;
        if (pos !== -1) off = Math.max(0, off - (t.length - t.trimStart().length));
      }
      if (pos === -1) return src.length;
      return pos + Math.min(off, t.length);
    }

    // Render an entry's content as a column of .md-block elements (+ top/bottom
    // "new paragraph" zones), then wire click-to-edit on the non-list blocks.
    // List blocks keep their existing todo chrome for now (Phase 1); they become
    // click-to-edit rows later. All the todo/checkbox/code wiring still runs once
    // over the whole contentEl, block structure or not.
    function renderBlocks(contentEl, entry) {
      contentEl.innerHTML = '';
      // Once per content element: drop the hover handle when the mouse leaves the
      // note entirely (block-level mouseleave can't, since the handle is its child).
      if (HAS_HOVER && !contentEl.__hoverWired) {
        contentEl.__hoverWired = true;
        contentEl.addEventListener('mouseleave', clearHoverHandle);
      }
      const lines = entry.content.split('\n'); // split once; blocks slice from here
      splitBlocks(entry.content).forEach(b => {
        const div = document.createElement('div');
        div.className = 'md-block';
        const src = lines.slice(b.start, b.end + 1).join('\n');
        if (isListLine(lines[b.start])) div.classList.add('list-block');
        div.innerHTML = cleanHtml(src, entry.images);
        div.__entry = entry;
        div.__block = b;
        contentEl.appendChild(div);
        if (div.classList.contains('list-block')) return; // list wiring runs below
        div.addEventListener('click', (e) => {
          if (activeBlock) return;               // switching is handled on pointerdown
          if (e.target.closest('a, input, button')) return;
          if (!window.getSelection().isCollapsed) return; // selecting text ≠ editing
          const x = e.clientX, y = e.clientY;
          const open = () => {
            if (activeBlock || !window.getSelection().isCollapsed) return;
            beginBlockEdit(div, sourceOffsetFromPoint(x, y, blockText(entry.content, div.__block)));
          };
          // On touch, wait a beat: a tap that's really the start of a text
          // selection (long-press / double-tap word / handle drag) resolves into a
          // non-collapsed selection during this window and we bail. Mouse is instant.
          if (lastPointerType === 'touch') setTimeout(open, 220);
          else open();
        });
        // Preview where a click would land (shown even while editing another row),
        // and — on hover-capable devices — pop out the paragraph handle so drag/
        // copy/delete don't need a click into edit mode first.
        div.addEventListener('mousemove', (e) => {
          const card = div.closest('.entry-card');
          if (e.target.closest('a, input, button')) { positionRidge(card.__hoverRidge, card, null); return; }
          positionRidge(card.__hoverRidge, card, div, true);
          // Pop the handle out only when the cursor is over the button's own footprint
          // (its gutter column + vertical band) — mount to measure, keep only on a hit.
          if (HAS_HOVER && !activeBlock) {
            const r = div.getBoundingClientRect();
            if (e.clientX > r.right - 30) { mountHoverHandle(div); if (!withinHandle(e)) clearHoverHandle(); }
            else clearHoverHandle();
          }
        });
        div.addEventListener('mouseleave', () => {
          const card = div.closest('.entry-card');
          positionRidge(card.__hoverRidge, card, null);
        });
      });
      ['top', 'bottom'].forEach(where => {
        const zone = document.createElement('div');
        zone.className = 'new-zone' + (where === 'bottom' ? ' bottom' : '');
        zone.__entry = entry;
        if (where === 'top') contentEl.prepend(zone); else contentEl.appendChild(zone);
        zone.addEventListener('click', () => {
          if (activeBlock) return;
          if (!window.getSelection().isCollapsed) return;
          beginNewBlockEdit(entry, contentEl, where);
        });
      });
      attachCheckboxHandlers(contentEl, entry);
      // List blocks: map each <li> to its source line, then wire click-to-edit
      // (a row → edit that item; the gutter, either side of the rows → edit the
      // whole list as a block) plus the whole-list hover cue.
      contentEl.querySelectorAll('.md-block.list-block').forEach(div => {
        const b = div.__block;
        const itemLines = [];
        for (let k = b.start; k <= b.end; k++) if (isListLine(lines[k])) itemLines.push(k);
        div.querySelectorAll('li').forEach((li, j) => { li.__lineIdx = itemLines[j]; });
        div.addEventListener('click', (e) => {
          if (activeBlock) return;
          if (e.target.closest('a, input, button')) return;
          if (!window.getSelection().isCollapsed) return;
          const x = e.clientX, y = e.clientY, li = e.target.closest('li');
          const open = () => {
            if (activeBlock || !window.getSelection().isCollapsed) return;
            if (li && li.__lineIdx != null) {
              const line = entry.content.split('\n')[li.__lineIdx] || '';
              const m = line.match(ITEM_RE);
              beginItemEdit(li, div, sourceOffsetFromPoint(x, y, m ? m[2] : line));
            } else {
              beginBlockEdit(div, null); // gutter → edit the whole list as a block
            }
          };
          if (lastPointerType === 'touch') setTimeout(open, 220);
          else open();
        });
        // Preview where a click would land: a row → that row, the gutter → the whole
        // list. Shown even while editing another row (skip the row already editing).
        div.addEventListener('mousemove', (e) => {
          const card = div.closest('.entry-card');
          const r = div.getBoundingClientRect();
          const inRightZone = e.clientX > r.right - 30;
          // Rows stop at the list's text column; in the right gutter (where the handle
          // lives) e.target is the block, not an <li> — so resolve the row by its Y.
          let li = e.target.closest('li');
          if ((!li || li.__lineIdx == null) && HAS_HOVER && inRightZone) li = rowAtY(div, e.clientY) || li;
          if (e.target.closest('a, input, button') || (li && li.classList.contains('editing-item'))) {
            positionRidge(card.__hoverRidge, card, null); return;
          }
          positionRidge(card.__hoverRidge, card, li || div, true);
          // Row handle for the hovered row — button column measured off the block's
          // right edge (the card gutter), then the same button-footprint hit-test.
          if (HAS_HOVER && !activeBlock && li && li.__lineIdx != null) {
            if (inRightZone) { mountHoverHandleItem(li, div); if (!withinHandle(e)) clearHoverHandle(); }
            else clearHoverHandle();
          } else if (HAS_HOVER && !activeBlock) {
            clearHoverHandle();
          }
        });
        div.addEventListener('mouseleave', () => {
          const card = div.closest('.entry-card');
          positionRidge(card.__hoverRidge, card, null);
        });
      });
    }

    // Keep the sticky edit toolbar above the on-screen keyboard: the keyboard
    // overlays the layout viewport (so `bottom:0` hides behind it), but the
    // VisualViewport shrinks — the difference is the keyboard's height, which we
    // publish as --kb-inset for the sticky bars to sit on. 0 when no keyboard.
    if (window.visualViewport) {
      const vv = window.visualViewport;
      // Only publish the keyboard inset for the sticky bars — do NOT scroll the
      // caret here. Mobile fires resize/scroll during manual scrolling (address bar
      // show/hide), and scrolling to the caret then would fight the user. Caret
      // repositioning happens on input (typing) only.
      const setKbInset = () => {
        const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
        document.documentElement.style.setProperty('--kb-inset', inset + 'px');
      };
      vv.addEventListener('resize', setKbInset);
      vv.addEventListener('scroll', setKbInset);
      setKbInset();
    }

    // ── Inline block editor ──
    let activeBlock = null;                 // the open block editor, if any
    const blockSessions = new Map();        // entryId → {baseline, snapped} for coalesced history
    let lastPointerType = 'mouse';          // to give touch taps a select-vs-edit grace window
    document.addEventListener('pointerdown', (e) => { lastPointerType = e.pointerType || 'mouse'; }, true);

    // The edit chrome (blue ridge + handle) always lives on the card's RIGHT edge.

    // Draw `ridge` on `card`'s right edge, sized to `targetEl` (the edited or hovered
    // block/row). Anchored to the card — not the element — so it reaches the card edge
    // cleanly even for deeply-nested list rows. `soft` = the lighter hover preview.
    // Each card has two: __ridge (solid, the open editor) and __hoverRidge (the
    // where-you'd-land preview), so the preview shows even while a row is being edited.
    function positionRidge(ridge, card, targetEl, soft) {
      if (!ridge) return;
      if (!targetEl || !targetEl.isConnected) { ridge.style.display = 'none'; return; }
      const cr = card.getBoundingClientRect();
      const tr = targetEl.getBoundingClientRect();
      ridge.style.top = (tr.top - cr.top - card.clientTop) + 'px';
      ridge.style.height = tr.height + 'px';
      ridge.className = 'edit-ridge' + (soft ? ' soft' : '');
      ridge.style.display = 'block';
    }
    // The handle tab sticks to the top of a TALL editor (rides down as it scrolls),
    // but when the line is shorter than the tab it's centered on the line instead of
    // hanging off the bottom — so the handle stays balanced on the row.
    function layoutHandleTab() {
      if (!activeBlock || !activeBlock.tabEl) return;
      const railH = activeBlock.wrap.getBoundingClientRect().height;
      const tab = activeBlock.tabEl;
      const tabH = tab.offsetHeight;
      if (tabH > railH) {
        tab.style.position = 'static';
        tab.style.marginTop = ((railH - tabH) / 2) + 'px';
      } else {
        tab.style.position = 'sticky';
        tab.style.marginTop = '0px';
      }
    }
    // Reposition the open editor's ridge + handle when the layout shifts (typing grows
    // the editor; zoom/resize reflows). Scroll doesn't move them — they ride the card.
    const relayoutActiveEdit = () => {
      if (!activeBlock) return;
      positionRidge(activeBlock.card.__ridge, activeBlock.card, activeBlock.wrap, false);
      layoutHandleTab();
    };
    window.addEventListener('resize', relayoutActiveEdit);
    if (window.visualViewport) window.visualViewport.addEventListener('resize', relayoutActiveEdit);

    // Copy: strip markdown to plain text — drop list markers/checkboxes, heading #,
    // blockquote >, and inline bold/italic/strike/code/link syntax. Images are left
    // as `![alt](img:id)` so the caller can still resolve them to the actual picture.
    function stripToPlainText(md) {
      const lines = (md || '').split('\n').map(line => line
        .replace(/^\s*#{1,6}\s+/, '')
        .replace(/^\s*>+\s?/, '')
        .replace(/^(\s*)(?:[-*+]|\d+[.)])\s+(?:\[[ xX]\]\s*|\([ xX]\)\s*)?/, '$1'));
      return lines.join('\n')
        .replace(/(!?)\[([^\]]*)\]\(([^)]*)\)/g, (m, bang, txt) => bang ? m : txt) // links→text, keep images
        .replace(/(\*\*|__)(.*?)\1/g, '$2')
        .replace(/(\*|_)([^*_]+?)\1/g, '$2')
        .replace(/~~(.*?)~~/g, '$2')
        .replace(/`([^`]+)`/g, '$1');
    }

    // Persist a whole new content string for an entry, snapshotting ONE history
    // version per editing session (the pre-session content) and garbage-collecting
    // unreferenced images — the block-editing analog of saveEdit.
    function applyEntryContent(entry, newContent, session) {
      if (newContent === entry.content) return false;
      const archived = session.snapped ? null : { content: session.baseline, editedAt: new Date().toISOString() };
      if (archived) session.snapped = true;
      const allImages = Object.assign({}, entry.images, pendingImages.get(entry.id));
      // Retain images referenced by the new content OR any kept history version,
      // including THIS session's archived baseline (it lives in Firestore history
      // even after the first commit, so keep its images across later commits).
      const histForGC = (entry.editHistory || []).slice();
      if (session.snapped) histForGC.push({ content: session.baseline });
      const refs = collectImageRefs(newContent, histForGC);
      const images = {};
      refs.forEach(id => { if (allImages[id]) images[id] = allImages[id]; });
      pendingImages.delete(entry.id);
      const hadImages = entry.images && Object.keys(entry.images).length > 0;
      entry.content = newContent;
      entry.images = images;
      // Do NOT mutate entry.editHistory locally — leaving it stale lets the Firestore
      // echo detect the change and rebuild the card, so `versions`/`hasHistory`
      // refresh and the archived version is retrievable from history.
      const payload = { content: newContent };
      if (archived) payload.editHistory = arrayUnion(archived);
      if (refs.size || hadImages) payload.images = images;
      updateDoc(doc(db, 'entries', entry.id), payload).catch(err => console.error('block save failed', err));
      return true;
    }

    // Splice a block's [start,end] line range with new source (empty = delete the
    // block, eating one adjacent blank line so no double gap remains).
    function applyBlockEdit(entry, b, newSrc, session) {
      const lines = entry.content.split('\n');
      const clean = newSrc.replace(/\n+$/, '');
      if (!clean.trim()) {
        let s = b.start, e = b.end;
        if (e + 1 < lines.length && isBlank(lines[e + 1])) e++;
        else if (s > 0 && isBlank(lines[s - 1])) s--;
        lines.splice(s, e - s + 1);
      } else {
        lines.splice(b.start, b.end - b.start + 1, ...clean.split('\n'));
      }
      applyEntryContent(entry, lines.join('\n'), session);
    }

    function sessionFor(entry) {
      let s = blockSessions.get(entry.id);
      if (!s) { s = { baseline: entry.content, snapped: false }; blockSessions.set(entry.id, s); }
      return s;
    }

    // ── Drag-to-reorder + arrow navigation (Phase 3) ──

    // Persist a reorder: content + image GC, but NO history version (a pure move,
    // like a checkbox toggle). Text-changing edits still go through applyEntryContent.
    function reorderEntryContent(entry, newContent) {
      if (newContent === entry.content) return false;
      const allImages = Object.assign({}, entry.images, pendingImages.get(entry.id));
      const refs = collectImageRefs(newContent, entry.editHistory || []);
      const images = {};
      refs.forEach(id => { if (allImages[id]) images[id] = allImages[id]; });
      pendingImages.delete(entry.id);
      const hadImages = entry.images && Object.keys(entry.images).length > 0;
      entry.content = newContent;
      entry.images = images;
      const payload = { content: newContent };
      if (refs.size || hadImages) payload.images = images;
      updateDoc(doc(db, 'entries', entry.id), payload).catch(err => console.error('reorder save failed', err));
      return true;
    }

    // The contiguous run of sibling list <li>s (each carrying __lineIdx) around `li`.
    function listItemRun(li) {
      const ul = li.parentElement;
      let cur = [];
      for (const child of ul.children) {
        if ((child.tagName === 'LI' && child.__lineIdx != null) || child === li) cur.push(child);
        else { if (cur.includes(li)) break; cur = []; }
      }
      return cur.includes(li) ? cur : [];
    }

    // Reorder list rows (each = its source line + more-indented children) within a
    // contiguous region, given `lines` and the new DOM order. Returns the new
    // content string, or null if the rows don't tile a contiguous region.
    function reorderLines(lines, newOrder) {
      const indentOf = l => l.match(/^\s*/)[0].length;
      const ranges = newOrder.map(row => {
        const start = row.__lineIdx;
        if (start == null) return null;
        const indent = indentOf(lines[start]);
        let end = start;
        while (end + 1 < lines.length && lines[end + 1].trim() && indentOf(lines[end + 1]) > indent) end++;
        return { start, end };
      });
      if (ranges.some(r => !r)) return null;
      const sorted = [...ranges].sort((a, b) => a.start - b.start);
      const contiguous = sorted.every((b, i) => i === 0 || b.start === sorted[i - 1].end + 1);
      if (!contiguous) return null;
      return [
        ...lines.slice(0, sorted[0].start),
        ...ranges.flatMap(r => lines.slice(r.start, r.end + 1)),
        ...lines.slice(sorted[sorted.length - 1].end + 1),
      ].join('\n');
    }

    // The ONE drag engine, shared by block wraps and list rows. Transform-based
    // reorder of a run of sibling elements — knows nothing about what it drags:
    // the caller passes the `run` and an onReorder(newOrder) that commits the move.
    // The dragged element is the LIVE editor, so its look never changes mid-drag.
    function startReorderDrag(e, capEl, dragEl, run, onReorder) {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      if (run.length < 2) return;
      const li = dragEl;
      const card = dragEl.closest('.entry-card');
      e.preventDefault();
      capEl.setPointerCapture(e.pointerId);

      const origIdx = run.indexOf(li);
      const others = run.filter(item => item !== li);
      const anchor = run[run.length - 1].nextSibling;
      const mids = others.map(o => {
        const r = o.getBoundingClientRect();
        return r.top + r.height / 2 + window.scrollY;
      });
      const liRect = li.getBoundingClientRect();
      const gap = Math.max(0, run[1].getBoundingClientRect().top - run[0].getBoundingClientRect().bottom);
      const rowShift = liRect.height + gap;
      const minDy = run[0].getBoundingClientRect().top - liRect.top;
      const maxDy = run[run.length - 1].getBoundingClientRect().bottom - liRect.bottom;
      const startPageY = e.clientY + window.scrollY;
      let dragging = false, lastClientY = e.clientY, curIdx = origIdx, rafId = null;

      const update = () => {
        const pageY = lastClientY + window.scrollY;
        const dy = Math.max(minDy, Math.min(maxDy, pageY - startPageY));
        li.style.transform = `translateY(${dy}px)`;
        const idx = mids.filter(m => m < pageY).length;
        if (idx !== curIdx) {
          curIdx = idx;
          others.forEach((o, i) => {
            if (i >= idx && i < origIdx) o.style.transform = `translateY(${rowShift}px)`;
            else if (i >= origIdx && i < idx) o.style.transform = `translateY(${-rowShift}px)`;
            else o.style.transform = '';
          });
        }
      };
      const tick = () => {
        const margin = 60, speed = 8;
        if (lastClientY < margin) window.scrollBy(0, -speed);
        else if (lastClientY > window.innerHeight - margin) window.scrollBy(0, speed);
        update();
        rafId = requestAnimationFrame(tick);
      };
      const onMove = (ev) => {
        lastClientY = ev.clientY;
        if (!dragging) {
          if (Math.abs(ev.clientY - e.clientY) < 4) return;
          dragging = true;
          li.classList.add('dragging');
          if (card) card.classList.add('act-drag');
          rafId = requestAnimationFrame(tick);
        }
        update();
      };
      const finish = (commit) => {
        capEl.removeEventListener('pointermove', onMove);
        capEl.removeEventListener('pointerup', onUp);
        capEl.removeEventListener('pointercancel', onCancel);
        if (rafId) cancelAnimationFrame(rafId);
        li.classList.remove('dragging');
        if (card) card.classList.remove('act-drag');
        run.forEach(item => { item.style.transform = ''; });
        if (!dragging) return;
        const newOrder = (commit && curIdx !== origIdx)
          ? [...others.slice(0, curIdx), li, ...others.slice(curIdx)] : null;
        onReorder(newOrder, anchor);
      };
      const onUp = () => finish(true);
      const onCancel = () => finish(false);
      capEl.addEventListener('pointermove', onMove);
      capEl.addEventListener('pointerup', onUp);
      capEl.addEventListener('pointercancel', onCancel);
    }

    // Build the unified pop-out edit handle for an open editor (block wrap or list
    // row): a full-height rail on the card's right edge carrying one blue tab with the
    // drag grip (reorder), then optional copy-section + trash-section icons. onCopy()
    // returns the text to copy; onDelete removes the section. The trash's two-tap
    // cooldown tints the whole tab rose.
    function makeEditHandle(dragEl, { getRun, onReorder, onCopy, onDelete }) {
      const handle = document.createElement('div');
      handle.className = 'edit-handle';
      const tab = document.createElement('div');
      tab.className = 'edit-handle-tab';
      handle.appendChild(tab);

      // Order: copy (top), grip (middle), trash (bottom) — grip centered in the stack.
      if (onCopy) {
        const copyBtn = document.createElement('button');
        copyBtn.type = 'button';
        copyBtn.className = 'edit-handle-btn';
        copyBtn.title = 'Copy';
        copyBtn.innerHTML = ICON.copy;
        copyBtn.addEventListener('mousedown', (e) => e.preventDefault()); // keep editor focus
        copyBtn.addEventListener('click', async (e) => {
          e.preventDefault(); e.stopPropagation();
          try { await navigator.clipboard.writeText(onCopy() || ''); flashCopied(copyBtn); }
          catch (err) { console.error('section copy failed', err); }
        });
        tab.appendChild(copyBtn);
      }

      const grip = document.createElement('div');
      grip.className = 'edit-handle-grip';
      grip.title = 'Drag to reorder';
      grip.innerHTML = ICON.grip;
      grip.addEventListener('contextmenu', (ev) => ev.preventDefault());
      grip.addEventListener('pointerdown', (ev) => {
        if (ev.pointerType === 'mouse' && ev.button !== 0) return;
        ev.preventDefault(); // keep the editor focused during the drag
        startReorderDrag(ev, dragEl, dragEl, getRun(), onReorder);
      });
      tab.appendChild(grip);

      if (onDelete) {
        const trashBtn = document.createElement('button');
        trashBtn.type = 'button';
        trashBtn.className = 'edit-handle-btn';
        trashBtn.title = 'Delete';
        trashBtn.innerHTML = ICON.trash;
        confirmButton(trashBtn, ICON.trash, onDelete); // arms → tints just this button rose
        tab.appendChild(trashBtn);
      }
      return handle;
    }

    // On pointer devices with real hover, show the paragraph handle (drag/copy/
    // delete) as soon as the mouse is over a block — no click-to-edit needed for
    // those actions. Touch has no hover, so the handle stays edit-mode-only there.
    const HAS_HOVER = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    let hoverHandle = null, hoverHandleFor = null;
    function clearHoverHandle() {
      if (hoverHandle) hoverHandle.remove();
      if (hoverHandleFor) hoverHandleFor.classList.remove('hover-row', 'hover-target');
      hoverHandle = null; hoverHandleFor = null;
    }
    // Is the cursor over the mounted handle's actual button pill (± a little slack)?
    // Uses the tab's real rect so the trigger is only as big as the button — and, for
    // tall paragraphs, only where the (sticky) button actually sits vertically.
    function withinHandle(e) {
      if (!hoverHandle) return false;
      const t = hoverHandle.querySelector('.edit-handle-tab').getBoundingClientRect();
      const px = 10, py = 8;
      return e.clientX >= t.left - px && e.clientX <= t.right + px
          && e.clientY >= t.top - py && e.clientY <= t.bottom + py;
    }
    // Attach a live (non-editing) edit handle to a rendered non-list block, wired to
    // operate directly on the block's source: copy its text, delete it, or drag to
    // reorder among sibling blocks. Reuses the same handle as the open editor.
    function mountHoverHandle(div) {
      if (hoverHandleFor === div) return; // already mounted for this block
      clearHoverHandle();
      const entry = div.__entry;
      const contentEl = div.closest('.entry-content');
      const card = div.closest('.entry-card');
      const handle = makeEditHandle(div, {
        onCopy: () => resolveImageRefs(stripToPlainText(blockText(entry.content, div.__block)), entry.images),
        onDelete: () => {
          const session = sessionFor(entry);
          applyBlockEdit(entry, div.__block, '', session);
          blockSessions.delete(entry.id);
          clearHoverHandle();
          card.__toView();
        },
        getRun: () => [...contentEl.querySelectorAll('.md-block, .block-edit-wrap')],
        onReorder: (newOrder) => {
          clearHoverHandle();
          if (!newOrder) return;
          const lines = entry.content.split('\n');
          const newContent = newOrder
            .map(el => lines.slice(el.__block.start, el.__block.end + 1).join('\n'))
            .filter(part => part.trim())
            .join('\n\n');
          reorderEntryContent(entry, newContent);
          card.__toView();
        },
      });
      handle.classList.add('hover-handle'); // center the pill on the block, not sticky-top
      div.classList.add('hover-target');    // carry the copy/delete/drag action shade
      // Prepend (not append): the handle is position:absolute, so order is cosmetic —
      // but appending would steal `:last-child` from the content and revive its zeroed
      // bottom margin (`.md-block > :last-child`), nudging the note taller.
      div.prepend(handle);
      hoverHandle = handle; hoverHandleFor = div;
    }

    // The list row at vertical position `y` (screen coords) within a list block —
    // innermost wins for nested lists. Used to find the row when the cursor is out in
    // the right gutter, past the rows' own text column.
    function rowAtY(blk, y) {
      let best = null, bestH = Infinity;
      blk.querySelectorAll('li').forEach(li => {
        if (li.__lineIdx == null) return;
        const r = li.getBoundingClientRect();
        if (y >= r.top && y <= r.bottom && r.height < bestH) { best = li; bestH = r.height; }
      });
      return best;
    }

    // Same, for a single rendered list row: copy/delete that row, or drag to reorder
    // it among its list siblings — keyed to the hovered <li>, not the whole list.
    function mountHoverHandleItem(li, div) {
      if (hoverHandleFor === li) return;
      clearHoverHandle();
      const entry = div.__entry;
      const contentEl = div.closest('.entry-content');
      const card = div.closest('.entry-card');
      const handle = makeEditHandle(li, {
        onCopy: () => resolveImageRefs(stripToPlainText(entry.content.split('\n')[li.__lineIdx] || ''), entry.images),
        onDelete: () => {
          const session = sessionFor(entry);
          commitItemLine(entry, li.__lineIdx, null, session);
          blockSessions.delete(entry.id);
          clearHoverHandle();
          card.__toView();
        },
        getRun: () => listItemRun(li),
        onReorder: (newOrder) => {
          clearHoverHandle();
          if (!newOrder) return;
          const reordered = reorderLines(entry.content.split('\n'), newOrder);
          if (reordered == null) return;
          reorderEntryContent(entry, reordered);
          card.__toView();
        },
      });
      handle.classList.add('hover-handle'); // center the pill on the row, not sticky-top
      li.classList.add('hover-row', 'hover-target'); // positioning context + action shade
      li.prepend(handle); // prepend so the row's real content keeps its :last-child rules
      hoverHandle = handle; hoverHandleFor = li;
    }

    // Ordered editable units as source-line indices: each non-list block is one
    // unit (its start line), each list row is its own unit.
    function editUnitStarts(content) {
      const lines = content.split('\n');
      const starts = [];
      splitBlocks(content).forEach(b => {
        if (isListLine(lines[b.start])) {
          for (let k = b.start; k <= b.end; k++) if (isListLine(lines[k])) starts.push(k);
        } else starts.push(b.start);
      });
      return starts;
    }

    // The unit adjacent (dir = ±1) to the one starting at `curStart`, described by
    // its text so it can be re-found after the current editor commits. Null at the
    // document edge.
    function neighborUnit(entry, curStart, dir) {
      const lines = entry.content.split('\n');
      const starts = editUnitStarts(entry.content);
      const i = starts.indexOf(curStart);
      if (i === -1) return null;
      const ts = starts[i + dir];
      if (ts == null) return null;
      if (isListLine(lines[ts])) return { kind: 'item', lineIdx: ts, text: itemTextOf(lines[ts]).trim() };
      const b = splitBlocks(entry.content).find(x => x.start <= ts && ts <= x.end);
      return { kind: 'block', start: b.start, text: lines.slice(b.start, b.end + 1).join('\n') };
    }

    // Re-find a block after a re-render: by its (stable, unique) start line first, then
    // by text — text alone collides on identical paragraphs (e.g. repeated `---`).
    function findBlockUnit(contentEl, start, text) {
      const blocks = [...contentEl.querySelectorAll('.md-block')];
      return (start != null && blocks.find(x => x.__block && x.__block.start === start))
        || blocks.find(x => blockText(x.__entry.content, x.__block) === text) || null;
    }

    // Open a neighbor unit after commit + re-render. Down → caret 0, Up → caret at end.
    function openNeighbor(entry, contentEl, target, dir) {
      const caret = dir === 1 ? 0 : null;
      if (target.kind === 'item') {
        const li = findItemLiByIdx(contentEl, target.lineIdx) || findItemLi(contentEl, target.text);
        if (li) beginItemEdit(li, li.closest('.md-block'), caret);
      } else {
        const blk = findBlockUnit(contentEl, target.start, target.text);
        if (blk) beginBlockEdit(blk, caret);
      }
    }

    // Build a small icon button for the sticky edit toolbar (format tools on the
    // left, then esc-hint, then cancel ✕ + save ✓ on the right).
    const iconBtn = (icon, title, cls) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.innerHTML = icon;
      b.title = title;
      if (cls) b.className = cls;
      return b;
    };

    // Build the edit toolbar: format tools on the left, then esc-hint, then the
    // right group (e.g. trash/cancel/save) pushed over. Shared by the block,
    // whole-note and composer editors.
    // toolFactories defaults to the full 5; item editors pass a shorter list
    // (no heading/list — those don't apply to a single list row's text).
    const ALL_TOOLS = [makeFormatButton, makeCycleButton, makeLinkButton, makeImageButton, makeEmojiButton];
    function mountEditTools(actions, ta, rightButtons, escHint, toolFactories) {
      actions.replaceChildren();
      (toolFactories || ALL_TOOLS).forEach(f => actions.append(f(ta)));
      if (escHint) actions.append(escHint);
      rightButtons[0].style.marginLeft = 'auto'; // push the right group over
      rightButtons.forEach(b => actions.append(b));
    }

    // Shared keybinding + hint behaviour for the two whole-note editors (the new-note
    // composer and the full-note edit mode). They differ only in what commit/discard
    // mean and their limit-warning wording; the two-step Esc-to-discard, Ctrl/Cmd+Enter
    // to commit, Enter list-continuation, and the esc-hint text are identical.
    //   onCommit()        -> save/append
    //   canDiscardNow()   -> discard immediately on the first Esc (clean / empty)
    //   onDiscard()       -> cancel/close
    //   overPct()         -> current size as a % of the doc limit (for the warning)
    //   overLabel         -> limit-warning prefix
    // Returns renderHint(), which the caller invokes whenever the size % changes.
    function wireEditorKeys(ta, hintEl, { onCommit, canDiscardNow, onDiscard, overPct, overLabel }) {
      let escPending = false;
      const renderHint = () => {
        if (escPending) hintEl.textContent = 'Esc again to discard';
        else if (overPct() > 100) hintEl.textContent = `${overLabel} (${overPct()}%)`;
        else hintEl.textContent = '';
      };
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); onCommit(); return; }
        if (e.key === 'Enter') { handleListContinuation(e, ta); return; }
        if (e.key === 'Escape') {
          e.preventDefault();
          if (canDiscardNow() || escPending) { escPending = false; onDiscard(); }
          else {
            escPending = true;
            renderHint();
            setTimeout(() => { escPending = false; renderHint(); }, 3000);
          }
        }
      });
      return renderHint;
    }

    // The bottom toolbar carries only format tools + cancel/save now; section
    // delete + copy moved onto the pop-out edit handle (see makeEditHandle).
    function mountBlockToolbar(actions, ta, { onSave, onCancel }, toolFactories) {
      const escHint = document.createElement('span');
      escHint.className = 'esc-hint';
      const cancelBtn = iconBtn(ICON.close, 'Cancel', 'btn-delete');
      cancelBtn.addEventListener('click', onCancel);
      const saveBtn = iconBtn(ICON.save, 'Save', 'btn-edit btn-save');
      saveBtn.addEventListener('click', onSave);
      mountEditTools(actions, ta, [cancelBtn, saveBtn], escHint, toolFactories);
      return escHint;
    }

    // Shared editor scaffold: a .block-edit textarea inside a .block-edit-wrap,
    // with autosize + caret-keep + image paste + the two-step-Esc keydown wired.
    // `onCommit(save, {keepSession})` closes the editor.
    function wireBlockEditor(ta, order, initialSrc, onCommit, navCtx) {
      ta._imgKey = activeBlock.entry.id;
      ta._imgOrder = order;
      autosize(ta);
      ta.focus();
      requestAnimationFrame(() => { autosize(ta); keepCaretVisible(ta); });
      ta.addEventListener('input', () => { autosize(ta); keepCaretVisible(ta); relayoutActiveEdit(); });
      attachImageInput(ta);
      let escPending = false;
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          e.preventDefault();
          const dirty = expandFromEdit(ta.value, order).replace(/\n+$/, '') !== initialSrc;
          if (!dirty || escPending) { onCommit(false); return; }
          escPending = true;
          activeBlock.escHint.textContent = 'Esc again to discard';
          setTimeout(() => { escPending = false; if (activeBlock) activeBlock.escHint.textContent = ''; }, 3000);
          return;
        }
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); onCommit(true); return; }
        if (e.key === 'Backspace' && navCtx?.mergePrev && navCtx.mergePrev(e)) return;
        // Ctrl/Cmd+Up/Down force a hop from anywhere, skipping the wrapped
        // rows — the express version of the plain-arrow edge hop below.
        if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && navCtx && (e.ctrlKey || e.metaKey)) {
          const dir = e.key === 'ArrowDown' ? 1 : -1;
          const target = neighborUnit(navCtx.entry, navCtx.unitStart, dir);
          if (!target) return;
          e.preventDefault();
          onCommit(true, { keepSession: true });
          openNeighbor(navCtx.entry, navCtx.contentEl, target, dir);
          return;
        }
        // Up/Down at the first/last line hop to the neighbouring editor, saving
        // this one on the way; mid-block they just move the caret; at the note's
        // edge they do nothing.
        if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && navCtx
            && ta.selectionStart === ta.selectionEnd) {
          const dir = e.key === 'ArrowDown' ? 1 : -1;
          // Hop only from the first/last VISUAL row; mid-block just move the
          // caret. (Probing after the move misfired: from the start, Down lands
          // on a wrap boundary that reads as the row above.)
          if (!caretAtVisualEdge(ta, dir)) return; // mid-block → move the caret
          const target = neighborUnit(navCtx.entry, navCtx.unitStart, dir);
          if (!target) return;
          e.preventDefault();
          onCommit(true, { keepSession: true });
          openNeighbor(navCtx.entry, navCtx.contentEl, target, dir);
          return;
        }
        if (e.key === 'Enter') handleListContinuation(e, ta);
      });
    }

    // Edit an existing block. `caret` is a source offset (null = end of block).
    function beginBlockEdit(blockDiv, caret) {
      const entry = blockDiv.__entry;
      const contentEl = blockDiv.closest('.entry-content');
      const card = blockDiv.closest('.entry-card');
      const actions = card.querySelector('.entry-actions');
      const b = blockDiv.__block;
      const src = blockText(entry.content, b);
      const { text: collapsed, order } = collapseForEdit(src);

      const wrap = document.createElement('div');
      wrap.className = 'block-edit-wrap';
      const ta = document.createElement('textarea');
      ta.className = 'block-edit';
      if (isFence(src.split('\n')[0])) ta.classList.add('code');
      ta.value = collapsed;
      ta.rows = 1;
      wrap.appendChild(ta);
      blockDiv.replaceWith(wrap);

      const session = sessionFor(entry);
      activeBlock = { wrap, ta, entry, contentEl, card, block: b, order, session, escHint: null };
      activeEdits.set(entry.id, { card, block: true }); // shield from snapshot re-renders
      card.classList.add('editing');

      const commit = (save, opts = {}) => {
        if (activeBlock !== current) return;
        activeBlock = null;
        activeEdits.delete(entry.id);
        if (save) applyBlockEdit(entry, b, expandFromEdit(ta.value, order), session);
        if (!opts.keepSession) blockSessions.delete(entry.id);
        card.__toView();
      };
      const current = activeBlock;
      current.commit = commit;
      current.escHint = mountBlockToolbar(actions, ta, {
        onSave: () => commit(true),
        onCancel: () => commit(false),
      });
      // Section delete lives on the edit handle now, not the bottom toolbar.
      const deleteBlock = () => { if (activeBlock === current) { activeBlock = null; activeEdits.delete(entry.id); applyBlockEdit(entry, b, '', session); blockSessions.delete(entry.id); card.__toView(); } };

      // Backspace at the very start merges this block into the previous one: its
      // text is appended to the previous block's source (blank separator dropped,
      // caret at the join) — the block-level analog of the list-row merge.
      const mergeIntoPrev = (e) => {
        if (ta.selectionStart !== 0 || ta.selectionEnd !== 0) return false;
        const blocks = splitBlocks(entry.content);
        const idx = blocks.findIndex(x => x.start === b.start);
        if (idx <= 0) return false; // first block → nothing before to merge into
        e.preventDefault();
        const prev = blocks[idx - 1];
        const lines = entry.content.split('\n');
        const prevText = lines.slice(prev.start, prev.end + 1).join('\n');
        const thisText = expandFromEdit(ta.value, order).replace(/\n+$/, '');
        const caretPos = prevText.length;
        const merged = prevText + thisText;
        const newContent = [...lines.slice(0, prev.start), ...merged.split('\n'), ...lines.slice(b.end + 1)].join('\n');
        if (activeBlock !== current) return true;
        activeBlock = null; activeEdits.delete(entry.id);
        applyEntryContent(entry, newContent, session);
        card.__toView();
        const blk = [...contentEl.querySelectorAll('.md-block')].find(x => x.__block && x.__block.start === prev.start);
        if (blk) beginBlockEdit(blk, caretPos);
        return true;
      };

      wireBlockEditor(ta, order, src, commit, { entry, contentEl, unitStart: b.start, mergePrev: mergeIntoPrev });
      const cc = order.length ? collapsed.length : Math.min(caret == null ? collapsed.length : caret, collapsed.length);
      ta.setSelectionRange(cc, cc);

      // Edit handle: drag to reorder this block among its siblings (drags the LIVE
      // editor; on drop, commit the move + any edit and re-open at the new spot),
      // plus copy-section and delete-section buttons.
      const handle = makeEditHandle(wrap, {
        onCopy: () => resolveImageRefs(stripToPlainText(expandFromEdit(ta.value, order).replace(/\n+$/, '')), entry.images),
        onDelete: deleteBlock,
        getRun: () => [...contentEl.querySelectorAll('.md-block, .block-edit-wrap')],
        onReorder: (newOrder) => {
          if (!newOrder || activeBlock !== current) return;
          const selStart = ta.selectionStart, selEnd = ta.selectionEnd;
          activeBlock = null; activeEdits.delete(entry.id);
          const lines = entry.content.split('\n');
          const wantText = expandFromEdit(ta.value, order).replace(/\n+$/, '');
          const newContent = newOrder
            .map(el => el === wrap ? wantText : lines.slice(el.__block.start, el.__block.end + 1).join('\n'))
            .filter(part => part.trim())
            .join('\n\n');
          if (wantText !== src) applyEntryContent(entry, newContent, session); // edit → history
          else reorderEntryContent(entry, newContent);                        // pure move → none
          card.__toView();
          if (wantText.trim()) {
            const blk = [...contentEl.querySelectorAll('.md-block')].find(x => blockText(x.__entry.content, x.__block) === wantText);
            if (blk) {
              beginBlockEdit(blk, selStart);
              if (activeBlock && activeBlock.ta.setSelectionRange) activeBlock.ta.setSelectionRange(selStart, selEnd);
            }
          }
        },
      });
      wrap.appendChild(handle);
      current.tabEl = handle.querySelector('.edit-handle-tab');
      positionRidge(card.__ridge, card, wrap, false);
      positionRidge(card.__hoverRidge, card, null); // clear the where-you'd-land preview
      requestAnimationFrame(relayoutActiveEdit);
    }

    // A brand-new paragraph above the first / below the last block.
    function beginNewBlockEdit(entry, contentEl, where) {
      const card = contentEl.closest('.entry-card');
      const actions = card.querySelector('.entry-actions');
      const wrap = document.createElement('div');
      wrap.className = 'block-edit-wrap';
      const ta = document.createElement('textarea');
      ta.className = 'block-edit';
      ta.rows = 1;
      wrap.appendChild(ta);
      const zTop = contentEl.querySelector('.new-zone:not(.bottom)');
      const zBot = contentEl.querySelector('.new-zone.bottom');
      if (where === 'top') (zTop ? zTop.after(wrap) : contentEl.prepend(wrap));
      else (zBot ? zBot.before(wrap) : contentEl.appendChild(wrap));

      const session = sessionFor(entry);
      activeBlock = { wrap, ta, entry, contentEl, card, block: null, where, order: [], session, escHint: null };
      activeEdits.set(entry.id, { card, block: true });
      card.classList.add('editing');

      const commit = (save, opts = {}) => {
        if (activeBlock !== current) return;
        activeBlock = null;
        activeEdits.delete(entry.id);
        if (save) {
          const v = expandFromEdit(ta.value, ta._imgOrder).trim();
          if (v) applyEntryContent(entry, where === 'top' ? v + '\n\n' + entry.content : entry.content + '\n\n' + v, session);
        }
        if (!opts.keepSession) blockSessions.delete(entry.id);
        card.__toView();
      };
      const current = activeBlock;
      current.commit = commit;
      current.escHint = mountBlockToolbar(actions, ta, {
        onSave: () => commit(true),
        onCancel: () => commit(false),
      });
      // Backspace at the start cancels this brand-new block back into the previous
      // section: its text (if any) appends to the last existing block, caret at the
      // join — the new-block analog of the block editor's mergeIntoPrev.
      const mergeNewIntoPrev = (e) => {
        if (ta.selectionStart !== 0 || ta.selectionEnd !== 0) return false;
        if (where !== 'bottom') return false; // a new TOP block has nothing before it
        const blocks = splitBlocks(entry.content);
        if (!blocks.length) return false;      // empty note → nothing to merge into
        e.preventDefault();
        if (activeBlock !== current) return true;
        activeBlock = null; activeEdits.delete(entry.id);
        const prev = blocks[blocks.length - 1];
        const lines = entry.content.split('\n');
        const prevText = lines.slice(prev.start, prev.end + 1).join('\n');
        const thisText = expandFromEdit(ta.value, ta._imgOrder).replace(/\n+$/, '');
        if (thisText) applyEntryContent(entry, [...lines.slice(0, prev.start), ...(prevText + thisText).split('\n')].join('\n'), session);
        card.__toView();
        const blk = [...contentEl.querySelectorAll('.md-block')].find(x => x.__block && x.__block.start === prev.start);
        if (blk) beginBlockEdit(blk, prevText.length);
        return true;
      };
      wireBlockEditor(ta, [], '', commit, { entry, contentEl, mergePrev: mergeNewIntoPrev });
    }

    // ── Per-item editing (list rows) ──
    // prefix = the marker (+ checkbox syntax); group 2 = the row's editable text.
    const ITEM_RE = /^(\s*(?:[-*+]|\d+[.)])\s+(?:\[[ xX]\]\s*|\([ xX]\)\s*)?)(.*)$/;
    const itemTextOf = (line) => { const m = (line || '').match(ITEM_RE); return m ? m[2] : (line || ''); };

    // Re-find a list <li> after a re-render by its source text (line indices shift).
    function findItemLi(contentEl, text) {
      return [...contentEl.querySelectorAll('.md-block.list-block li')].find(li => {
        if (li.__lineIdx == null) return false;
        const ln = li.closest('.md-block').__entry.content.split('\n')[li.__lineIdx];
        return itemTextOf(ln).trim() === text;
      });
    }
    function findItemLiByIdx(contentEl, idx) {
      if (idx == null) return null;
      return [...contentEl.querySelectorAll('.md-block.list-block li')].find(li => li.__lineIdx === idx) || null;
    }

    // Edit a single list row: swap its text for a bare input, keep the checkbox.
    function beginItemEdit(li, blockDiv, caret) {
      const entry = blockDiv.__entry;
      const contentEl = blockDiv.closest('.entry-content');
      const card = blockDiv.closest('.entry-card');
      const actions = card.querySelector('.entry-actions');
      const lineIdx = li.__lineIdx;
      const line = entry.content.split('\n')[lineIdx] || '';
      const m = line.match(ITEM_RE);
      let prefix = m ? m[1] : '';            // marker + checkbox; the toggle edits this
      const text = m ? m[2] : line;
      const { text: collapsed, order } = collapseForEdit(text);
      // Soft line breaks inside a row are stored as <br> (keeps the one-source-line-per-
      // row invariant) but shown as real newlines while editing; readSrc re-encodes them
      // on every commit path so a Shift+Enter break round-trips.
      const collapsedShown = collapsed.replace(/<br\s*\/?>/gi, '\n');

      // A textarea (not an input) so long item text wraps + grows as you type,
      // like the rendered row; Enter is intercepted below for the split.
      const input = document.createElement('textarea');
      input.className = 'item-edit';
      input.rows = 1;
      input.value = collapsedShown;
      const readSrc = () => expandFromEdit(input.value, order).replace(/\n/g, '<br>');
      const span = li.querySelector('.todo-text');
      if (span) span.replaceWith(input);
      else {
        // Plain row: keep a nested sub-list intact — drop only the leading text
        // nodes and put the input before the sub-list (or at the end if none).
        const nested = li.querySelector(':scope > ul, :scope > ol');
        while (li.firstChild && li.firstChild !== nested) li.removeChild(li.firstChild);
        if (nested) li.insertBefore(input, nested); else li.appendChild(input);
      }
      li.classList.add('editing-item');

      // Keep the checkbox toggleable while editing: clone it (drops the view-mode
      // change handler that would re-render), and on toggle rewrite the marker in
      // `prefix` + restyle the row — no re-render, so the edit is untouched.
      const cb = li.querySelector('input[type="checkbox"]');
      if (cb) {
        const freshCb = cb.cloneNode(false);
        cb.replaceWith(freshCb);
        freshCb.disabled = false;
        freshCb.addEventListener('mousedown', (e) => e.preventDefault()); // keep input focus
        freshCb.addEventListener('change', () => {
          const on = freshCb.checked;
          prefix = prefix.replace(/\(( |x|X)\)/, on ? '(x)' : '( )').replace(/\[( |x|X)\]/, on ? '[x]' : '[ ]');
          li.classList.toggle('checked', on);
          input.focus();
        });
      }

      const session = sessionFor(entry);
      activeBlock = { wrap: li, ta: input, entry, contentEl, card, isItem: true, lineIdx, order, session, escHint: null };
      activeEdits.set(entry.id, { card, block: true });
      card.classList.add('editing');

      const commit = (save, opts = {}) => {
        if (activeBlock !== current) return;
        activeBlock = null;
        activeEdits.delete(entry.id);
        if (save) {
          const v = readSrc().trim();
          // Keep the row even when empty (an intentional blank item) — only
          // Backspace-merge and the trash button remove a row.
          commitItemLine(entry, lineIdx, prefix + v, session);
        }
        if (!opts.keepSession) blockSessions.delete(entry.id);
        card.__toView();
      };
      const current = activeBlock;
      current.commit = commit;
      current.escHint = mountBlockToolbar(actions, input, {
        onSave: () => commit(true),
        onCancel: () => commit(false),
      }, [makeFormatButton, makeLinkButton, makeImageButton, makeEmojiButton]);
      // Row delete lives on the edit handle now, not the bottom toolbar.
      const deleteItem = () => { if (activeBlock === current) { activeBlock = null; activeEdits.delete(entry.id); commitItemLine(entry, lineIdx, null, session); blockSessions.delete(entry.id); card.__toView(); } };

      input._imgKey = entry.id;
      input._imgOrder = order;
      input.focus();
      const cc = order.length ? collapsedShown.length : Math.min(caret == null ? collapsedShown.length : caret, collapsedShown.length);
      input.setSelectionRange(cc, cc);
      autosize(input);
      requestAnimationFrame(() => { autosize(input); keepCaretVisible(input); });
      input.addEventListener('input', () => { autosize(input); keepCaretVisible(input); relayoutActiveEdit(); });
      attachImageInput(input);
      positionRidge(card.__ridge, card, li, false);
      positionRidge(card.__hoverRidge, card, null); // clear the where-you'd-land preview

      // Edit handle: drag to reorder this row among its list siblings (on drop,
      // commit any text edit + the move and re-open the row moved), plus copy-row
      // and delete-row buttons.
      if (lineIdx != null) {
        const handle = makeEditHandle(li, {
          onCopy: () => resolveImageRefs(stripToPlainText(prefix + expandFromEdit(input.value, order)), entry.images),
          onDelete: deleteItem,
          getRun: () => listItemRun(li),
          onReorder: (newOrder) => {
            if (!newOrder || activeBlock !== current) return;
            activeBlock = null; activeEdits.delete(entry.id);
            const edited = readSrc() !== text || prefix !== (m ? m[1] : ''); // prefix carries a checkbox toggle
            let lines = entry.content.split('\n');
            if (edited) lines[lineIdx] = prefix + readSrc().trim(); // keep row even if empty
            const reordered = reorderLines(lines, newOrder);
            const finalContent = reordered != null ? reordered : lines.join('\n');

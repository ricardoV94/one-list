            if (edited) applyEntryContent(entry, finalContent, session); // edit → history
            else if (reordered != null) reorderEntryContent(entry, finalContent); // move → none
            // Reordering a row lands in view mode — the row's text can be a duplicate,
            // so re-finding "the row I moved" by text would re-open the wrong one.
            blockSessions.delete(entry.id); // burst over (view mode) — match the other terminal paths
            card.__toView();
          },
        });
        li.appendChild(handle);
        current.tabEl = handle.querySelector('.edit-handle-tab');
        requestAnimationFrame(relayoutActiveEdit);
      }

      // Split at the caret into a new row below; merge into the previous row on
      // Backspace at the start — reopening the resulting row keeps you editing.
      // Prefer the (known, unique) line index; text collides on empty/dup rows.
      const reopenItem = (targetLineIdx, targetText, targetCaret) => {
        const t = findItemLiByIdx(contentEl, targetLineIdx) || findItemLi(contentEl, targetText);
        if (t) beginItemEdit(t, t.closest('.md-block'), targetCaret);
      };
      let escPending = false;
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          e.preventDefault();
          const dirty = readSrc().trim() !== text.trim() || prefix !== (m ? m[1] : '');
          if (!dirty || escPending) { commit(false); return; }
          escPending = true;
          current.escHint.textContent = 'Esc again to discard';
          setTimeout(() => { escPending = false; if (activeBlock === current) current.escHint.textContent = ''; }, 3000);
          return;
        }
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); commit(true); return; }
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
          const dir = e.key === 'ArrowDown' ? 1 : -1;
          // Hop to the neighbor from the first/last VISUAL row; mid-item just
          // move the caret (a row can wrap to several visual lines). Measure the
          // caret's visual row against the row count via pixel geometry, exactly
          // like the block editor — the true-string-offset test needed two
          // presses (move to end, then hop) on wrapped rows. Ctrl/Cmd forces the
          // hop from anywhere.
          if (input.selectionStart !== input.selectionEnd) return;
          if (!(e.ctrlKey || e.metaKey || caretAtVisualEdge(input, dir))) return;
          const target = neighborUnit(entry, lineIdx, dir);
          if (!target) return;
          e.preventDefault();
          if (activeBlock !== current) return;
          activeBlock = null; activeEdits.delete(entry.id);
          // Save on the way out but keep even an empty row (don't delete on nav).
          // Compare prefix too — a checkbox toggle changes only the prefix, not the text.
          if (readSrc() !== text || prefix !== (m ? m[1] : '')) commitItemLine(entry, lineIdx, prefix + readSrc().trim(), session);
          card.__toView();
          openNeighbor(entry, contentEl, target, dir);
          return;
        }
        if (e.key === 'Enter' && !e.shiftKey) {   // Shift+Enter falls through → soft line break
          e.preventDefault();
          if (activeBlock !== current) return;
          activeBlock = null; activeEdits.delete(entry.id);
          const before = expandFromEdit(input.value.slice(0, input.selectionStart ?? input.value.length), order).replace(/\n/g, '<br>');
          const after = expandFromEdit(input.value.slice(input.selectionEnd ?? input.value.length), order).replace(/\n/g, '<br>');
          const newPrefix = prefix.replace(/\((?:x|X| )\)/, '( )').replace(/\[(?:x|X| )\]/, '[ ]');
          const lines = entry.content.split('\n');
          lines[lineIdx] = prefix + before.trim();
          lines.splice(lineIdx + 1, 0, newPrefix + after.trim());
          applyEntryContent(entry, lines.join('\n'), session);
          card.__toView();
          reopenItem(lineIdx + 1, after.trim(), 0); // the new row
          return;
        }
        if (e.key === 'Backspace' && input.selectionStart === 0 && input.selectionEnd === 0) {
          const prevLi = li.previousElementSibling;
          const thisText = readSrc();
          if (prevLi && prevLi.__lineIdx != null) {
            // Merge into the previous list row.
            e.preventDefault();
            if (activeBlock !== current) return;
            activeBlock = null; activeEdits.delete(entry.id);
            const prevLineIdx = prevLi.__lineIdx; // stable (before lineIdx, unshifted by the splice)
            const lines = entry.content.split('\n');
            const pm = (lines[prevLineIdx] || '').match(ITEM_RE);
            const prevPrefix = pm ? pm[1] : '';
            const prevText = pm ? pm[2] : (lines[prevLineIdx] || '');
            const merged = prevText + thisText;
            lines[prevLineIdx] = prevPrefix + merged;
            lines.splice(lineIdx, 1);
            applyEntryContent(entry, lines.join('\n'), session);
            card.__toView();
            reopenItem(prevLineIdx, merged.trim(), prevText.length); // the merged row
            return;
          }
          // Topmost row of the list: merge into the previous UNIT instead of bailing —
          // the same neighbor ArrowUp hops to (a paragraph/heading block, or a prior
          // list's last row). Mirrors the block editor's mergeIntoPrev.
          const target = neighborUnit(entry, lineIdx, -1);
          if (!target) return; // nothing before → browser default
          e.preventDefault();
          if (activeBlock !== current) return;
          activeBlock = null; activeEdits.delete(entry.id);
          const lines = entry.content.split('\n');
          if (target.kind === 'item') {
            const pm = (lines[target.lineIdx] || '').match(ITEM_RE);
            const prevPrefix = pm ? pm[1] : '';
            const prevText = pm ? pm[2] : (lines[target.lineIdx] || '');
            const merged = prevText + thisText;
            lines[target.lineIdx] = prevPrefix + merged;
            lines.splice(lineIdx, 1);
            applyEntryContent(entry, lines.join('\n'), session);
            card.__toView();
            reopenItem(target.lineIdx, merged.trim(), prevText.length);
          } else {
            // Previous unit is a block (paragraph/heading): append this row's text to
            // its end, drop the blank separator, keep any remaining rows as their own
            // block. Caret lands at the join, like mergeIntoPrev.
            const blocks = splitBlocks(entry.content);
            const prev = blocks[blocks.findIndex(x => x.start <= lineIdx && lineIdx <= x.end) - 1];
            const prevText = lines.slice(prev.start, prev.end + 1).join('\n');
            const head = [...lines.slice(0, prev.start), ...(prevText + thisText).split('\n')];
            const tail = lines.slice(lineIdx + 1); // remaining rows + anything after
            const newContent = (tail.length && tail[0].trim() !== '' ? [...head, '', ...tail] : [...head, ...tail]).join('\n');
            applyEntryContent(entry, newContent, session);
            card.__toView();
            const blk = [...contentEl.querySelectorAll('.md-block')].find(x => x.__block && x.__block.start === prev.start);
            if (blk) beginBlockEdit(blk, prevText.length);
          }
          return;
        }
      });
    }

    // Commit one list line: replace it, or remove it (newLine === null → row gone).
    function commitItemLine(entry, lineIdx, newLine, session) {
      const lines = entry.content.split('\n');
      if (newLine === null) lines.splice(lineIdx, 1);
      else lines[lineIdx] = newLine;
      applyEntryContent(entry, lines.join('\n'), session);
    }

    // Re-find and open a switch target after a commit re-rendered the note. Blocks
    // are re-found by their source text (indices shift when the prior commit edits
    // lines above them); zones by position; items by their text.
    function openBlockTarget(t) {
      if (!t.contentEl.isConnected) return;
      if (t.kind === 'zone') {
        beginNewBlockEdit(t.entry, t.contentEl, t.where);
      } else if (t.kind === 'item') {
        // Prefer the (unique) line index; fall back to text if it shifted.
        const li = findItemLiByIdx(t.contentEl, t.lineIdx) || findItemLi(t.contentEl, t.itemText);
        if (li) beginItemEdit(li, li.closest('.md-block'), t.caret);
      } else {
        const blk = findBlockUnit(t.contentEl, t.start, t.text);
        if (blk) beginBlockEdit(blk, t.caret);
      }
    }

    // The editable block/zone/item (if any) that a point resolves to, for hopping.
    function computeSwitchTarget(t, x, y) {
      const zone = t.closest('.new-zone');
      if (zone) return { kind: 'zone', contentEl: zone.closest('.entry-content'), entry: zone.__entry, where: zone.classList.contains('bottom') ? 'bottom' : 'top' };
      const blk = t.closest('.md-block');
      if (!blk || t.closest('a, input, button')) return null;
      if (blk.classList.contains('list-block')) {
        const li = t.closest('li');
        if (li && li.__lineIdx != null) {
          const line = blk.__entry.content.split('\n')[li.__lineIdx] || '';
          const m = line.match(ITEM_RE);
          // lineIdx is the stable identity (text collides on empty/duplicate rows);
          // itemText is only a fallback if the index shifts under the commit.
          return { kind: 'item', contentEl: blk.closest('.entry-content'), lineIdx: li.__lineIdx, itemText: (m ? m[2] : line).trim(), caret: sourceOffsetFromPoint(x, y, m ? m[2] : line) };
        }
        const src = blockText(blk.__entry.content, blk.__block); // gutter → whole list
        return { kind: 'block', contentEl: blk.closest('.entry-content'), start: blk.__block.start, text: src, caret: null };
      }
      const src = blockText(blk.__entry.content, blk.__block);
      return { kind: 'block', contentEl: blk.closest('.entry-content'), start: blk.__block.start, text: src, caret: sourceOffsetFromPoint(x, y, src) };
    }

    // Leaving the open editor is decided on pointerUP, not down: a press that turns
    // into a scroll/drag (moved) or produces a text selection is NOT "done editing"
    // — you might be scrolling, or selecting text elsewhere to copy. Only a clean
    // tap outside commits (and hops, if it landed on another editable block/zone).
    let pendingOutside = null;
    document.addEventListener('pointerdown', (e) => {
      pendingOutside = null;
      if (!activeBlock) return;
      if (activeBlock.wrap.contains(e.target)) return;         // inside the editor
      const bar = activeBlock.card.querySelector('.entry-actions');
      if (bar && bar.contains(e.target)) return;               // the toolbar / its popovers
      pendingOutside = { x: e.clientX, y: e.clientY, target: e.target, moved: false };
    }, true);
    document.addEventListener('pointermove', (e) => {
      if (pendingOutside && (Math.abs(e.clientX - pendingOutside.x) > 8 || Math.abs(e.clientY - pendingOutside.y) > 8)) pendingOutside.moved = true;
    }, true);
    document.addEventListener('pointercancel', () => { pendingOutside = null; }, true);
    document.addEventListener('pointerup', () => {
      const info = pendingOutside; pendingOutside = null;
      if (!info || !activeBlock) return;
      if (info.moved) return;                             // scroll / drag → stay editing
      if (!window.getSelection().isCollapsed) return;     // text selected outside → keep it, stay editing
      const closing = activeBlock;
      const closingEntry = closing.entry;
      const target = computeSwitchTarget(info.target, info.x, info.y);
      // target's indices were captured against pre-commit content; committing the
      // current editor can add/remove lines ABOVE the target, shifting its index by
      // the net change in total line count. Shift only a target below the closing edit.
      const closingStart = closing.isItem ? closing.lineIdx
        : (closing.block ? closing.block.start
        : (closing.where === 'top' ? 0 : Infinity)); // new-paragraph zone: top inserts at 0, bottom after all rows
      const beforeLen = closingEntry.content.split('\n').length;
      closing.commit(true, { keepSession: true });        // keep; end below if we've left
      if (target) {
        const delta = closingEntry.content.split('\n').length - beforeLen;
        const idx = target.lineIdx ?? target.start;
        if (delta && idx != null && closingStart <= idx) {
          if (target.lineIdx != null) target.lineIdx += delta;
          if (target.start != null) target.start += delta;
        }
        openBlockTarget(target);
      }
      // End the closed note's history-coalescing session unless we're still in it
      // (a block-to-block hop within the same note keeps one session = one version).
      if (!activeBlock || activeBlock.entry !== closingEntry) blockSessions.delete(closingEntry.id);
    }, true);

    function attachCodeCopyButtons(contentEl) {
      contentEl.querySelectorAll('pre').forEach(pre => {
        const code = pre.querySelector('code');
        if (!code) return;
        // Wrap the (scrollable) pre so the copy button can anchor to a
        // non-scrolling parent and stay pinned while tall code scrolls.
        let wrap = pre.parentElement;
        if (wrap && wrap.classList.contains('pre-wrap')) {
          if (wrap.querySelector('.code-copy-btn')) return;
        } else {
          wrap = document.createElement('div');
          wrap.className = 'pre-wrap';
          pre.replaceWith(wrap);
          wrap.appendChild(pre);
        }
        const btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.innerHTML = ICON.copy;
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          await navigator.clipboard.writeText(code.textContent);
          flashCopied(btn);
        });
        wrap.appendChild(btn);
      });
    }

    function attachCheckboxHandlers(contentEl, entry) {
      applyTodoMarkup(contentEl);
      attachCodeCopyButtons(contentEl);
      // Stamp each checkbox with its markdown index (DOM order matches markdown order)
      contentEl.querySelectorAll('input[type="checkbox"]').forEach((cb, i) => {
        cb.dataset.mdIdx = i;
      });

      contentEl.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        const mdIdx = parseInt(cb.dataset.mdIdx);
        cb.disabled = false;
        cb.addEventListener('change', async () => {
          let count = 0;
          const newContent = entry.content.replace(CB_RE, (match, prefix, sqCheck, rdCheck) => {
            if (count++ === mdIdx) {
              if (rdCheck !== undefined) return prefix + (cb.checked ? '(x)' : '( )');
              return prefix + (cb.checked ? '[x]' : '[ ]');
            }
            return match;
          });
          if (newContent !== entry.content) {
            entry.content = newContent;
            rerenderContent(contentEl, entry);
            pendingCheckboxUpdates.add(entry.id);
            try {
              await updateDoc(doc(db, 'entries', entry.id), { content: entry.content });
            } catch (err) {
              console.error('Checkbox update failed', err);
            } finally {
              // Always unblock re-renders, even on a failed write, and re-merge so
              // any snapshot skipped while the write was in flight gets applied.
              pendingCheckboxUpdates.delete(entry.id);
              mergeAndRender();
            }
          }
        });
      });
    }

    function handleListContinuation(e, textarea) {
      if (e.key !== 'Enter' || e.ctrlKey || e.metaKey || e.shiftKey) return false;
      const { selectionStart, value } = textarea;
      const before = value.slice(0, selectionStart);
      const lineStart = before.lastIndexOf('\n') + 1;
      const line = before.slice(lineStart);
      // Match bullet/todo/checkbox/numbered list patterns
      const match = line.match(/^(\s*)([-*]\s+\(([ xX]| )\)\s?|[-*]\s+\[([ xX])\]\s?|[-*]\s+|(\d+)([.)])\s+)(.*)/);
      if (!match) return false;
      const [, indent, prefix, todoCheck, checkbox, num, delim, content] = match;
      // If current line's content is empty, clear the list marker instead
      if (!content) {
        e.preventDefault();
        textarea.setRangeText('', lineStart, selectionStart, 'end');
        textarea.dispatchEvent(new Event('input'));
        return true;
      }
      let newPrefix;
      if (todoCheck !== undefined) {
        // Todo list - always insert unchecked
        newPrefix = indent + prefix.replace(/\([ xX]\)/, '( )');
      } else if (checkbox !== undefined) {
        // Checkbox list - always insert unchecked
        newPrefix = indent + prefix.replace(/\[[ xX]\]/, '[ ]');
      } else if (num) {
        newPrefix = indent + (parseInt(num) + 1) + delim + ' ';
      } else {
        newPrefix = indent + prefix;
      }
      e.preventDefault();
      textarea.setRangeText('\n' + newPrefix, selectionStart, selectionStart, 'end');
      textarea.dispatchEvent(new Event('input'));
      return true;
    }

    // ── List-mode cycle icons ──
    function listModeIcon(mode) {
      const a = `width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"`;
      const lines = `<line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/>`;
      if (mode === 'todo') return `<svg ${a}>${lines}<polyline points="2.5 6 4 7.5 7.5 4" stroke-width="2"/><polyline points="2.5 12 4 13.5 7.5 10" stroke-width="2"/><polyline points="2.5 18 4 19.5 7.5 16" stroke-width="2"/></svg>`;
      if (mode === 'checkbox') return `<svg ${a}>${lines}<rect x="3" y="4" width="4" height="4" rx="0.8" fill="none" stroke-width="1.2"/><rect x="3" y="10" width="4" height="4" rx="0.8" fill="none" stroke-width="1.2"/><rect x="3" y="16" width="4" height="4" rx="0.8" fill="none" stroke-width="1.2"/></svg>`;
      if (mode === 'bullet') return `<svg ${a}>${lines}<circle cx="5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>`;
      if (mode === 'numbered') return `<svg ${a}>${lines}<text x="5" y="7.5" text-anchor="middle" fill="currentColor" stroke="none" font-size="7" font-family="sans-serif" font-weight="600">1</text><text x="5" y="13.5" text-anchor="middle" fill="currentColor" stroke="none" font-size="7" font-family="sans-serif" font-weight="600">2</text><text x="5" y="19.5" text-anchor="middle" fill="currentColor" stroke="none" font-size="7" font-family="sans-serif" font-weight="600">3</text></svg>`;
      return `<svg ${a}><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>`;
    }

    const LIST_MODES = [
      { id: 'plain',    label: 'Plain text',      prefix: '' },
      { id: 'todo',     label: '- [ ] Todo',     prefix: '- [ ] ' },
      { id: 'bullet',   label: '- Bullet',        prefix: '- ' },
      { id: 'numbered', label: '1. Numbered',     prefix: null },
    ];
    const STRIP_LIST_RE = /^(\s*)(?:[-*]\s+\([ xX]\)\s?|[-*]\s+\[[ xX]\]\s?|[-*]\s+|\d+[.)]\s+)/;

    function detectListMode(lines) {
      for (const line of lines) {
        if (!line.trim()) continue;
        // Both - [ ] (canonical) and legacy - ( ) read as 'todo'.
        if (/^\s*[-*]\s+(?:\([ xX]\)|\[[ xX]\])/.test(line)) return 'todo';
        if (/^\s*\d+[.)]\s+/.test(line)) return 'numbered';
        if (/^\s*[-*]\s+/.test(line)) return 'bullet';
      }
      return 'plain';
    }

    function applyListMode(textarea, modeId) {
      const { selectionStart, selectionEnd, value } = textarea;
      const fullStart = value.lastIndexOf('\n', selectionStart - 1) + 1;
      const rawEnd = selectionStart === selectionEnd
        ? value.indexOf('\n', selectionStart)
        : value.indexOf('\n', selectionEnd);
      const fullEnd = rawEnd === -1 ? value.length : rawEnd;

      const before = value.slice(0, fullStart);
      const selected = value.slice(fullStart, fullEnd);
      const after = value.slice(fullEnd);
      const lines = selected.split('\n');
      const mode = LIST_MODES.find(m => m.id === modeId);

      const replacement = lines.map((line, i) => {
        const indent = line.match(/^(\s*)/)[1];
        // Detect checked state before stripping
        const isChecked = /[-*]\s+\([xX]\)|[-*]\s+\[[xX]\]/.test(line);
        const stripped = line.replace(STRIP_LIST_RE, '$1').trim();
        // Skip blank lines only in a multi-line selection; on a single empty line
        // still insert the marker so you can start a list item from scratch.
        if (!stripped && lines.length > 1) return line;
        if (modeId === 'numbered') return indent + (i + 1) + '. ' + stripped;
        if (modeId === 'plain') return indent + stripped;
        if (modeId === 'todo') return indent + (isChecked ? '- [x] ' : '- [ ] ') + stripped;
        return indent + mode.prefix + stripped;
      }).join('\n');

      textarea.value = before + replacement + after;
      if (lines.length === 1 && !selected.trim()) {
        // Inserted a marker on an empty line → put the caret after it to type.
        textarea.selectionStart = textarea.selectionEnd = before.length + replacement.length;
      } else {
        textarea.selectionStart = before.length;
        textarea.selectionEnd = before.length + replacement.length;
      }
      textarea.dispatchEvent(new Event('input'));
      textarea.focus();
    }

    // Generic cycle button: a single button that advances through `modes` on
    // click, plus a hover/long-press popover to jump straight to any mode. The
    // list-style and text-format buttons are both built on this.
    //   detect(textarea)   -> id of the mode currently active at the cursor
    //   apply(textarea, id, current) -> mutate the textarea to that mode
    //   iconFor(id) / labelFor(mode) -> popover + button glyphs/titles
    //   suggest(detectedId, textarea) -> id to show on the button face / apply on
    //     click (defaults to the next mode in `modes`). Lets a button start from a
    //     smarter default than "next" when nothing is active at the cursor.
    //   popoverModes(textarea) -> subset of `modes` to list in the popover right now
    //     (defaults to all). Lets a mode be hidden when it doesn't apply in context —
    //     e.g. Heading 1 only appears on the note's first line, like the list button
    //     not offering "list" to a line that can't take one.
    function makeCyclePopoverButton(textarea, { modes, detect, apply, iconFor, labelFor, suggest, popoverModes }) {
      const wrapper = document.createElement('div');
      wrapper.className = 'cycle-wrapper';
      const btn = document.createElement('button');
      btn.type = 'button';
      // Keep focus in the editor so applying a format doesn't blur→refocus (which
      // makes the browser scroll the textarea into view — a jarring second scroll).
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      const popover = document.createElement('div');
      popover.className = 'cycle-popover';
      wrapper.append(btn, popover);

      const nextOf = (id) => modes[(modes.findIndex(m => m.id === id) + 1) % modes.length];
      const suggestId = (id) => (suggest ? suggest(id, textarea) : nextOf(id).id);

      function updateBtn() {
        const next = modes.find(m => m.id === suggestId(detect(textarea))) || nextOf(detect(textarea));
        btn.innerHTML = iconFor(next.id);
        btn.title = labelFor(next);
      }

      function buildPopover() {
        const current = detect(textarea);
        popover.innerHTML = '';
        (popoverModes ? popoverModes(textarea) : modes).forEach(m => {
          const b = document.createElement('button');
          b.type = 'button';
          b.addEventListener('mousedown', (e) => e.preventDefault()); // keep editor focus
          b.innerHTML = iconFor(m.id);
          b.title = labelFor(m);
          if (m.id === current) b.classList.add('active');
          b.addEventListener('click', (e) => {
            e.stopPropagation();
            apply(textarea, m.id, current);
            updateBtn();
            popover.classList.remove('show');
          });
          popover.appendChild(b);
        });
      }

      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const current = detect(textarea);
        apply(textarea, suggestId(current), current);
        updateBtn();
      });

      // Hover: show popover (desktop only — skip if last interaction was touch)
      let hoverTimer = null;
      let lastTouchTime = 0;
      btn.addEventListener('mouseenter', () => {
        if (Date.now() - lastTouchTime < 1000) return;
        hoverTimer = setTimeout(() => { buildPopover(); popover.classList.add('show'); }, 400);
      });
      btn.addEventListener('mouseleave', () => {
        clearTimeout(hoverTimer);
        setTimeout(() => {
          if (!popover.matches(':hover') && !btn.matches(':hover')) popover.classList.remove('show');
        }, 200);
      });
      popover.addEventListener('mouseleave', () => {
        setTimeout(() => {
          if (!popover.matches(':hover') && !btn.matches(':hover')) popover.classList.remove('show');
        }, 200);
      });

      // Touch: long press
      let pressTimer = null;
      btn.addEventListener('touchstart', (e) => {
        lastTouchTime = Date.now();
        pressTimer = setTimeout(() => { e.preventDefault(); buildPopover(); popover.classList.add('show'); }, 500);
      }, { passive: false });
      btn.addEventListener('touchend', () => clearTimeout(pressTimer));
      btn.addEventListener('touchmove', () => clearTimeout(pressTimer));

      document.addEventListener('click', (e) => {
        if (!popover.contains(e.target) && !btn.contains(e.target)) popover.classList.remove('show');
      });

      // Update icon when the text or caret changes. selectionchange (fired on the
      // document) is the only reliable signal for caret moves via touch tap or a
      // programmatic setSelectionRange — click/keyup miss those, so the face would
      // otherwise go stale (e.g. the heading suggestion not appearing once you move
      // back up to the note's first line).
      textarea.addEventListener('input', updateBtn);
      textarea.addEventListener('click', updateBtn);
      textarea.addEventListener('keyup', updateBtn);
      document.addEventListener('selectionchange', () => {
        if (document.activeElement === textarea) updateBtn();
      });
      // Set the icon synchronously (not on a later tick): an empty button is narrower,
      // so deferring the fill makes the toolbar reflow and the neighbouring buttons
      // jitter the moment you enter edit mode. selectionchange refines it afterwards.
      updateBtn();

      return wrapper;
    }

    function selectedLines(textarea) {
      const { selectionStart, selectionEnd, value } = textarea;
      const fullStart = value.lastIndexOf('\n', selectionStart - 1) + 1;
      const rawEnd = selectionStart === selectionEnd
        ? value.indexOf('\n', selectionStart)
        : value.indexOf('\n', selectionEnd);
      const fullEnd = rawEnd === -1 ? value.length : rawEnd;
      return value.slice(fullStart, fullEnd).split('\n');
    }

    // Which list style is most used across the whole note — the button suggests
    // that one first, so a note full of numbered items keeps offering numbered.
    function mostUsedListMode(textarea) {
      const counts = { todo: 0, numbered: 0, bullet: 0 };
      for (const line of textarea.value.split('\n')) {
        if (!line.trim()) continue;
        if (/^\s*[-*]\s+(?:\([ xX]\)|\[[ xX]\])/.test(line)) counts.todo++;
        else if (/^\s*\d+[.)]\s+/.test(line)) counts.numbered++;
        else if (/^\s*[-*]\s+/.test(line)) counts.bullet++;
      }
      let best = null, bestN = 0;
      for (const k of ['todo', 'numbered', 'bullet']) if (counts[k] > bestN) { bestN = counts[k]; best = k; }
      return best;
    }

    function makeCycleButton(textarea) {
      return makeCyclePopoverButton(textarea, {
        modes: LIST_MODES,
        detect: (ta) => detectListMode(selectedLines(ta)),
        apply: (ta, id) => applyListMode(ta, id),
        iconFor: (id) => listModeIcon(id),
        labelFor: (m) => m.label,
        // From a non-list line, suggest the note's most-used list style (falling
        // back to the fixed cycle order when the note has no lists yet).
        suggest: (id, ta) => {
          const nextId = LIST_MODES[(LIST_MODES.findIndex(m => m.id === id) + 1) % LIST_MODES.length].id;
          return id === 'plain' ? (mostUsedListMode(ta) || nextId) : nextId;
        },
      });
    }

    // ── Heading level (#, ##, ###) ──
    // Like the list button, this rewrites the prefix of every selected line.
    const HEADER_MODES = [
      { id: 'plain', label: 'Regular text', hashes: '' },
      { id: 'h1',    label: 'Heading 1',    hashes: '# ' },
      { id: 'h2',    label: 'Heading 2',    hashes: '## ' },
      { id: 'h3',    label: 'Heading 3',    hashes: '### ' },
    ];
    const STRIP_HEADER_RE = /^(\s*)#{1,6}[ \t]+/;

    function detectHeader(lines) {
      for (const line of lines) {
        if (!line.trim()) continue;
        const m = line.match(/^\s*(#{1,6})[ \t]+/);
        if (!m) return 'plain';
        return m[1].length >= 3 ? 'h3' : (m[1].length === 2 ? 'h2' : 'h1');
      }
      return 'plain';
    }

    function applyHeader(textarea, modeId) {
      const { selectionStart, selectionEnd, value } = textarea;
      const fullStart = value.lastIndexOf('\n', selectionStart - 1) + 1;
      const rawEnd = selectionStart === selectionEnd
        ? value.indexOf('\n', selectionStart)
        : value.indexOf('\n', selectionEnd);
      const fullEnd = rawEnd === -1 ? value.length : rawEnd;
      const before = value.slice(0, fullStart);
      const selected = value.slice(fullStart, fullEnd);
      const after = value.slice(fullEnd);
      const hashes = HEADER_MODES.find(m => m.id === modeId).hashes;
      const srcLines = selected.split('\n');
      const replacement = srcLines.map(line => {
        const indent = line.match(/^(\s*)/)[1];
        const body = line.replace(STRIP_HEADER_RE, '$1').slice(indent.length);
        // Skip blank lines only in a multi-line selection; on a single empty line
        // still insert the hashes so you can start a heading from scratch.
        if (!body.trim() && srcLines.length > 1) return line;
        return indent + hashes + body;
      }).join('\n');
      textarea.value = before + replacement + after;
      if (srcLines.length === 1 && !selected.trim()) {
        textarea.selectionStart = textarea.selectionEnd = before.length + replacement.length;
      } else {
        textarea.selectionStart = before.length;
        textarea.selectionEnd = before.length + replacement.length;
      }
      textarea.dispatchEvent(new Event('input'));
      textarea.focus();
    }

    function headerIcon(mode) {
      const a = `width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"`;
      const H = `<path d="M4 12h8"/><path d="M4 18V6"/><path d="M12 18V6"/>`;
      if (mode === 'h1') return `<svg ${a}>${H}<path d="m17 12 3-2v8"/></svg>`;
      if (mode === 'h2') return `<svg ${a}>${H}<path d="M21 18h-4c0-4 4-3 4-6 0-1.5-2-2.5-4-1"/></svg>`;
      if (mode === 'h3') return `<svg ${a}>${H}<path d="M17.5 10.5c1.7-1 3.5 0 3.5 1.5a2 2 0 0 1-2 2"/><path d="M17 17.5c2 1.5 4 .3 4-1.5a2 2 0 0 0-2-2"/></svg>`;
      return `<svg ${a}><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="16" y2="12"/><line x1="4" y1="18" x2="13" y2="18"/></svg>`; // regular text
    }

    // Heading has no button of its own — it's folded into the text-format button,
    // which offers Heading 1 on the note's first line (see makeFormatButton).

    // ── Inline text formatting (bold / italic / strikethrough / code) ──
    // The grown range is what gets wrapped: a bare cursor selects the word it
    // sits in, and a partial selection grows outward to complete the words at
    // each end, then trims surrounding whitespace so the markers hug real text.
    // Heading 1 lives last so it stays out of the plain→bold→italic→strike click
    // cycle and only surfaces contextually (note's first line) or via the popover.
    const FORMAT_MODES = [
      { id: 'plain',  label: 'Plain text' },
      { id: 'bold',   label: 'Bold' },
      { id: 'italic', label: 'Italic' },
      { id: 'strike', label: 'Strikethrough' },
      { id: 'h1',     label: 'Heading 1' },
    ];
    const INLINE_CYCLE = ['plain', 'bold', 'italic', 'strike'];
    const FORMAT_MARK = { bold: '**', italic: '*', strike: '~~' };
    const WORDCH = /[\p{L}\p{N}_]/u;

    // Remove the inline emphasis marks the format button manages — bold `**`,
    // italic `*`, strikethrough `~~`. Underscores are NOT emphasis here, and inline
    // code ` ` is not a format mode, so both are left intact, as are links/images
    // whose brackets contain no emphasis. Used so wrapping a chunk in one format
    // first clears any conflicting inner marks — you always get a clean `**…**`
    // instead of `**a *i* b**` — and so "Regular text" over a mixed selection
    // strips everything, not one span.
    function stripInlineMarks(s) {
      return s
        .replace(/\*\*(.*?)\*\*/g, '$1')
        .replace(/\*([^*]+?)\*/g, '$1')
        .replace(/~~(.*?)~~/g, '$1');
    }

    function formatRange(value, start, end) {
      while (start > 0 && WORDCH.test(value[start - 1])) start--;
      while (end < value.length && WORDCH.test(value[end])) end++;
      while (start < end && /\s/.test(value[start])) start++;
      while (end > start && /\s/.test(value[end - 1])) end--;
      return [start, end];
    }

    // Find a pair of `m` markers on the selection's line whose span encloses
    // [s, e]. Occurrences are paired sequentially (1st opens, 2nd closes, ...)
    // so markers of unrelated spans on the same line don't false-positive.
    function findEnclosingMark(value, s, e, m) {
      const lineStart = s === 0 ? 0 : value.lastIndexOf('\n', s - 1) + 1;
      let lineEnd = value.indexOf('\n', e);
      if (lineEnd === -1) lineEnd = value.length;
      const occ = [];
      for (let i = lineStart; i <= lineEnd - m.length; ) {
        if (value.startsWith(m, i)) { occ.push(i); i += m.length; }
        else i++;
      }
      for (let k = 0; k + 1 < occ.length; k += 2) {
        if (occ[k] + m.length <= s && e <= occ[k + 1]) return [occ[k], occ[k + 1]];
      }
      return null;
    }

    // The enclosing formatted span, even when the cursor sits on an inner word
    // of a multi-word span like **word1 word2**. Innermost span wins so nested
    // marks (e.g. **a *i* b**) read as the closest one.
    function detectFormatSpan(value, s, e) {
      let best = null;
      for (const [id, m] of [['bold', '**'], ['strike', '~~'], ['italic', '*'], ['italic', '_']]) {
        const span = findEnclosingMark(value, s, e, m);
        if (span && (!best || span[0] > best.open)) best = { id, mark: m, open: span[0], close: span[1] };
      }
      return best;
    }

    function detectFormat(textarea) {
      const { selectionStart, selectionEnd, value } = textarea;
      const [s, e] = formatRange(value, selectionStart, selectionEnd);
      return detectFormatSpan(value, s, e)?.id || 'plain';
    }

    // Leading block marker (heading #, blockquote >, list bullet/number/todo) —
    // inline formatting must never wrap this, only the content after it.
    const BLOCK_MARKER_RE = /^\s*(?:#{1,6}\s+|>+\s*|(?:[-*+]|\d+[.)])\s+(?:\([ xX]\)\s*|\[[ xX]\]\s*)?)/;

    // A multi-line selection: inline emphasis can't span block/list boundaries, so
    // format each touched line's content on its own (skipping its block marker).
    // Toggles OFF only when every content line is already the target format.
    function applyFormatMultiline(textarea, start, end, targetId) {
      const value = textarea.value;
      const from = value.lastIndexOf('\n', start - 1) + 1;
      let to = value.indexOf('\n', end); if (to === -1) to = value.length;
      const mark = FORMAT_MARK[targetId] || '';
      const parts = value.slice(from, to).split('\n').map(l => {
        const mk = l.match(BLOCK_MARKER_RE);
        const prefix = mk ? mk[0] : '';
        const body = l.slice(prefix.length);
        const lead = body.length - body.trimStart().length;
        const trail = body.length - body.trimEnd().length;
        return { prefix, lead: body.slice(0, lead), core: body.slice(lead, body.length - trail), tail: body.slice(body.length - trail) };
      });
      const isWrapped = c => mark && c.length >= 2 * mark.length && c.startsWith(mark) && c.endsWith(mark);
      const contentful = parts.filter(p => p.core);
      const allWrapped = mark && contentful.length > 0 && contentful.every(p => isWrapped(p.core));
      const replacement = parts.map(p => {
        if (!p.core) return p.prefix + p.lead + p.core + p.tail;   // blank / marker-only line
        // Strip inner marks first, so 'plain' clears everything and any format
        // wraps clean content; toggle OFF when the whole selection is this format.
        const bare = stripInlineMarks(p.core);
        return p.prefix + p.lead + (!mark || allWrapped ? bare : mark + bare + mark) + p.tail;
      }).join('\n');
      textarea.value = value.slice(0, from) + replacement + value.slice(to);
      textarea.selectionStart = from;
      textarea.selectionEnd = from + replacement.length;
      textarea.dispatchEvent(new Event('input'));
      textarea.focus();
    }

    function applyFormat(textarea, targetId) {
      const { selectionStart, selectionEnd, value } = textarea;
      let [s, e] = formatRange(value, selectionStart, selectionEnd);
      // Trim marker chars (* ~ _) off the ends so detection sees the bare content,
      // wherever the selection boundaries landed relative to the markers — e.g.
      // grabbing only one asterisk of a ** pair no longer fools it into `*…*` italic.
      while (s < e && /[*~_]/.test(value[s])) s++;
      while (e > s && /[*~_]/.test(value[e - 1])) e--;
      // A selection spanning more than one line wraps each line's content on its own.
      if (value.slice(s, e).includes('\n')) return applyFormatMultiline(textarea, s, e, targetId);
      // Single line: clamp the start past the leading block marker so we wrap only content.
      const lnStart = s === 0 ? 0 : value.lastIndexOf('\n', s - 1) + 1;
      const mk = value.slice(lnStart, e).match(BLOCK_MARKER_RE);
      if (mk) s = Math.max(s, lnStart + mk[0].length);
      // detectFormatSpan finds the enclosing markers (now just outside the trimmed
      // range), so a selection that includes the markers toggles OFF instead of doubling.
      const span = detectFormatSpan(value, s, e);
      const cur = span?.id || 'plain';
      const target = targetId === cur ? 'plain' : targetId;   // re-picking the active mode removes it
      let before, inner, after;
      if (span) {
        // Reformat the whole enclosing span, wherever its markers sit
        before = value.slice(0, span.open);
        inner = value.slice(span.open + span.mark.length, span.close);
        after = value.slice(span.close + span.mark.length);
      } else {
        before = value.slice(0, s); inner = value.slice(s, e); after = value.slice(e);
      }
      const bareInner = stripInlineMarks(inner);   // clear inner marks before (re)wrapping
      const tMark = target === 'plain' ? '' : FORMAT_MARK[target];
      textarea.value = before + tMark + bareInner + tMark + after;
      const ns = before.length + tMark.length;
      textarea.selectionStart = ns;
      textarea.selectionEnd = ns + bareInner.length;
      textarea.dispatchEvent(new Event('input'));
      textarea.focus();
    }

    function formatIcon(mode) {
      const a = `width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"`;
      if (mode === 'bold')   return `<svg ${a}><path d="M7 4h5.5a4 4 0 0 1 0 8H7z"/><path d="M7 12h6.5a4 4 0 0 1 0 8H7z"/></svg>`;
      if (mode === 'italic') return `<svg ${a}><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>`;
      if (mode === 'strike') return `<svg ${a}><path d="M16 7.6C16 5.4 14.2 4 12 4C9.8 4 8 5.4 8 7.4C8 9.5 9.9 10.5 11.8 11.2"/><path d="M14.6 14.4C15.6 15.1 16 16 16 17.1C16 19 14.2 20 12 20C9.8 20 8 18.6 8 16.8"/><line x1="4.5" y1="12" x2="19.5" y2="12" stroke-width="1.6"/></svg>`;
      return `<svg ${a}><polyline points="6.5 7 6.5 4 17.5 4 17.5 7"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="9" y1="20" x2="15" y2="20"/></svg>`; // regular text
    }

    // Heading 1 glyph: a stroked "#" matching the other toolbar icons (no bold text).
    function hashIcon() {
      const a = `width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"`;
      return `<svg ${a}><line x1="9" y1="4" x2="7" y2="20"/><line x1="17" y1="4" x2="15" y2="20"/><line x1="5" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="19" y2="15"/></svg>`;
    }

    // Caret sits on the note's very first line? At offset 0 the answer is always
    // yes — special-cased because lastIndexOf('\n', -1) clamps to index 0 and would
    // falsely match a leading newline (empty first line with content below it).
    function atFirstNoteLine(ta) {
      const s = ta.selectionStart;
      return s === 0 || ta.value.lastIndexOf('\n', s - 1) === -1;
    }
    // The note's first line is a list item (bullet / numbered / todo)?
    function firstLineIsList(ta) {
      return /^\s*(?:[-*+]|\d+[.)])\s/.test(ta.value.split('\n', 1)[0]);
    }

    // Is the caret on the note's actual first line? The format button is shared by
    // three editors, so "first line of this textarea" isn't enough:
    //   • composer (#new-entry) is the whole note → its first line qualifies;
    //   • the block editor edits one paragraph → only the FIRST block qualifies
    //     (first element in the content column), whether reopened or freshly added;
    //   • list-row edits never take a heading (# doesn't apply to a bullet's text).
    function editingNoteFirstLine(ta) {
      if (!atFirstNoteLine(ta)) return false;
      // Whole-note editors — the composer and the full-note edit-textarea — hold the
      // entire note, so their first line is unambiguously the note's first line.
      if (ta.id === 'new-entry' || ta.classList.contains('edit-textarea')) return true;
      // Per-block editor: only the first block (first element in the content column)
      // is the note's top. List-row edits never take a heading.
      if (!activeBlock || activeBlock.ta !== ta || activeBlock.isItem) return false;
      const first = activeBlock.contentEl.querySelector('.md-block, .block-edit-wrap');
      return first === activeBlock.wrap;
    }
    // Can this spot take a Heading 1 at all? Gates both the button-face suggestion
    // and whether "Heading 1" appears in the popover — so it's simply absent where
    // it doesn't apply (a lower block, a list, a list-row edit), never a dead option.
    function headingApplies(ta) {
      return editingNoteFirstLine(ta) && !firstLineIsList(ta);
    }

    function makeFormatButton(textarea) {
      return makeCyclePopoverButton(textarea, {
        modes: FORMAT_MODES,
        // A heading line reports as 'h1' (collapsing any legacy ##/### too) so the
        // button/popover reflect it; otherwise fall back to inline emphasis.
        detect: (ta) => {
          const inline = detectFormat(ta);
          if (inline !== 'plain') return inline;
          return detectHeader(selectedLines(ta)) === 'plain' ? 'plain' : 'h1';
        },
        // Route heading toggles to applyHeader, inline formats to applyFormat.
        apply: (ta, id) => {
          const isHeading = detectHeader(selectedLines(ta)) !== 'plain';
          if (id === 'h1') return applyHeader(ta, isHeading ? 'plain' : 'h1');
          // Clearing a bare heading line (no inline span) drops the # too.
          if (id === 'plain' && isHeading && detectFormat(ta) === 'plain') return applyHeader(ta, 'plain');
          applyFormat(ta, id);
        },
        iconFor: (id) => (id === 'h1' ? hashIcon() : formatIcon(id)),
        labelFor: (m) => m.label,
        // Heading 1 only appears in the popover where it applies (note's first line,
        // not a list); everywhere else the menu is just the inline formats.
        popoverModes: (ta) => headingApplies(ta) ? FORMAT_MODES : FORMAT_MODES.filter(m => m.id !== 'h1'),
        suggest: (id, ta) => {
          // On the note's first line, outside a list and not already a heading, a
          // bare caret offers Heading 1 — the simple rule that replaces the old
          // dedicated heading button. Checked independently of `id` so inline marks
          // sitting next to the caret (a link/bold token on that line) don't suppress
          // it; a real selection still falls through so you can bold a word up top.
          if (ta.selectionStart === ta.selectionEnd && headingApplies(ta)
              && detectHeader(selectedLines(ta)) === 'plain') return 'h1';
          // Cycle stays within the inline modes (never lands on h1 by accident).
          const nextId = INLINE_CYCLE[(INLINE_CYCLE.indexOf(id) + 1) % INLINE_CYCLE.length];
          // If the selection already holds any inline formatting (even mixed marks
          // detectFormat can't name as one span), offer "Regular text" to clear it.
          // Look at the same logical range applyFormat acts on — grown to word
          // boundaries, with stray edge marker chars trimmed — so a lone/edge `*`
          // (which can't form a pair) never falsely flips the suggestion to plain.
          const { selectionStart, selectionEnd, value } = ta;
          if (selectionStart === selectionEnd) return nextId;
          let [s, e] = formatRange(value, selectionStart, selectionEnd);
          while (s < e && /[*~_]/.test(value[s])) s++;
          while (e > s && /[*~_]/.test(value[e - 1])) e--;
          const seg = value.slice(s, e);
          return stripInlineMarks(seg) !== seg ? 'plain' : nextId;
        },
      });
    }

    // ── Link button ──
    // Cursor inside an existing [text](url) → unwrap it back to the url. Otherwise
    // wrap the selection (or the URL-looking token under the cursor): a bare URL
    // becomes [domain](url) with the readable label pre-selected for editing;
    // other text becomes [text]() with the caret parked inside the parens.
    const LINK_URL_RE = /^(?:https?:\/\/|www\.)[^\s]+$|^[\w-]+(?:\.[\w-]+)+(?:\/[^\s]*)?$/i;
    function readableFromUrl(url) {
      try {
        const u = new URL(/^https?:\/\//i.test(url) ? url : 'https://' + url);
        return u.hostname.replace(/^www\./, '') || url;
      } catch { return url; }
    }
    function applyLink(textarea) {
      const { selectionStart: s0, selectionEnd: e0, value } = textarea;
      const LINK_RE = /\[([^\]]*)\]\(([^)]*)\)/g;
      let m;
      while ((m = LINK_RE.exec(value)) !== null) {
        const start = m.index, end = start + m[0].length;
        if (value[start - 1] === '!') continue;   // image ![](...), not a link — never unwrap it
        const overlaps = s0 === e0 ? (s0 >= start && s0 <= end) : (s0 < end && e0 > start);
        if (overlaps) {
          const repl = m[2].trim() || m[1];
          textarea.value = value.slice(0, start) + repl + value.slice(end);
          textarea.selectionStart = start;
          textarea.selectionEnd = start + repl.length;
          textarea.dispatchEvent(new Event('input'));
          textarea.focus();
          return;
        }
      }
      let s = s0, e = e0;
      if (s === e) {
        while (s > 0 && !/\s/.test(value[s - 1])) s--;
        while (e < value.length && !/\s/.test(value[e])) e++;
      }
      while (s < e && /\s/.test(value[s])) s++;
      while (e > s && /\s/.test(value[e - 1])) e--;
      const sel = value.slice(s, e);
      let repl, caretStart, caretEnd;
      if (sel && LINK_URL_RE.test(sel)) {
        const label = readableFromUrl(sel);
        repl = '[' + label + '](' + sel + ')';
        caretStart = 1; caretEnd = 1 + label.length;          // select the label
      } else if (sel) {
        repl = '[' + sel + ']()';
        caretStart = caretEnd = sel.length + 3;               // inside the ()
      } else {
        repl = '[]()';
        caretStart = caretEnd = 1;                            // inside the []
      }
      textarea.value = value.slice(0, s) + repl + value.slice(e);
      textarea.selectionStart = s + caretStart;
      textarea.selectionEnd = s + caretEnd;
      textarea.dispatchEvent(new Event('input'));

    // ── Confirm-to-act button helper ──
    // First tap arms (turns the button rose for 3s); a second tap within that window
    // fires the action. Tapping elsewhere or the timeout resets it.
    function confirmButton(btn, icon, confirmAction) {
      let pending = false;
      let timer = null;
      let card = null;   // resolved lazily on arm — btn isn't in the DOM yet at call time
      const reset = () => {
        pending = false;
        clearTimeout(timer);
        timer = null;
        document.removeEventListener('pointerdown', onOutside, true);
        btn.innerHTML = icon;
        if (btn.dataset.baseClass != null) btn.className = btn.dataset.baseClass;
        btn.style.background = '';
        btn.style.borderColor = '';
        if (card) card.classList.remove('act-delete');
      };
      const onOutside = (e) => { if (!btn.contains(e.target)) reset(); };
      // Don't let the tap steal focus from the open editor — blurring it closes the
      // on-screen keyboard, which shifts the sticky toolbar and makes the button you
      // must tap twice jump out from under your finger between taps.
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (pending) {
          reset();
          confirmAction();
          return;
        }
        reset(); // clear any stale timer/listener from a previous cycle
        pending = true;
        card = btn.closest('.entry-card');
        if (card) card.classList.add('act-delete');    // tint the edited row + ridge rose
        btn.dataset.baseClass = btn.className;
        btn.innerHTML = icon.replace(/stroke="currentColor"/g, 'stroke="#fff"');
        const bg = btn.querySelector('.icon-bg');
        if (bg) bg.style.fill = '#d4728c';
        btn.style.background = '#d4728c';
        btn.style.borderColor = '#d4728c';
        document.addEventListener('pointerdown', onOutside, true);
        timer = setTimeout(reset, 3000);
      });
    }

    function relativeTime(date) {
      const now = Date.now();
      const diff = now - date.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'now';
      if (mins < 60) return mins + 'min ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 7) return days + 'd ago';
      if (days < 30) return Math.floor(days / 7) + 'w ago';
      const months = Math.floor(days / 30);
      if (months < 12) return months + 'm ago';
      const years = Math.floor(months / 12);
      return years + 'y ago';
    }

    const strip = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();

    // Zone-split + stripped text per entry, memoized on content so each search
    // keystroke doesn't re-split and re-normalize every note.
    const searchTextCache = new Map(); // entry.id -> { content, zones, full }
    function getSearchText(entry) {
      const hit = searchTextCache.get(entry.id);
      if (hit && hit.content === entry.content) return hit;
      const text = stripImageRefs(entry.content);
      const lines = text.split('\n');
      let inCode = false;
      const zoneTexts = { h1: '', h2: '', h3: '', body: '', code: '' };
      for (const line of lines) {
        if (line.startsWith('```')) { inCode = !inCode; continue; }
        if (inCode) { zoneTexts.code += ' ' + line; }
        else if (line.startsWith('# ')) zoneTexts.h1 += ' ' + line;
        else if (line.startsWith('## ')) zoneTexts.h2 += ' ' + line;
        else if (line.startsWith('### ')) zoneTexts.h3 += ' ' + line;
        else zoneTexts.body += ' ' + line;
      }
      const computed = {
        content: entry.content,
        // Strip each zone once
        zones: [
          { text: strip(zoneTexts.h1), w: 4 },
          { text: strip(zoneTexts.h2), w: 3 },
          { text: strip(zoneTexts.h3), w: 2 },
          { text: strip(zoneTexts.body), w: 1 },
          { text: strip(zoneTexts.code), w: 0.5 },
        ],
        full: strip(text),
      };
      searchTextCache.set(entry.id, computed);
      return computed;
    }

    function searchScore(entry, tokens) {
      const { zones, full } = getSearchText(entry);
      let score = 0;
      for (const t of tokens) {
        let best = 0;
        for (const z of zones) {
          if (z.text.includes(t)) { best = Math.max(best, z.w); }
        }
        if (!best) return 0; // token not found anywhere
        score += best;
      }
      // Proximity bonus for multi-token queries
      if (tokens.length > 1) {
        const positions = tokens.map(t => full.indexOf(t));
        const span = Math.max(...positions) - Math.min(...positions);
        if (span < 100) score += 2;
      }
      return score;
    }

    // ── State ──

    // ── Firestore 1 MiB document-size guard ──
    // An entry is ONE document; content + editHistory + the images map all share the
    // 1,048,576-byte limit. Pasted images are stored ONCE in `images` and referenced
    // from text as `img:<id>`, so the bytes never duplicate across history versions.
    const DOC_LIMIT = 1048576;
    const byteLen = (s) => new TextEncoder().encode(s == null ? '' : String(s)).length;
    function estimateEntrySize(content, history, images) {
      let size = 300; // doc name + base overhead + small fields (owner, shared, timestamps)
      size += byteLen(content) + 10; // content field
      for (const h of (history || [])) {
        size += byteLen(h && h.content) + byteLen(h && h.editedAt) + 26; // map-entry overhead
      }
      if (images) for (const id in images) size += byteLen(id) + byteLen(images[id]) + 14; // images map
      return size;

    // Grow a textarea to fit its content. The action row is sticky (pinned to the
    // viewport bottom while editing), so there's no need to cap the height or
    // scroll the textarea internally — the buttons stay reachable regardless.
    // Deliberately does NOT restore window scroll: the browser's native
    // caret-scroll and keepCaretVisible() need to move the page, and a restore
    // here would undo them.
    function autosize(ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }

    // Caret's viewport Y (top of the caret's line). Measured with a hidden mirror
    // that mimics the textarea's box + font and holds the text up to the caret, so
    // it's accurate even when long lines WRAP — a newline count can't tell where a
    // wrapped line puts the caret, which makes estimate-based scrolling both
    // under-fire (caret hides) and over-fire (jumps when it's actually in view).
    let caretMirror = null;
    function caretViewportTop(ta) {
      const div = caretMirror || (caretMirror = document.createElement('div'));
      const cs = getComputedStyle(ta);
      const copy = ['boxSizing', 'width', 'paddingTop', 'paddingRight', 'paddingBottom',
        'paddingLeft', 'borderTopWidth', 'borderRightWidth', 'borderBottomWidth',
        'borderLeftWidth', 'fontFamily', 'fontSize', 'fontWeight', 'fontStyle',
        'letterSpacing', 'lineHeight', 'textTransform', 'wordSpacing', 'tabSize'];
      copy.forEach(p => { div.style[p] = cs[p]; });
      div.style.position = 'absolute';
      div.style.visibility = 'hidden';
      div.style.left = '-9999px';
      div.style.top = '0';
      div.style.height = 'auto';
      div.style.whiteSpace = 'pre-wrap';
      div.style.overflowWrap = 'break-word';
      div.textContent = ta.value.slice(0, ta.selectionEnd);
      const marker = document.createElement('span');
      marker.textContent = '​';
      div.appendChild(marker);
      document.body.appendChild(div);
      const y = marker.offsetTop; // from the mirror's border box, matching ta's box
      document.body.removeChild(div);
      div.textContent = '';
      return ta.getBoundingClientRect().top + y - ta.scrollTop;
    }

    // True when the caret sits on the textarea's first (dir<0) or last (dir>0)
    // VISUAL row — the point at which ArrowUp/Down should hop to the neighbor
    // unit rather than move the caret. A wrapped line has no \n to count rows,
    // so measure the caret's pixel offset against the row count. Shared by the
    // block and list-item editors so both hop in a single press.
    function caretAtVisualEdge(ta, dir) {
      const cs = getComputedStyle(ta);
      const lh = parseFloat(cs.lineHeight) || 20;
      const padTop = parseFloat(cs.paddingTop) || 0, padBot = parseFloat(cs.paddingBottom) || 0;
      const caretOff = caretViewportTop(ta) - ta.getBoundingClientRect().top + ta.scrollTop - padTop;
      const caretRow = Math.round(caretOff / lh);
      const lastRow = Math.max(0, Math.round((ta.scrollHeight - padTop - padBot) / lh) - 1);
      return dir < 0 ? caretRow <= 0 : caretRow >= lastRow;
    }

    // Keep the caret inside a comfortable band while editing: the button row is
    // sticky at the viewport bottom, so a caret typed low would slide behind it,
    // and a caret scrolled off the top goes unseen. Only scroll when the caret
    // actually leaves the band — never when it's already comfortably in view.
    function keepCaretVisible(ta) {
      const host = ta.closest('.entry-card.editing') || ta.closest('#input-area.open');
      const bar = host && host.querySelector('.entry-actions');
      if (!bar) return;
      const lh = parseFloat(getComputedStyle(ta).lineHeight) || 20;
      const caretTop = caretViewportTop(ta);
      const caretBottom = caretTop + lh;
      const barRect = bar.getBoundingClientRect();
      const barTop = barRect.top;
      const margin = 16;   // gap kept between the caret and the bar / the top
      // The bar only hides the caret when it's PINNED to the viewport bottom. When
      // the card is short the bar sits in normal flow above the fold — the caret
      // above it is fully visible, and scrolling would move caret and bar together,
      // never resolving (runaway scroll to the top). So gate the downward scroll on
      // the bar actually being pinned at the bottom (bottom: var(--kb-inset)).
      const kbInset = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--kb-inset')) || 0;
      const pinned = barRect.bottom >= window.innerHeight - kbInset - 2;
      if (pinned && caretBottom > barTop - margin) window.scrollBy(0, caretBottom - (barTop - margin));
      else if (caretTop < margin) window.scrollBy(0, caretTop - margin);
    }

    // ── Inline images (pasted / captured) ──
    const IMG_MAX_EDGE = 960;  // longest side after downscale
    const IMG_QUALITY = 0.65;  // WebP/JPEG quality

    // Downscale + re-encode to a small data: URI. WebP where supported, else JPEG.
    async function compressToDataUri(file) {
      const bmp = await createImageBitmap(file);
      const scale = Math.min(1, IMG_MAX_EDGE / Math.max(bmp.width, bmp.height));
      const w = Math.max(1, Math.round(bmp.width * scale));
      const h = Math.max(1, Math.round(bmp.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bmp, 0, 0, w, h);
      if (bmp.close) bmp.close();
      let uri = canvas.toDataURL('image/webp', IMG_QUALITY);
      if (uri.indexOf('data:image/webp') !== 0) uri = canvas.toDataURL('image/jpeg', IMG_QUALITY);
      return uri;
    }

    // Content-hash id so identical images dedupe to a single stored copy.
    async function imageId(dataUri) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(dataUri));
      return Array.from(new Uint8Array(buf)).slice(0, 6).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // Image ids referenced by a content string plus history versions.
    function collectImageRefs(content, history) {
      const set = new Set();
      const scan = (s) => { const re = /\bimg:([0-9a-f]{6,})\b/g; let m; while ((m = re.exec(s || ''))) set.add(m[1]); };
      scan(content);
      for (const h of (history || [])) scan(h && h.content);
      return set;
    }

    // Rendering: swap `img:<id>` for its stored data URI.
    function resolveImageRefs(content, images) {
      if (!images || !content || content.indexOf('img:') === -1) return content;
      return content.replace(/\bimg:([0-9a-f]{6,})\b/g, (m, id) => images[id] || m);
    }

    // Search / clipboard: drop the bulky ref, keep the alt text.
    function stripImageRefs(content) {
      return (content || '').replace(/!\[([^\]]*)\]\(img:[0-9a-f]{6,}\)/g, '$1');
    }

    // Edit mode: hide ids behind friendly `picture#N` tokens (numbered by first use).
    function collapseForEdit(content) {
      const order = [];
      const idx = new Map();
      const text = (content || '').replace(/\bimg:([0-9a-f]{6,})\b/g, (m, id) => {
        if (!idx.has(id)) { order.push(id); idx.set(id, order.length); }
        return 'picture#' + idx.get(id);
      });
      return { text, order };
    }
    function expandFromEdit(text, order) {
      return (text || '').replace(/picture#(\d+)/g, (m, n) => {
        const id = order[Number(n) - 1];
        return id ? 'img:' + id : m;
      });
    }

    // Pasted-but-unsaved image bytes, keyed by entry id (or '__new__'), so they
    // survive mid-edit re-renders until the next save folds them into `images`.
    const pendingImages = new Map();
    const pendingFor = (key) => {
      if (!pendingImages.has(key)) pendingImages.set(key, {});
      return pendingImages.get(key);
    };

    // Compress a picture, dedupe by hash, stash its bytes as pending, and insert a
    // `![](picture#N)` token at the cursor. Works for any image-enabled textarea
    // (carries _imgKey + _imgOrder set up by the editor / composer).
    async function addImageToTextarea(textarea, file) {
      const key = textarea._imgKey, order = textarea._imgOrder;
      if (!key || !order) return;
      let dataUri;
      try { dataUri = await compressToDataUri(file); } catch (err) { console.error('Image compress failed', err); return; }
      const id = await imageId(dataUri);
      let n = order.indexOf(id);
      if (n === -1) { order.push(id); pendingFor(key)[id] = dataUri; n = order.length - 1; }
      const token = 'picture#' + (n + 1);
      const pos = textarea.selectionStart ?? textarea.value.length;
      const before = textarea.value.slice(0, pos);
      const lead = before && !before.endsWith('\n') ? '\n' : '';
      textarea.setRangeText(lead + '![](' + token + ')\n', pos, textarea.selectionEnd ?? pos, 'end');
      textarea.dispatchEvent(new Event('input'));
    }

    // Paste an image, or drag-drop one, onto a textarea.
    function attachImageInput(textarea) {
      textarea.addEventListener('paste', (e) => {
        const imgs = [...(e.clipboardData?.items || [])].filter(i => i.kind === 'file' && i.type.startsWith('image/'));
        if (!imgs.length) return;
        e.preventDefault();
        imgs.forEach(it => { const f = it.getAsFile(); if (f) addImageToTextarea(textarea, f); });
      });
      textarea.addEventListener('dragover', (e) => {
        if ([...(e.dataTransfer?.items || [])].some(i => i.kind === 'file')) e.preventDefault();
      });
      textarea.addEventListener('drop', (e) => {
        const files = [...(e.dataTransfer?.files || [])].filter(f => f.type.startsWith('image/'));
        if (!files.length) return;
        e.preventDefault();
        files.forEach(f => addImageToTextarea(textarea, f));
      });
    }
    const searchArea = document.getElementById('search-area');

    const viewPopover = document.getElementById('view-popover');
    const VIEW_MODES = [
      { id: 'all',      icon: ICON.viewAll,      label: 'All' },
      { id: 'shared',   icon: ICON.viewShared,   label: 'Shared',   activeStyle: 'background:#7bae7f;border-color:#7bae7f;color:#fff' },
      { id: 'unshared', icon: ICON.viewUnshared,  label: 'Unshared' },
    ];

    // Unlinked notes involving me: ones I've set aside, plus my own shared notes a
    // recipient rejected. Recomputed from live data. (Inlined, not via isSetAside/
    // isRejectedMine, so it never depends on their later definition order.)
    function countSetAside() {
      return allEntries.reduce((n, e) => {
        if (!Array.isArray(e.hiddenFor) || !e.hiddenFor.length) return n;
        const mineRejected = e.owner === currentUserEmail && e.shared;
        const iSetAside = e.owner !== currentUserEmail && e.hiddenFor.includes(currentUserEmail);
        return n + (mineRejected || iSetAside ? 1 : 0);
      }, 0);
    }
    // onGreen: badge sits on the active (sage) filter button — flip to a white
    // circle with the rose number so it reads cleanly on green.
    const setAsideBadge = (onGreen) => {
      const n = countSetAside();
      if (!n) return '';
      const style = onGreen ? ' style="background:#fff;color:#d4728c"' : '';
      return '<span class="view-badge"' + style + '>' + n + '</span>';
    };

    function updateViewBtn() {
      const m = VIEW_MODES.find(v => v.id === viewMode);
      // Show the set-aside count on the button only while the Shared filter is active.
      const badge = viewMode === 'shared' ? setAsideBadge(true) : '';
      toggleViewBtn.innerHTML = m.icon + '<span style="margin-left:4px">' + m.label + '</span>' + badge;
      toggleViewBtn.style.cssText = m.activeStyle || '';
    }

    function buildViewPopover() {
      viewPopover.innerHTML = '';
      VIEW_MODES.forEach(m => {
        const b = document.createElement('button');
        b.innerHTML = m.icon + ' ' + m.label + (m.id === 'shared' ? setAsideBadge() : '');
        if (m.id === viewMode) b.classList.add('active');
        b.addEventListener('click', (e) => {
          e.stopPropagation();
          viewMode = m.id;
          updateViewBtn();
          renderEntries();
          viewPopover.classList.remove('show');
        });
        viewPopover.appendChild(b);
      });
    }

    updateViewBtn();

    toggleViewBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = VIEW_MODES.findIndex(v => v.id === viewMode);
      viewMode = VIEW_MODES[(idx + 1) % VIEW_MODES.length].id;
      updateViewBtn();
      renderEntries();
    });

    // Hover: show popover (desktop only — skip if last interaction was touch)
    let viewHoverTimer = null;
    let viewLastTouchTime = 0;
    toggleViewBtn.addEventListener('mouseenter', () => {
      if (Date.now() - viewLastTouchTime < 1000) return;
      viewHoverTimer = setTimeout(() => { buildViewPopover(); viewPopover.classList.add('show'); }, 400);
    });
    toggleViewBtn.addEventListener('mouseleave', () => {
      clearTimeout(viewHoverTimer);
      setTimeout(() => {
        if (!viewPopover.matches(':hover') && !toggleViewBtn.matches(':hover')) viewPopover.classList.remove('show');
      }, 200);
    });
    viewPopover.addEventListener('mouseleave', () => {
      setTimeout(() => {
        if (!viewPopover.matches(':hover') && !toggleViewBtn.matches(':hover')) viewPopover.classList.remove('show');
      }, 200);
    });

    // Touch: long press
    let viewPressTimer = null;
    toggleViewBtn.addEventListener('touchstart', (e) => {
      viewLastTouchTime = Date.now();
      viewPressTimer = setTimeout(() => { e.preventDefault(); buildViewPopover(); viewPopover.classList.add('show'); }, 500);
    }, { passive: false });
    toggleViewBtn.addEventListener('touchend', () => clearTimeout(viewPressTimer));
    toggleViewBtn.addEventListener('touchmove', () => clearTimeout(viewPressTimer));

    document.addEventListener('click', (e) => {
      if (!viewPopover.contains(e.target) && !toggleViewBtn.contains(e.target)) viewPopover.classList.remove('show');
    });

    signOutBtn.innerHTML = ICON.signOut;
    confirmButton(signOutBtn, ICON.signOut, () => { signOut(auth); });

    toggleSearchBtn.addEventListener('click', () => {
      const opened = searchArea.classList.toggle('open');
      toggleSearchBtn.classList.toggle('active', opened);
      if (opened) { searchInput.focus(); }
      else { searchInput.value = ''; currentFilter = ''; updateSearchClear(); renderEntries(); }
    });

    toggleNewBtn.addEventListener('click', () => {
      const opened = inputArea.classList.toggle('open');
      toggleNewBtn.classList.toggle('active', opened);
      if (opened) { newEntry.focus(); }
    });

    // ── Auth ──
    const provider = new GoogleAuthProvider();

    signInBtn.addEventListener('click', () => {
      signInWithPopup(auth, provider).catch(() => signInWithRedirect(auth, provider));
    });
    getRedirectResult(auth).catch(() => {});

    // Reveal the app and render notes from the localStorage cache. Does NOT attach the
    // Firestore listener, so it's safe to call before Auth resolves. `email` may be
    // null on the first load after upgrading (before it's persisted) — notes render
    // without it; only the entries query (in startListening) needs the address.
    function showApp(email) {
      if (email) currentUserEmail = email;
      hydrateNotesLocal();
      authSection.style.display = 'none';
      appSection.style.display = 'block';
    }
    // Full sign-in path: show the app AND attach the live listener (Auth is resolved
    // here, so the listener authenticates cleanly).
    function enterApp(email) {
      showApp(email);
      startListening();
    }

    // ── Optimistic boot ──
    // Firebase Auth's init makes a blocking network call before it fires
    // onAuthStateChanged; on weak connections that stalls for seconds and used to gate
    // the whole app. Firestore's cache is auth-gated too, so we render notes straight
    // from the localStorage mirror instead. onAuthStateChanged still runs below and
    // takes over with the live listener once Auth resolves. Deferred to a microtask so
    // all module bindings exist, and guarded so it can never break boot.
    queueMicrotask(() => {
      try {
        const remembered = localStorage.getItem('wasSignedIn');
        if (!remembered) return;
        window.__bootMark('optimistic:showApp');
        showApp(remembered === '1' ? null : remembered);
      } catch (e) { console.warn('optimistic boot skipped', e); }
    });

    onAuthStateChanged(auth, async (user) => {
      window.__bootMark(user ? 'auth:user' : 'auth:signed-out');
      if (user) {
        // Persist the email (not just '1') so the next optimistic boot has it.
        localStorage.setItem('wasSignedIn', user.email);
        enterApp(user.email);
        try {
          const allowedDoc = await getDoc(doc(db, 'config', 'allowedUsers'));
          if (allowedDoc.exists() && !allowedDoc.data().emails.includes(user.email)) {
            if (unsubEntries) { unsubEntries(); unsubEntries = null; }
            await signOut(auth);
            alert('Access denied. Your email is not authorized.');
            return;
          }
        } catch (e) {
          // Rules also deny this read to non-allowlisted users (fail-closed), so
          // permission-denied IS the "not authorized" signal — same outcome as the
          // explicit check above. Anything else (offline = 'unavailable', transient
          // errors) skips the check; rules still protect the data either way.
          if (e && e.code === 'permission-denied') {
            if (unsubEntries) { unsubEntries(); unsubEntries = null; }
            await signOut(auth);
            alert('Access denied. Your email is not authorized.');
            return;
          }
        }

        // ── Handle Web Share Target ──
        const shareParams = new URLSearchParams(window.location.search);
        const shareTitle = shareParams.get('title');
        const shareText = (shareParams.get('text') || '').replace(/^"?Share via"?\s*/i, '').trim() || null;
        const shareUrl = shareParams.get('url');
        if (shareTitle || shareText || shareUrl) {
          const parts = [shareTitle, shareText, shareUrl].filter(Boolean);
          newEntry.value = parts.join('\n\n');
          inputArea.classList.add('open');
          toggleNewBtn.classList.add('active');
          newEntry.dispatchEvent(new Event('input'));
          newEntry.focus();
          history.replaceState(null, '', '/');
        }
      } else {
        currentUserEmail = null;
        localStorage.removeItem('wasSignedIn');
        // Don't leave notes readable in localStorage after sign-out.
        localStorage.removeItem('notesCache');
        authSection.style.display = 'block';
        appSection.style.display = 'none';
        if (unsubEntries) { unsubEntries(); unsubEntries = null; }
      }
    });

    // ── Real-time listener ──
    function startListening() {
      if (unsubEntries) return;
      window.__bootMark('listen:start');

      // ONE query (own OR shared) instead of two merged listeners: a single
      // initial snapshot delivers own and shared notes together, so shared notes
      // no longer pop in late when the second listener's snapshot caught up.
      // Each or() branch unions over the same composite indexes the two old
      // queries used (owner+sortTime, shared+sortTime).
      const entriesQuery = query(entriesRef,
        or(where('owner', '==', currentUserEmail), where('shared', '==', true)),
        orderBy('sortTime', 'desc'));

      // If the stream errors (dropped connection, token refresh), tear it down and
      // re-subscribe so the app self-heals instead of hanging until a manual refresh.
      // Permanent errors must NOT retry: failed-precondition = missing index;
      // permission-denied = rules reject the query — notably every non-allowlisted
      // sign-in, since the allowlist getDoc in onAuthStateChanged is itself
      // permission-denied for them (swallowed by its offline catch), so no sign-out
      // interrupts the would-be retry loop. Surface the state instead of spinning.
      const onErr = (err) => {
        console.error('Firestore listener error — reconnecting', err);
        if (unsubEntries) { unsubEntries(); unsubEntries = null; }
        if (err && (err.code === 'failed-precondition' || err.code === 'permission-denied')) {
          statusEl.textContent = 'Sync error: ' + err.code;
          return;
        }
        if (currentUserEmail) setTimeout(startListening, 2000);
      };

      unsubEntries = onSnapshot(entriesQuery, { includeMetadataChanges: true }, (snapshot) => {
        snapshotEntries = snapshot.docs.map(d => ({ id: d.id, ...d.data(), _pending: d.metadata.hasPendingWrites }));
        mergeAndRender();
        notesLoaded = true; // listener is live — writes now reflect via latency compensation
        // Refresh the localStorage mirror only on real doc changes (includeMetadataChanges
        // also fires this on pending→confirmed toggles). mergeAndRender sorts into
        // allEntries in a microtask, so save after that runs.
        if (snapshot.docChanges().length) queueMicrotask(() => saveNotesLocal());
        if (snapshot.metadata.fromCache) { if (!window.__mCache) { window.__mCache = 1; window.__bootMark('notes:cache (' + snapshotEntries.length + ')'); } }
        else { if (!window.__mServer) { window.__mServer = 1; window.__bootMark('notes:server (' + snapshotEntries.length + ')'); } }
        statusEl.textContent = snapshot.metadata.hasPendingWrites ? 'Saving...' : '';
      }, onErr);
    }

    let renderQueued = false;
    function mergeAndRender() {
      if (renderQueued) return;
      renderQueued = true;
      queueMicrotask(() => {
        renderQueued = false;
        allEntries = [...snapshotEntries].sort((a, b) => {
          // A pending write with no resolved sortTime is a just-bumped/created note;
          // float it to the top instead of letting null sort it to the bottom (which
          // caused the bump-to-bottom-then-snap-to-top jump).
          const ta = a.sortTime?.toMillis?.() || (a._pending ? Number.MAX_SAFE_INTEGER : 0);
          const tb = b.sortTime?.toMillis?.() || (b._pending ? Number.MAX_SAFE_INTEGER : 0);
          return tb - ta;
        });
        scanEmojiUsage(allEntries);
        renderEntries();
      });
    }

    // ── Render ──
    const cardCache = new Map(); // entry.id -> { card, entry, contentEl, dateText, ts, versions, buildViewMode, buildEditMode, closeHistoryIfOpen }

    // One delegated Escape handler for all cards. (Per-card document listeners
    // were tied to a per-render AbortController and died on the next render
    // while the card itself stayed cached.)
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      let closed = false;
      for (const c of cardCache.values()) {
        if (c.closeHistoryIfOpen()) closed = true;
      }
      if (closed) e.preventDefault();
    });

    // A note shared *to* me that I've set aside (unlinked): it leaves my active
    // list and shows rose in Shared; the owner's copy is untouched.
    const isSetAside = (e) => e.owner !== currentUserEmail &&
      Array.isArray(e.hiddenFor) && e.hiddenFor.includes(currentUserEmail);
    // My own shared note that a recipient set aside. The mirror of set-aside: it stays
    // VISIBLE (red) in my list to alert me, rather than leaving it. Requires `shared` so
    // unsharing clears the alert and re-sharing restores it (hiddenFor is never cleared).
    const isRejectedMine = (e) => e.owner === currentUserEmail && e.shared &&
      Array.isArray(e.hiddenFor) && e.hiddenFor.length > 0;
    const cardClassFor = (e) => 'entry-card' +
      ((isSetAside(e) || isRejectedMine(e)) ? ' unlinked' : (e.shared ? ' shared' : ''));

    function buildCard(initialEntry) {
      let entry = initialEntry;
      const card = document.createElement('div');
      card.className = cardClassFor(entry);
      // Card-anchored ridges: __ridge marks the open editor; __hoverRidge previews
      // where a click would land (shown even while another row is being edited).
      card.__ridge = document.createElement('div');
      card.__ridge.className = 'edit-ridge';
      card.__hoverRidge = document.createElement('div');
      card.__hoverRidge.className = 'edit-ridge soft';
      card.append(card.__ridge, card.__hoverRidge);

      const dateEl = document.createElement('div');
      dateEl.className = 'entry-date';
      // History state
      const history = entry.editHistory || [];
      const hasHistory = history.length > 0;
      // Last edit time: last history entry's editedAt, or createdAt if never edited
      const lastEditedAt = hasHistory ? history[history.length - 1].editedAt : null;
      let ts = lastEditedAt ? new Date(lastEditedAt) : (entry.createdAt?.toDate?.() || new Date());
      const dateText = document.createElement('span');
      dateText.textContent = relativeTime(ts);
      // For a note shared to me, fold the owner's name into the date ("Ana · 5d")
      // so the action slot is free for the unlink button (mirroring the owner's
      // share button position).
      if (entry.owner !== currentUserEmail) {
        const who = document.createElement('span');
        who.textContent = (USER_ALIASES[entry.owner] || (entry.owner || '').split('@')[0]) + ' · ';
        dateEl.appendChild(who);
      }
      dateEl.appendChild(dateText);
      let historyOpen = false;
      // Build versions with correct "created at" dates:
      // version 0 was created at entry.createdAt, version N was created at history[N-1].editedAt
      let versions;
      if (hasHistory) {
        const createdIso = entry.createdAt?.toDate?.()?.toISOString() || null;
        versions = [
          { content: history[0].content, date: createdIso },
          ...history.slice(1).map((h, i) => ({ content: h.content, date: history[i].editedAt })),
          { content: entry.content, date: history[history.length - 1].editedAt }
        ];
      } else {
        versions = [{ content: entry.content, date: null }];
      }
      let versionIdx = versions.length - 1;

      const contentEl = document.createElement('div');
      contentEl.className = 'entry-content';
      renderBlocks(contentEl, entry);

      const actions = document.createElement('div');
      actions.className = 'entry-actions';

      const histNav = document.createElement('div');
      histNav.className = 'history-nav';
      histNav.style.display = 'none';

      const histDeleteSlot = document.createElement('span');
      histDeleteSlot.style.cssText = 'display:flex;';

      const fmtDate = (iso) => {
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
          + ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      };

      const prevBtn = document.createElement('button');
      prevBtn.textContent = '\u2190';
      const nextBtn = document.createElement('button');
      nextBtn.textContent = '\u2192';
      const label = document.createElement('span');

      const histActions = document.createElement('span');
      histActions.style.cssText = 'display:flex;gap:8px;';

      const histRight = document.createElement('span');
      histRight.style.cssText = 'display:flex;gap:8px;align-items:center;margin-left:auto;';

      // ── History actions ──
      const closeHistory = () => {
        historyOpen = false;
        histNav.style.display = 'none';
        actions.style.display = 'flex';
        versionIdx = versions.length - 1;
        card.classList.remove('history-viewing');
        renderBlocks(contentEl, entry);
        dateText.textContent = relativeTime(ts);
      };

      function buildHistoryActions() {
        histActions.innerHTML = '';
        const isCurrent = versionIdx === versions.length - 1;
        const entryIsOwn = entry.owner === currentUserEmail;

        if (!isCurrent) {
          const rescueVerBtn = document.createElement('button');
          rescueVerBtn.className = 'btn-rescue';
          rescueVerBtn.innerHTML = ICON.bump;
          rescueVerBtn.title = 'Bump';
          rescueVerBtn.addEventListener('click', async () => {
            const rescuedContent = versions[versionIdx].content;
            const newHistory = history.map((h, i) => i === versionIdx
              ? { content: entry.content, editedAt: new Date().toISOString() }
              : h
            );
            // Simple swap: promote this version to current WITHOUT floating to top.
            // Close history so the user lands back in view mode; from there a regular
            // Bump can float the note to the top if they also want that.
            closeHistory();
            await updateDoc(doc(db, 'entries', entry.id), {
              content: rescuedContent,
              editHistory: newHistory
            });
          }, { once: true });
          histActions.appendChild(rescueVerBtn);
        }

        const copyVerBtn = document.createElement('button');
        copyVerBtn.innerHTML = ICON.copy;
        copyVerBtn.title = 'Copy';
        copyVerBtn.addEventListener('click', async () => {
          await navigator.clipboard.writeText(resolveImageRefs(versions[versionIdx].content, entry.images));
          flashCopied(copyVerBtn);
        });
        histActions.appendChild(copyVerBtn);

        const editVerBtn = document.createElement('button');
        editVerBtn.className = 'btn-edit';
        editVerBtn.innerHTML = ICON.edit;
        editVerBtn.title = 'Edit';
        editVerBtn.addEventListener('click', () => {
          histNav.style.display = 'none';
          historyOpen = false; // we're in edit mode now, not history view
          pendingImages.delete(entry.id);
          activeEdits.set(entry.id, { value: versions[versionIdx].content, card });
          buildEditMode(versions[versionIdx].content, !isCurrent, true);
        }, { once: true });
        histActions.appendChild(editVerBtn);

        histDeleteSlot.innerHTML = '';
        if (entryIsOwn) {
          if (!isCurrent) {
            const delVerBtn = document.createElement('button');
            delVerBtn.innerHTML = ICON.trash;
            delVerBtn.title = 'Delete version';
            confirmButton(delVerBtn, ICON.trash, async () => {
              const newHistory = history.filter((_, i) => i !== versionIdx);
              await updateDoc(doc(db, 'entries', entry.id), { editHistory: newHistory });
            });
            histDeleteSlot.appendChild(delVerBtn);
          } else {
            const clearBtn = document.createElement('button');
            clearBtn.innerHTML = ICON.clearHistory;
            clearBtn.title = 'Delete all history';
            confirmButton(clearBtn, ICON.clearHistory, async () => {
              await updateDoc(doc(db, 'entries', entry.id), { editHistory: [] });
            });
            histDeleteSlot.appendChild(clearBtn);
          }
        }
      }

      const updateHistoryView = () => {
        if (!historyOpen) return;
        // Keep the prev/next bar fixed under the cursor as versions of differing
        // length swap in above it.
        const anchorTop = histNav.getBoundingClientRect().top;
        const isCurrent = versionIdx === versions.length - 1;
        contentEl.innerHTML = cleanHtml(versions[versionIdx].content, entry.images);
        applyTodoMarkup(contentEl);
        attachCodeCopyButtons(contentEl);
        // Read-only history: disable the checkboxes (no click-to-edit here).
        contentEl.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.disabled = true; });
        prevBtn.disabled = versionIdx === 0;
        nextBtn.disabled = isCurrent;
        label.textContent = `${versionIdx + 1}/${versions.length}`;
        const vDate = versions[versionIdx].date
          ? fmtDate(versions[versionIdx].date)
          : relativeTime(ts);
        dateText.textContent = vDate;
        histDateEl.textContent = vDate;
        card.classList.toggle('history-viewing', !isCurrent);
        buildHistoryActions();
        const delta = histNav.getBoundingClientRect().top - anchorTop;
        if (delta) window.scrollBy(0, delta);
      };

      const toggleHistory = () => {
        if (historyOpen) { closeHistory(); return; }
        historyOpen = true;
        histNav.style.display = 'flex';
        actions.style.display = 'none';
        updateHistoryView();
      };
      prevBtn.addEventListener('click', () => { if (versionIdx > 0) { versionIdx--; updateHistoryView(); } });
      nextBtn.addEventListener('click', () => { if (versionIdx < versions.length - 1) { versionIdx++; updateHistoryView(); } });

      const histDateEl = document.createElement('span');
      histDateEl.className = 'entry-date';
      histNav.appendChild(histActions);
      // Date is a direct child of histNav (not nested in histRight) so it can drop
      // to its own line above the buttons on narrow screens; its .entry-date
      // margin-left:auto keeps it right-aligned, just left of the nav buttons, on wide.
      histNav.appendChild(histDateEl);
      histRight.appendChild(prevBtn);
      histRight.appendChild(label);
      histRight.appendChild(nextBtn);
      if (hasHistory) {
        const closeHistBtn = document.createElement('button');
        closeHistBtn.innerHTML = ICON.close;
        closeHistBtn.title = 'Close history';
        closeHistBtn.addEventListener('click', closeHistory);
        histRight.appendChild(closeHistBtn);
      }
      histRight.appendChild(histDeleteSlot);
      histNav.appendChild(histRight);

      // ── View mode ──
      function buildViewMode(updatedEntry) {
        if (updatedEntry) entry = updatedEntry;
        card.classList.remove('editing', 'editing-full'); // release sticky bar
        if (card.__ridge) card.__ridge.style.display = 'none';
        actions.style.display = 'flex';
        actions.innerHTML = '';
        const entryIsOwn = entry.owner === currentUserEmail;

        const bumpBtn = document.createElement('button');
        bumpBtn.className = 'btn-rescue';
        bumpBtn.innerHTML = ICON.bump;
        bumpBtn.title = 'Bump';
        bumpBtn.addEventListener('click', () => rescueEntry(entry.id));

        const editBtn = document.createElement('button');
        editBtn.className = 'btn-edit';
        editBtn.innerHTML = ICON.edit;
        editBtn.title = 'Edit';
        editBtn.addEventListener('click', () => {
          pendingImages.delete(entry.id);
          activeEdits.set(entry.id, { value: entry.content, card });
          buildEditMode(entry.content, false);
        }, { once: true });

        const copyBtn = document.createElement('button');
        copyBtn.innerHTML = ICON.copy;
        copyBtn.title = 'Copy';
        copyBtn.addEventListener('click', async () => {
          await navigator.clipboard.writeText(resolveImageRefs(entry.content, entry.images));
          flashCopied(copyBtn);
        });

        actions.appendChild(bumpBtn);
        actions.appendChild(copyBtn);

        if (entryIsOwn) {
          const shareBtn = document.createElement('button');
          if (isRejectedMine(entry)) {
            // A recipient set this shared note aside — rose link cue (mirrors their
            // set-aside button). Tap to stop sharing it; re-sharing later returns it to
            // the unlinked state for both, since hiddenFor is never cleared.
            shareBtn.innerHTML = ICON.link;
            shareBtn.title = 'Set aside by recipient — tap to unshare';
            shareBtn.style.cssText = 'background:#d4728c;border-color:#d4728c;color:#fff';
            shareBtn.addEventListener('click', async () => {
              await updateDoc(doc(db, 'entries', entry.id), { shared: false });
            });
          } else {
            shareBtn.innerHTML = entry.shared ? ICON.share : ICON.unshare;
            shareBtn.title = entry.shared ? 'Unshare' : 'Share';
            if (entry.shared) shareBtn.style.cssText = 'background:#7bae7f;border-color:#7bae7f;color:#fff';
            shareBtn.addEventListener('click', async () => {
              await updateDoc(doc(db, 'entries', entry.id), { shared: !entry.shared });
            });
          }
          actions.appendChild(shareBtn);
        } else {
          // Recipient's slot mirrors the owner's share button: a link toggle for
          // MY personal link to this note (hiddenFor), leaving the owner's copy alone.
          const linkBtn = document.createElement('button');
          linkBtn.innerHTML = ICON.link;
          if (isSetAside(entry)) {
            // Recover: one tap, no confirm (harmless) — filled rose link.
            linkBtn.title = 'Add back to my list';
            linkBtn.style.cssText = 'background:#d4728c;border-color:#d4728c;color:#fff';
            linkBtn.addEventListener('click', async () => {
              await updateDoc(doc(db, 'entries', entry.id), { hiddenFor: arrayRemove(currentUserEmail) });
            });
          } else {
            // Set aside: two-tap arm-to-confirm, reusing the trash's cooldown.
            linkBtn.title = 'Set aside (remove from my list)';
            confirmButton(linkBtn, ICON.link, async () => {
              await updateDoc(doc(db, 'entries', entry.id), { hiddenFor: arrayUnion(currentUserEmail) });
            });
          }
          actions.appendChild(linkBtn);
        }

        actions.appendChild(dateEl);

        actions.appendChild(editBtn);

        if (hasHistory) {
          const histBtn = document.createElement('button');
          histBtn.innerHTML = ICON.history;
          histBtn.title = `${versions.length} versions`;
          histBtn.addEventListener('click', toggleHistory);
          actions.appendChild(histBtn);
        }

        if (entryIsOwn) {
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'btn-delete';
          deleteBtn.innerHTML = ICON.trash;
          deleteBtn.title = 'Delete';
          confirmButton(deleteBtn, ICON.trash, () => removeEntry(entry.id));
          actions.appendChild(deleteBtn);
        }

        versionIdx = versions.length - 1;
        card.classList.remove('history-viewing');
        renderBlocks(contentEl, entry);
        dateText.textContent = relativeTime(ts);
      }
      card.__toView = buildViewMode; // block editors call this to restore view mode

      // ── Edit mode ──
      function buildEditMode(initialValue, makeCurrentOnSave, returnToHistory) {
        const textarea = document.createElement('textarea');
        textarea.className = 'edit-textarea';
        // Show `picture#N` tokens instead of `img:<id>` refs. activeEdits keeps the
        // REAL (expanded) content so a mid-edit re-render re-collapses identically.
        const key = entry.id;
        const { text: collapsedInit, order } = collapseForEdit(initialValue);
        textarea.value = collapsedInit;
        textarea._imgKey = key;
        textarea._imgOrder = order;
        const realValue = () => expandFromEdit(textarea.value, order).trim();
        const currentContent = card.querySelector('.entry-content, .edit-textarea');
        if (currentContent) currentContent.replaceWith(textarea);
        autosize(textarea);
        // The expand + byte-count passes are O(content); on a pathologically huge
        // note that's costly on mobile, so throttle them (autosize stays immediate
        // for responsiveness). Save flushes synchronously so the guard is current.
        let sizeThrottleAt = 0, sizeTrail = null;
        const commitEditState = () => {
          sizeThrottleAt = Date.now();
          const real = expandFromEdit(textarea.value, order);
          activeEdits.set(entry.id, { value: real, card });
          refreshSizeState(real);
        };
        textarea.addEventListener('input', () => {
          autosize(textarea);
          keepCaretVisible(textarea);
          clearTimeout(sizeTrail);
          const since = Date.now() - sizeThrottleAt;
          if (since >= 150) commitEditState();
          else sizeTrail = setTimeout(commitEditState, 150 - since);
        });
        attachImageInput(textarea);
        textarea.focus(); // scroll the caret (at end) into view, like mobile does

        card.classList.add('editing', 'editing-full'); // sticky bar + full-height ridge
        actions.style.display = 'flex';
        actions.innerHTML = '';
        const saveBtn = document.createElement('button');
        saveBtn.className = 'btn-edit btn-save';
        saveBtn.innerHTML = ICON.save;
        saveBtn.title = 'Save';
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn-delete';
        cancelBtn.innerHTML = ICON.close; // same icon as the close-history action
        cancelBtn.title = 'Cancel';
        const escHint = document.createElement('span');
        escHint.className = 'esc-hint';

        // esc-hint shows either the discard prompt (temporary) or the over-limit
        // warning (persistent while over). The discard prompt takes precedence and
        // must not be wiped; when it expires we fall back to the limit warning.
        // Text + history are short refs now; images hold the bytes (counted ONCE,
        // even across history). History is fixed while editing, so precompute its
        // text + referenced-image contribution; each keystroke only re-measures the
        // small current text and sums cached per-image sizes.
        const histTextFixed = (entry.editHistory || []).reduce(
          (a, h) => a + byteLen(h && h.content) + byteLen(h && h.editedAt) + 26, 0);
        const archivedTextBytes = byteLen(entry.content) + 24 + 26; // version archived on save
        const histImageIds = collectImageRefs(null, entry.editHistory || []);
        const archivedImageIds = collectImageRefs(entry.content, null);
        const imgBytesCache = new Map();
        const imgBytesOf = (id) => {
          if (!imgBytesCache.has(id)) {
            const uri = (entry.images && entry.images[id]) || pendingFor(key)[id] || '';
            imgBytesCache.set(id, byteLen(id) + byteLen(uri) + 14);
          }
          return imgBytesCache.get(id);
        };
        let overPct = 0;
        const renderHint = wireEditorKeys(textarea, escHint, {
          onCommit: () => saveEdit(),
          canDiscardNow: () => realValue() === entry.content,
          onDiscard: () => cancelEdit(),
          overPct: () => overPct,
          overLabel: 'Note history exceeds limit',
        });
        const refreshSizeState = (realArg) => {
          const real = realArg !== undefined ? realArg : realValue();
          const changed = real && real !== entry.content; // saving archives the current version
          const refs = new Set(collectImageRefs(real, null));
          histImageIds.forEach(id => refs.add(id));
          if (changed) archivedImageIds.forEach(id => refs.add(id));
          let imagesBytes = 0;
          refs.forEach(id => { imagesBytes += imgBytesOf(id); });
          const size = 310 + byteLen(real) + histTextFixed + (changed ? archivedTextBytes : 0) + imagesBytes;
          overPct = Math.ceil(size / DOC_LIMIT * 100);
          const over = size > DOC_LIMIT;
          textarea.classList.toggle('over-limit', over);
          saveBtn.disabled = over;
          renderHint();
        };

        const cancelEdit = () => {
          activeEdits.delete(entry.id);
          pendingImages.delete(key);
          card.classList.remove('editing', 'editing-full'); // release sticky bar + ridge
          textarea.replaceWith(contentEl);
          renderBlocks(contentEl, entry);
          if (returnToHistory) {
            historyOpen = true; // returning to history view (updateHistoryView needs this)
            actions.style.display = 'none';
            histNav.style.display = 'flex';
            updateHistoryView();
          } else {
            buildViewMode();
          }
        };

        const saveEdit = async () => {
          const newContent = realValue();
          refreshSizeState(newContent); // flush throttle so the guard reflects the latest text
          if (saveBtn.disabled) return; // over the 1 MiB document limit
          // Any content difference is a save — INCLUDING emptying the note (the
          // Clear action), which archives the old content to history and keeps the
          // note as an empty, recoverable entry rather than discarding the edit.
          const changed = newContent !== entry.content;
          const restoring = makeCurrentOnSave && newContent === initialValue && newContent !== entry.content;
          if (changed || restoring) {
            // Build the images map: existing + pasted, garbage-collecting any image
            // no longer referenced by the new content or any retained history version.
            const archived = { content: entry.content, editedAt: new Date().toISOString() };
            const allImages = Object.assign({}, entry.images, pendingImages.get(key));
            const refs = collectImageRefs(newContent, (entry.editHistory || []).concat([archived]));
            const images = {};
            refs.forEach(id => { if (allImages[id]) images[id] = allImages[id]; });
            pendingImages.delete(key);
            const hadImages = entry.images && Object.keys(entry.images).length > 0;

            activeEdits.delete(entry.id);
            entry.content = newContent; // keep local copy in sync so buildViewMode renders it
            entry.images = images;
            textarea.replaceWith(contentEl);
            ts = new Date();
            buildViewMode();
            const payload = { content: newContent, editHistory: arrayUnion(archived) };
            if (refs.size || hadImages) payload.images = images; // write only when relevant
            await updateDoc(doc(db, 'entries', entry.id), payload);
          } else {
            cancelEdit();
          }
        };

        saveBtn.addEventListener('click', saveEdit);
        cancelBtn.addEventListener('click', cancelEdit);

        mountEditTools(actions, textarea, [cancelBtn, saveBtn], escHint);
        refreshSizeState();
        // Re-fit once the sticky action row is in the DOM (its height affects
        // where the caret band lands), then pull the caret into view.
        requestAnimationFrame(() => { autosize(textarea); keepCaretVisible(textarea); });
      }

      card.appendChild(contentEl);
      card.appendChild(actions);
      card.appendChild(histNav);

      return {
        card, entry, contentEl, dateText, ts, versions, buildViewMode, buildEditMode,
        closeHistoryIfOpen: () => { if (!historyOpen) return false; closeHistory(); return true; },
      };
    }

    let renderChunkScheduled = false;
    function renderEntries() {
      const tokens = strip(currentFilter).split(/\s+/).filter(Boolean);
      updateViewBtn(); // refresh the Shared-filter set-aside badge as notes change

      const orderedCards = [];
      const cardScores = [];
      // Building a card parses markdown; budget that work so a large cold render
      // paints the first screenful now and streams the rest in following frames.
      const chunkStart = performance.now();
      let builtThisPass = 0;
      let truncated = false;

      for (let entry of allEntries) {
        // View mode filter
        const isOwn = entry.owner === currentUserEmail;
        if (viewMode === 'all' && isSetAside(entry)) continue;   // set-aside notes leave the active list
        if (viewMode === 'unshared' && (!isOwn || entry.shared)) continue;
        if (viewMode === 'shared' && !entry.shared) continue;
        if (tokens.length) {
          const score = searchScore(entry, tokens);
          if (!score) continue;
          cardScores.push(score);
        }

        // Reuse existing DOM for entries being edited
        const edit = activeEdits.get(entry.id);
        if (edit && edit.card) {
          orderedCards.push(edit.card);
          continue;
        }

        // Check if we can reuse an existing card
        const cached = cardCache.get(entry.id);
        if (cached && !activeEdits.has(entry.id)) {
          // Skip re-render while a checkbox toggle is in flight to prevent flicker
          if (pendingCheckboxUpdates.has(entry.id)) {
            orderedCards.push(cached.card);
            continue;
          }
          const prev = cached.entry;
          const prevHist = prev.editHistory || [];
          const curHist = entry.editHistory || [];
          const lastPrev = prevHist[prevHist.length - 1];
          const lastCur = curHist[curHist.length - 1];
          const histChanged = prevHist.length !== curHist.length ||
            lastPrev?.content !== lastCur?.content ||
            lastPrev?.editedAt !== lastCur?.editedAt;
          if (histChanged) {
            cardCache.delete(entry.id);
          } else {
            // Update in-place if content, shared, or my set-aside state changed
            if (prev.content !== entry.content || prev.shared !== entry.shared ||
                (prev.hiddenFor || []).join(',') !== (entry.hiddenFor || []).join(',')) {
              cached.entry = entry;
              cached.card.className = cardClassFor(entry);
              renderBlocks(cached.contentEl, entry);
              const hist = entry.editHistory || [];
              const ts = hist.length ? new Date(hist[hist.length - 1].editedAt) : (entry.createdAt?.toDate?.() || new Date());
              cached.dateText.textContent = relativeTime(ts);
              cached.buildViewMode(entry);
            }
            orderedCards.push(cached.card);
            continue;
          }
        }

        // Cache miss: stop here once over budget (search renders stay complete
        // because relevance sorting needs every match; those are mostly cached).
        if (!tokens.length && builtThisPass > 0 && performance.now() - chunkStart > 40) {
          truncated = true;
          break;
        }

        const result = buildCard(entry);
        builtThisPass++;
        cardCache.set(entry.id, result);

        if (activeEdits.has(entry.id)) {
          result.buildEditMode(activeEdits.get(entry.id).value, false);
        } else {
          result.buildViewMode();
        }
        orderedCards.push(result.card);
      }

      // Sort by search relevance (number of matching tokens), preserving order for ties
      if (cardScores.length) {
        const indexed = orderedCards.map((card, i) => ({ card, score: cardScores[i], i }));
        indexed.sort((a, b) => b.score - a.score || a.i - b.i);
        orderedCards.length = 0;
        for (const item of indexed) orderedCards.push(item.card);
      }

      // Drop caches only for entries that no longer exist; cards merely filtered
      // out (search/view mode) stay cached so toggling filters back is instant.
      if (!truncated) {
        const liveIds = new Set(allEntries.map(e => e.id));
        for (const [id] of cardCache) {
          if (!liveIds.has(id)) cardCache.delete(id);
        }
        for (const [id] of searchTextCache) {
          if (!liveIds.has(id)) searchTextCache.delete(id);
        }
      }

      // FLIP animation: record old positions
      const oldRects = new Map();
      for (const card of entriesList.children) {
        oldRects.set(card, card.getBoundingClientRect());
      }

      // Reconcile DOM order without removing/re-adding unchanged cards
      let i = 0;
      for (const card of orderedCards) {
        const existing = entriesList.children[i];
        if (existing !== card) {
          entriesList.insertBefore(card, existing || null);
        }
        i++;
      }
      // Remove extra trailing children
      while (entriesList.children.length > orderedCards.length) {
        entriesList.removeChild(entriesList.lastChild);
      }

      // FLIP animation: animate cards that moved, only if both old and new positions are near viewport
      const vh = window.innerHeight;
      for (const card of orderedCards) {
        const oldRect = oldRects.get(card);
        if (!oldRect) continue;
        const newRect = card.getBoundingClientRect();
        const dy = oldRect.top - newRect.top;
        const nearViewport = oldRect.bottom > -vh && oldRect.top < 2 * vh
                          && newRect.bottom > -vh && newRect.top < 2 * vh;
        if (Math.abs(dy) > 1 && nearViewport) {
          card.style.transform = `translateY(${dy}px)`;
          card.style.transition = 'none';
          requestAnimationFrame(() => {
            card.style.transition = 'transform 0.3s ease';
            card.style.transform = '';
            card.addEventListener('transitionend', () => {
              card.style.transition = '';
            }, { once: true });
          });
        }
      }

      // Continue building the remaining cards next frame
      if (truncated && !renderChunkScheduled) {
        renderChunkScheduled = true;
        requestAnimationFrame(() => { renderChunkScheduled = false; renderEntries(); });
      }
    }

    // ── Actions ──
    async function appendEntry() {
      const content = expandFromEdit(newEntry.value, newEntry._imgOrder).trim();
      if (!content) return;
      if (appendBtn.disabled) return; // over the 1 MiB document limit
      const pend = pendingFor('__new__');
      const refs = collectImageRefs(content, null);
      const images = {};
      refs.forEach(id => { if (pend[id]) images[id] = pend[id]; });
      closeNewEntry();
      const docData = {
        content,
        createdAt: serverTimestamp(),
        sortTime: serverTimestamp(),
        owner: currentUserEmail,
        shared: false
      };
      if (refs.size) docData.images = images;
      await addDoc(entriesRef, docData);
    }

    async function rescueEntry(id) {
      await updateDoc(doc(db, 'entries', id), { sortTime: serverTimestamp() });
    }

    async function removeEntry(id) {
      await deleteDoc(doc(db, 'entries', id));
    }

    // ── Event listeners ──
    const cancelNewBtn = document.getElementById('cancel-new');
    const newEscHint = document.getElementById('new-esc-hint');
    // Same collapsible edit toolbar as the block / whole-note editors.
    appendBtn.innerHTML = ICON.save;
    cancelNewBtn.innerHTML = ICON.close;
    const newActions = document.getElementById('new-actions');
    mountEditTools(newActions, newEntry, [cancelNewBtn, appendBtn], newEscHint);
    // Image session for the composer (the new note isn't a doc yet → key '__new__').
    newEntry._imgKey = '__new__';
    newEntry._imgOrder = [];
    attachImageInput(newEntry);

    function closeNewEntry() {
      newEntry.value = '';
      newEntry.style.height = 'auto';
      newEscHint.textContent = '';
      newEntry.classList.remove('over-limit');
      appendBtn.disabled = false;
      newEntry._imgOrder = [];
      pendingImages.delete('__new__');
      inputArea.classList.remove('open');
      toggleNewBtn.classList.remove('active');
    }

    appendBtn.addEventListener('click', appendEntry);
    cancelNewBtn.addEventListener('click', () => closeNewEntry());

    let newOverPct = 0;
    const renderNewHint = wireEditorKeys(newEntry, newEscHint, {
      onCommit: () => appendEntry(),
      canDiscardNow: () => !newEntry.value.trim(),
      onDiscard: () => closeNewEntry(),
      overPct: () => newOverPct,
      overLabel: 'Note exceeds limit',
    });
    const refreshNewSizeState = () => {
      const real = expandFromEdit(newEntry.value, newEntry._imgOrder).trim();
      const pend = pendingFor('__new__');
      const refs = collectImageRefs(real, null);
      const images = {};
      refs.forEach(id => { if (pend[id]) images[id] = pend[id]; });
      const size = estimateEntrySize(real, [], images);
      newOverPct = Math.ceil(size / DOC_LIMIT * 100);
      const over = size > DOC_LIMIT;
      newEntry.classList.toggle('over-limit', over);
      appendBtn.disabled = over;
      renderNewHint();
    };

    newEntry.addEventListener('input', () => {
      autosize(newEntry);
      keepCaretVisible(newEntry);
      refreshNewSizeState();
    });


    const searchClear = document.getElementById('search-clear');
    function updateSearchClear() {
      searchClear.classList.toggle('visible', searchInput.value.length > 0);
    }
    let searchTimer;
    searchInput.addEventListener('input', (e) => {
      currentFilter = e.target.value;
      updateSearchClear();
      clearTimeout(searchTimer);
      searchTimer = setTimeout(renderEntries, 150);
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      currentFilter = '';
      updateSearchClear();
      searchInput.focus();
      renderEntries();
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        currentFilter = '';
        updateSearchClear();
        searchArea.classList.remove('open');
        toggleSearchBtn.classList.remove('active');
        renderEntries();
      }
    });

    // ── Service worker ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>

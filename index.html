      authDomain: "one-list-ce90d.firebaseapp.com",
      projectId: "one-list-ce90d",
      storageBucket: "one-list-ce90d.firebasestorage.app",
      messagingSenderId: "1046982287763",
      appId: "1:1046982287763:web:fdd863e848a72d23d10866"
    };

    // ── Init ──
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, {
      // Multi-tab manager: tabs share one sync connection instead of fighting over a
      // single-tab lease (forceOwnership), which could stall writes until a refresh.
      localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
    });

    const entriesRef = collection(db, 'entries');

    // ── localStorage boot-cache (notes) ──
    // Firestore's own cache is auth-gated (firebase-js-sdk#3302) so it can't paint
    // before Auth resolves — the multi-second stall on weak connections. We mirror
    // notes to localStorage (written by the live listener, read once at boot) so they
    // render at ~700ms independent of Auth. One-directional: Firestore stays the sole
    // source of truth for writes; the live snapshot always supersedes this mirror.
    // Do NOT drop this in favour of Firestore's cache — that cache is the gate.
    const NOTE_TS_FIELDS = ['sortTime', 'createdAt'];
    const tsToMillis = (t) => t == null ? null
      : (typeof t.toMillis === 'function' ? t.toMillis()
      : (t instanceof Date ? t.getTime()
      : (typeof t === 'number' ? t : null)));
    // Revive stored millis into a Firestore-Timestamp stand-in so the sort
    // (.toMillis()) and render (.toDate()) paths work unchanged.
    const tsShim = (ms) => ({ toMillis: () => ms, toDate: () => new Date(ms) });

    function saveNotesLocal() {
      try {
        localStorage.setItem('notesCache', JSON.stringify(allEntries.map(n => {
          const c = { ...n };
          delete c._pending; // transient hasPendingWrites flag — don't persist stale
          for (const f of NOTE_TS_FIELDS) c[f] = tsToMillis(c[f]);
          return c;
        })));
      } catch (e) { /* quota / serialization — skip mirror */ }
    }

    function hydrateNotesLocal() {
      let raw; try { raw = localStorage.getItem('notesCache'); } catch (e) { return; }
      if (!raw) return;
      try {
        const arr = JSON.parse(raw);
        if (!Array.isArray(arr)) return;
        allEntries = arr.map(n => {
          for (const f of NOTE_TS_FIELDS) if (typeof n[f] === 'number') n[f] = tsShim(n[f]);
          return n;
        });
        scanEmojiUsage(allEntries);
        renderEntries();
        window.__bootMark('local:notes (' + allEntries.length + ')');
      } catch (e) { /* corrupt — ignore, live listener repopulates */ }
    }

    // ── Not-yet-synced write feedback ──
    // Before the live listener attaches (cold boot on a weak connection), writes queue
    // durably in Firestore's offline cache and commit once Auth resolves, but nothing
    // on screen reflects them yet. Let the write through and flash a toast so the tap
    // isn't silently ignored. `notesLoaded` (set by the entries listener) = "live".
    let notesLoaded = false;
    let syncToastEl = null;
    function showSyncToast(msg) {
      if (syncToastEl) syncToastEl.remove();
      const el = document.createElement('div');
      el.className = 'sync-toast';
      el.textContent = msg;
      document.body.appendChild(el);
      syncToastEl = el;
      setTimeout(() => { el.remove(); if (syncToastEl === el) syncToastEl = null; }, 2400);
    }
    // Single choke point for every Firestore write: all call sites use these names.
    const guardWrite = (fn) => (...args) => {
      if (!notesLoaded) showSyncToast('Still connecting — your change will sync in a moment');
      return fn(...args);
    };
    const addDoc = guardWrite(_addDoc);
    const updateDoc = guardWrite(_updateDoc);
    const deleteDoc = guardWrite(_deleteDoc);
    const setDoc = guardWrite(_setDoc);
    const commitBatch = guardWrite((b) => b.commit());

    // ── History as distinct version docs ──
    // Every editing session commits ONE immutable doc to entries/{id}/history holding the
    // session's RESULT (not its pre-edit baseline). That is the whole point: a stale
    // offline device that replays and clobbers `content` still writes its own result as a
    // version doc, so the overwritten text is recoverable with NO witness online at the
    // moment of the clobber. `content` itself stays last-write-wins — we don't merge.
    //
    // The note doc carries two hot-path fields so fork detection never needs a
    // subcollection read: `contentVersion` (id of the version holding the current text)
    // and `contentBase` (the version that text was derived from).
    const deviceId = (() => {
      let d = null;
      try { d = localStorage.getItem('deviceId'); } catch (e) {}
      if (!d) {
        d = Math.random().toString(36).slice(2, 10);
        try { localStorage.setItem('deviceId', d); } catch (e) {}
      }
      return d;
    })();

    const historyRef = (entryId) => collection(db, 'entries', entryId, 'history');
    const newVersionId = (entryId) => doc(historyRef(entryId)).id;

    // Commit an editing session's result: version doc + note fields, atomically.
    // writeBatch (NOT runTransaction) — batches queue offline and replay as a unit, so the
    // note's content and its backing version doc can never split. Transactions need a
    // server round-trip and are unusable offline.
    // `entryObj`, when given, is the LIVE note object a card holds. It must be advanced to
    // the version we just wrote: a card in an open editing session is shielded from
    // snapshot re-renders (activeEdits), so nothing else will refresh it — and the NEXT
    // session on that same card reads `contentVersion` from it to pick its base. Leave it
    // stale and the second edit commits against the version before last, which genuinely
    // orphans the first edit. A note forking against itself, on one device.
    function commitVersion(entryId, content, base, extraNoteFields, entryObj) {
      const versionId = newVersionId(entryId);
      console.info('[fork] commitVersion', entryId, 'newVersion=', versionId, 'base=', base || null);
      const batch = writeBatch(db);
      batch.set(doc(historyRef(entryId), versionId), {
        content,
        createdAt: serverTimestamp(),   // authoritative order (the referee an array lacks)
        editedAt: new Date().toISOString(), // display fallback until serverTimestamp resolves
        device: deviceId,
        base: base || null,
      });
      batch.update(doc(db, 'entries', entryId), Object.assign({
        content,
        contentVersion: versionId,
        contentBase: base || null,
        versionCount: increment(1),     // commutative — survives parallel offline writes
        editedAt: new Date().toISOString(), // card's "last edited" — hot path, no history read
      }, extraNoteFields || {}));
      // Remember our own commit as the version we now hold, or the next snapshot would
      // read as a fork against our previous version.
      noteVersions[entryId] = versionId;
      saveNoteVersions();
      markSeen(entryId, versionId);
      pendingCommits.set(entryId, versionId);
      // Clear on the DEFINITIVE signal: the batch actually landing. Inferring it from
      // snapshots only covers OUR own succession — if a remote device commits on top of our
      // pending version, its `contentVersion` is one we've never seen (indexOf === -1) and
      // the note stays wedged for the rest of the session, with fork detection skipped for
      // it entirely. The commit promise resolves when the write reaches the server (offline:
      // on reconnect), which is exactly the condition we mean.
      // Advance local state to match what we just wrote (see above).
      const live = allEntries.find(e => e.id === entryId);
      for (const o of [entryObj, live]) {
        if (!o) continue;
        o.content = content;
        o.contentVersion = versionId;
        o.contentBase = base || null;
      }
      return commitBatch(batch)
        .then(() => {
          if (pendingCommits.get(entryId) === versionId) pendingCommits.delete(entryId);
        })
        .catch(err => {
          console.error('version commit failed', err);
          if (pendingCommits.get(entryId) === versionId) pendingCommits.delete(entryId);
        });
    }

    // ── Fork detection (hot path) ──
    // The alert is a HINT, never the guarantee — recoverability comes from the version docs
    // alone, whether or not any device notices the fork.
    //
    // A snapshot whose `contentBase` is not the version we held SUSPECTS a fork. It does not
    // show one. The suspicion is verified against the real lineage (a server read + the
    // ancestor walk) and only a CONFIRMED orphan lights the edge.
    //
    // This is a deliberate reversal of an earlier design that biased toward over-alerting on
    // the theory that "a false positive costs a click". It doesn't: a red edge you open and
    // find nothing behind teaches you to ignore red edges, which costs exactly the thing the
    // feature exists to buy. A suspicion is not evidence.
    //
    // Two things must be durable in localStorage:
    //   `noteVersions` — the version this device holds. In memory, a reload resets it and we
    //                    start under-alerting.
    //   `seenVersions` — every version we have held, IN ORDER. `held` may only move forward;
    //                    this list is how a backwards move is recognised. Never capped, never
    //                    reordered (see markSeen).
    // Notes with a version commit of OURS still settling. The block editor writes TWICE —
    // applyEntryContent pushes `content` alone (leaving contentVersion on the PREVIOUS
    // version), then endBlockSession commits the version doc — so the note genuinely passes
    // through an intermediate state where content has moved but contentVersion has not.
    // Firestore can surface that state back to us. It is OUR OWN write in flight, not
    // another device's edit: while it settles we neither suspect a fork nor move `held`.
    // Without this, `held` regresses to the older version, and the orphan walk then starts
    // from the wrong "current" and reports our own newest version as orphaned. That is a
    // red edge on a note nothing has forked — a solo device forking against itself.
    const pendingCommits = new Map();   // noteId → the versionId we just wrote

    // Versions we have ALREADY held as current, per note (oldest → newest, capped).
    //
    // `held` must be MONOTONIC: a version we have already superseded can never become
    // current again. Firestore does not promise snapshot states arrive in write order — a
    // cached or delayed snapshot can surface the note as it was BEFORE our latest commit
    // (the block editor's content-then-version window makes such a state exist at all). If
    // we let `held` follow that backwards, the orphan walk starts from a superseded version
    // and reports our own newest version as orphaned: a red edge on a note nothing forked.
    //
    // So: an incoming contentVersion we have seen before, that is not the one we hold, is a
    // STALE ECHO of our own past — ignore the snapshot entirely rather than regress.
    let seenVersions = {};
    try { seenVersions = JSON.parse(localStorage.getItem('oneListSeenVersions') || '{}') || {}; } catch (e) {}
    const saveSeenVersions = () => { try { localStorage.setItem('oneListSeenVersions', JSON.stringify(seenVersions)); } catch (e) {} };
    // `seenVersions[note]` is the CHRONOLOGICAL list of versions this device has held. It is
    // not a convenience buffer: the backwards guard decides "is this incoming version older
    // than what I hold?" by comparing positions in it. Two invariants follow, and both were
    // violated by earlier versions of this function:
    //
    //   1. NEVER re-append a version already in the list. Only the last element used to be
    //      checked, so re-seeing an older version pushed it to the END — making the oldest
    //      version look like the newest and inverting the order the guard reads.
    //   2. NEVER cap/evict. A cap dropped the OLDEST entries first, i.e. the seed. Once the
    //      seed is gone, a stale echo of it is no longer recognisable as our own past, so
    //      `held` regresses onto it, the orphan walk starts from the wrong version, and every
    //      newer version is reported orphaned — exactly the false positive this guard exists
    //      to prevent. ~20 bytes per version, pruned when the note is deleted; not a cost
    //      worth trading the invariant for.
    function markSeen(noteId, versionId) {
      if (!versionId) return;
      const list = seenVersions[noteId] || (seenVersions[noteId] = []);
      if (list.includes(versionId)) return;   // keep its ORIGINAL position
      list.push(versionId);
      saveSeenVersions();
    }

    let noteVersions = {};   // noteId → the versionId this device last held as current
    // NOTE: there is no per-device alert store. Whether a note has unresolved orphaned text
    // is a fact about the NOTE, not about what this device happened to witness — so it lives
    // on the note doc, in `orphanVersions` (confirmed orphans) minus `resolvedVersions`
    // (ones the user has dealt with). Whichever device detects the fork writes it, and every
    // other device then shows the rose edge from the snapshot alone: no witness, no history
    // read, no waiting for that device to open the viewer.
    // The old per-device alert flags are dead: drop them so a stale one can't outlive its
    // note. (Red is now derived from the note doc on every render.)
    try { localStorage.removeItem('oneListHistoryAlerts'); } catch (e) {}
    // NOTE: acknowledgements are NOT kept here — they live on the note doc
    // (`resolvedVersions`). Whether an orphan has been dealt with is a fact about the NOTE,
    // not about this device: rescue an orphan on the phone and the laptop must stop showing
    // red for it too. arrayUnion makes it commutative, so concurrent/offline acks merge.
    try { noteVersions = JSON.parse(localStorage.getItem('oneListNoteVersions') || '{}') || {}; } catch (e) {}
    const saveNoteVersions = () => { try { localStorage.setItem('oneListNoteVersions', JSON.stringify(noteVersions)); } catch (e) {} };

    // The user dealt with this orphan (rescued it, or edited and saved from it). An orphan
    // stays an orphan in the lineage forever — it is never an ancestor of current — so the
    // "have you handled it" bit has to be recorded separately from the graph. It goes on the
    // note doc so every device agrees; arrayUnion never clobbers a concurrent ack.
    function ackFork(noteId, versionId) {
      if (!versionId) return;
      const e = allEntries.find(x => x.id === noteId);
      if (e) e.resolvedVersions = (e.resolvedVersions || []).concat(
        (e.resolvedVersions || []).includes(versionId) ? [] : [versionId]);
      return updateDoc(doc(db, 'entries', noteId), { resolvedVersions: arrayUnion(versionId) })
        .catch(err => console.error('ack failed', err));
    }

    // Called for every snapshot. A device seeing a note for the FIRST time just records the
    // version it arrived at — it cannot suspect anything, having held nothing to be forked
    // away from. (It will still show the rose edge if the NOTE DOC already carries an
    // unresolved orphan: that is a fact about the note, published by whichever device
    // confirmed it, and needs no witness here.)
    function checkForkAlerts(entries, fromCache) {
      let dirtyV = false;
      const live = new Set();
      const suspects = [];
      for (const e of entries) {
        live.add(e.id);
        if (!e.contentVersion) continue;              // legacy / never committed under this scheme

        // Our own commit still settling? Ignore this note entirely until the snapshot
        // catches up to the version we wrote. Anything before that is our own in-flight
        // state — including the block editor's content-without-version intermediate.
        // While one of OUR commits is in flight, this note's snapshots are our own
        // intermediate state (the block editor writes content, then the version) — not
        // another device's edit. Skip it.
        //
        // These are FAST paths only; the authoritative clear is the commit promise resolving
        // (see commitVersion), so a snapshot we never receive cannot wedge the note.
        const pending = pendingCommits.get(e.id);
        if (pending) {
          const sv = seenVersions[e.id] || [];
          const iPend = sv.indexOf(pending), iCur = sv.indexOf(e.contentVersion);
          const ourEcho = e.contentVersion === pending;
          const movedPast = (iPend !== -1 && iCur > iPend) || e.contentBase === pending;
          if (ourEcho || movedPast) pendingCommits.delete(e.id);
          else continue;
        }

        const held = noteVersions[e.id];

        // `held` must only move FORWARD. `seenVersions` is the ordered list of versions this
        // device has held, so it tells us which way a move goes: an incoming version that
        // sits EARLIER in that list than the one we hold is our own past echoing back out of
        // order (Firestore does not promise snapshots arrive in write order) — ignore it.
        //
        // Only a strictly BACKWARD move is blocked. Blocking every move onto a seen version
        // would be a trap: if `held` ever ends up behind (a stale tab on an old build wrote
        // it to localStorage, say), the forward move that would heal it is exactly the one
        // we'd refuse — `held` sticks in the past forever, and every check then reports our
        // newest version as orphaned. A wedged red edge that no amount of editing clears.
        // Whatever we hold is by definition seen — guards any future path that sets `held`
        // without recording it (exactly the bug described at note creation).
        if (held) markSeen(e.id, held);
        const seen = seenVersions[e.id] || [];
        const iHeld = seen.indexOf(held);
        const iIncoming = seen.indexOf(e.contentVersion);
        if (held && iHeld !== -1 && iIncoming !== -1 && iIncoming < iHeld) {
          console.debug('[fork] ignoring stale echo', e.id, held, '<-', e.contentVersion);
        }
        if (held && iHeld !== -1 && iIncoming !== -1 && iIncoming < iHeld) {
          continue;   // strictly backwards — a stale echo
        }

        // A base that isn't the version we held SUSPECTS a fork. Confirm it against the
        // real lineage before showing anything — see recheckOrphans.
        // Skip while our own write is still in flight: that snapshot is our own optimistic
        // state echoing back, not another device's edit.
        if (held && !e._pending && held !== e.contentVersion && e.contentBase !== held
            && !hasUnresolvedOrphans(e)) {
          suspects.push(e.id);
        }
        if (held !== e.contentVersion) {
          console.info('[fork] held advance', e.id, held, '->', e.contentVersion,
                       '(base', e.contentBase + ')');
          noteVersions[e.id] = e.contentVersion;
          markSeen(e.id, e.contentVersion);
          dirtyV = true;
        }
      }
      // Prune state for notes that are really gone — but ONLY from a snapshot we can trust to
      // be complete: a server-backed, non-empty one. An empty snapshot (boot) or a partially
      // populated cache snapshot would otherwise wipe `held` and `seen` for notes that exist.
      // That is not cosmetic: losing `seen` blinds the backwards guard, so the next stale echo
      // regresses `held` and the note reports its own newest version as orphaned.
      if (entries.length && !fromCache) {
        for (const id of Object.keys(noteVersions)) if (!live.has(id)) { delete noteVersions[id]; dirtyV = true; }
        for (const id of Object.keys(seenVersions)) if (!live.has(id)) { delete seenVersions[id]; saveSeenVersions(); }
        for (const id of [...pendingForkChecks]) if (!live.has(id)) { pendingForkChecks.delete(id); savePendingChecks(); }
      }
      if (dirtyV) saveNoteVersions();
      // Verify off the hot path — one server read per suspicion, which is rare.
      const byId = new Map(entries.map(e => [e.id, e]));
      for (const id of suspects) recheckOrphans(id, true, byId.get(id));
      // Retry anything we couldn't verify earlier (we were offline then).
      for (const id of [...pendingForkChecks]) if (live.has(id)) recheckOrphans(id, true, byId.get(id));
    }

    // The alert means "this note still has orphaned text", NOT "you haven't looked yet".
    // So it is set from the orphan count, and only an action that RESOLVES the orphan
    // clears it: deleting that version, or bumping/editing-and-saving it (both commit a
    // new version whose `base` is the orphan, which makes it an ancestor of current and
    // therefore no longer orphaned). Merely opening history changes nothing.
    // Publish the confirmed orphan set to the note doc. The owner writes the exact set (so
    // orphans that were deleted or re-parented away disappear); a collaborator on a shared
    // note can only add (arrayUnion), since it must not clobber the owner's list.
    function publishOrphans(id, entry, orphanIds) {
      const current = (entry.orphanVersions || []).slice().sort();
      const next = orphanIds.slice().sort();
      if (current.join(',') === next.join(',')) return;
      const isOwner = entry.owner === currentUserEmail;
      const added = next.filter(v => !current.includes(v));
      let payload = null;
      if (isOwner) payload = { orphanVersions: next };
      else if (added.length) payload = { orphanVersions: arrayUnion(...added) };
      if (!payload) return;
      entry.orphanVersions = next;   // local echo so the card repaints immediately
      const cached = cardCache.get(id);
      if (cached) {
        cached.entry.orphanVersions = next;
        cached.card.classList.toggle('forked', hasUnresolvedOrphans(cached.entry));
      }
      updateDoc(doc(db, 'entries', id), payload)
        .catch(err => console.error('publishing orphans failed', err));
    }

    // Re-derive the alert from the ACTUAL lineage. The hot-path check is only a suspicion:
    // it fires whenever an incoming base isn't the version we held, which also happens when
    // nothing was lost (e.g. snapshots coalesced over an offline device's V1←V2←V3). An
    // alert you can't explain when you open history is worse than no alert, so we confirm
    // against the orphan walk and only light the edge if a version really is orphaned.
    //
    // `suspected` is the fail-loud fallback: a CACHE-only read can be missing the very
    // version doc that proves the fork, so "no orphans" from cache is not trustworthy —
    // keep the suspicion rather than silently under-alert. Only a server read may clear it.
    // Suspicions we could not verify (offline, or an unwalkable lineage). Retried on a later
    // snapshot — NEVER shown as an alert in the meantime: an unverified suspicion is not
    // evidence of a fork, and showing red for one produces exactly the spurious alerts that
    // destroy trust in it.
    //
    // DURABLE: `held` advances the moment a snapshot lands, so if the app dies between
    // "suspected" and "verified", nothing would ever re-suspect that note — the fork would be
    // silently forgotten on this device forever. Persisted so a reload resumes the check.
    let pendingForkChecks = new Set();
    try {
      const raw = JSON.parse(localStorage.getItem('oneListPendingForkChecks') || '[]');
      if (Array.isArray(raw)) pendingForkChecks = new Set(raw);
    } catch (e) {}
    const savePendingChecks = () => {
      try { localStorage.setItem('oneListPendingForkChecks', JSON.stringify([...pendingForkChecks])); } catch (e) {}
    };

    // One verification in flight per note. Concurrent rechecks race on publishOrphans and can
    // flicker the published set (an older read landing after a newer one).
    const recheckInFlight = new Set();

    // What the note looked like the last time we verified it. A note whose lineage we could
    // not establish ('unknown' — e.g. a collaborator waiting for the owner to repair a hole)
    // would otherwise re-read from the SERVER on every single snapshot, forever. Re-verify
    // only when something about the note actually moved. No timers, no arbitrary backoff:
    // if nothing changed, there is nothing new to learn.
    const verifiedAt = new Map();
    const noteSignature = (e) => [
      e.contentVersion, e.contentBase, e.versionCount,
      (e.orphanVersions || []).join('|'), (e.resolvedVersions || []).join('|'),
    ].join('~');

    // Repair a broken lineage. A `base` may point at a version that no longer exists — a
    // deleted version whose children weren't re-parented, or a note whose seed never made it
    // (offline create, tab killed). The hole makes everything upstream unreachable from
    // current, so the walk reports "unknown" and detection stops working for that note
    // FOREVER. Re-parent the dangling node onto the newest surviving version older than it
    // (by createdAt), or make it a root. Owner only; `base` is structural metadata, not
    // content, and the rules allow exactly this one field to change.
    function repairChain(id, entry, versions, currentId) {
      if (entry.owner !== currentUserEmail) return null;   // only the owner may rewrite `base`
      const byId = new Map(versions.map(v => [v.id, v]));
      const dated = versions.filter(v => !v.legacy && v.id !== '__current__');
      if (dated.some(v => !v.ms)) {
        // Without real timestamps we cannot say which surviving version precedes the hole —
        // and guessing would re-parent onto the wrong node, inventing a lineage. Do nothing.
        console.debug('[fork] repair skipped for', id, '- versions lack createdAt');
        return null;
      }
      const ordered = dated.slice().sort((a, b) => a.ms - b.ms);
      const broken = ordered.filter(v => v.base && !byId.has(v.base));
      if (!broken.length) return null;
      const batch = writeBatch(db);
      let n = 0;
      for (const v of broken) {
        const idx = ordered.indexOf(v);
        const parent = idx > 0 ? ordered[idx - 1].id : null;   // newest surviving predecessor
        if (parent === v.base) continue;
        batch.update(doc(historyRef(id), v.id), { base: parent });
        if (v.id === entry.contentVersion) batch.update(doc(db, 'entries', id), { contentBase: parent });
        n++;
      }
      if (!n) return null;
      console.warn('[fork] repairing', n, 'broken lineage link(s) on note', id);
      return commitBatch(batch).catch(err => { console.error('chain repair failed', err); });
    }

    // `fresh` is the entry straight off the snapshot. allEntries is rebuilt in a microtask,
    // so during a snapshot callback it still holds the PREVIOUS state — reading
    // resolvedVersions/contentVersion from it there would use stale data.
    async function recheckOrphans(id, suspected, fresh, force) {
      const e = fresh || allEntries.find(x => x.id === id);
      if (!e) return;
      if (recheckInFlight.has(id)) return;   // an older read must not overwrite a newer one
      const sig = noteSignature(e);
      if (!force && verifiedAt.get(id) === sig) return;   // nothing changed since we last looked
      recheckInFlight.add(id);
      try {
        await recheckOrphansInner(id, suspected, e);
        verifiedAt.set(id, sig);
      } finally { recheckInFlight.delete(id); }
    }

    async function recheckOrphansInner(id, suspected, e) {
      // Our own just-committed version can beat the snapshot into allEntries, so trust
      // what we hold over what the (async) snapshot list says.
      const currentId = noteVersions[id] || e.contentVersion;
      let snap;
      try {
        // Deliberately a SERVER read. The local cache can be missing the very version doc
        // that proves (or disproves) a fork, and a wrong answer here is user-visible.
        snap = await getDocsFromServer(query(historyRef(id), orderBy('createdAt')));
      } catch (err) {
        // Offline / transient. Do not guess — remember and re-verify later.
        if (suspected) { pendingForkChecks.add(id); savePendingChecks(); }
        return;
      }
      const versions = [];
      snap.forEach(d => {
        const v = d.data();
        // `ms` must be carried explicitly: repairChain sorts by it. Passing only {id, base}
        // made every sort key 0, so correctness silently rested on JS's stable sort
        // preserving the orderBy('createdAt') result — true today, invisibly false after any
        // refactor that reorders this array.
        versions.push({ id: d.id, base: v.base || null, ms: v.createdAt?.toMillis?.() || 0 });
      });
      if (!versions.length) { publishOrphans(id, e, []); return; }
      const { status, orphans } = orphanVersionIds(versions, currentId);

      if (status === 'unknown') {
        // The lineage could not be established. Say nothing: do NOT publish an empty set (that
        // would erase a confirmed orphan for every device) and do NOT invent one.
        console.debug('[fork] lineage unknown for', id, '- not publishing');
        // Park the suspicion REGARDLESS of who asked. A repair-triggered recheck that only
        // parked when `suspected` would leave the published set stale until some unrelated
        // suspicion or ack happened to come along.
        pendingForkChecks.add(id);
        savePendingChecks();
        // If we can repair the chain, do — and re-verify once it has actually landed, rather
        // than waiting for the next snapshot to happen to re-trigger us.
        const repaired = repairChain(id, e, versions, currentId);
        if (repaired) {
          repaired
            .then(() => recheckOrphans(id, suspected, null, true))
            .catch(err => console.error('post-repair recheck failed', err));
        }
        return;
      }
      pendingForkChecks.delete(id);
      savePendingChecks();

      const allAcks = e.resolvedVersions || [];
      const acked = allAcks.filter(v => versions.some(x => x.id === v));
      // Drop acks whose version is gone (deleted / history cleared) so the list can't grow
      // forever. Owner only — a collaborator can't write the note's fields freely.
      const dead = allAcks.filter(v => !acked.includes(v));
      if (dead.length && e.owner === currentUserEmail) {
        updateDoc(doc(db, 'entries', id), { resolvedVersions: arrayRemove(...dead) })
          .catch(err => console.error('ack prune failed', err));
      }
      const unhandled = [...orphans].filter(v => !acked.includes(v));
      if (unhandled.length) {
        console.warn('[fork] note', id, 'orphans', unhandled,
          '\n  current:', currentId, ' held:', noteVersions[id],
          '\n  lineage:', versions.map(v => v.id + '<-' + v.base).join(', '));
      }
      publishOrphans(id, e, [...orphans]);
    }

    // The authoritative answer, computed where history is already loaded: any version that
    // is NOT an ancestor of `contentVersion` is an ORPHAN — a version some edit discarded
    // from current. Device-independent, needs no witness, correct retroactively forever.
    // Legacy inline versions are never orphans (they predate the lineage).
    // Returns { status, orphans }.
    //
    //   status 'orphans' — the lineage was fully walkable and these versions are orphaned.
    //   status 'clean'   — fully walkable, nothing orphaned.
    //   status 'unknown' — the lineage could NOT be established.
    //
    // The distinction is the whole point. An empty orphan set from a walk that could not run
    // is NOT evidence of a clean note, and callers must never publish it as one: the orphan
    // set is note-global truth now, so treating 'unknown' as 'clean' would let one device
    // with a partial cache ERASE a confirmed orphan for everybody. Losing the alert is worse
    // than showing it — the alert is the only thing telling the user their text was
    // overwritten.
    function orphanVersionIds(versions, currentId) {
      const byId = new Map(versions.map(v => [v.id, v]));
      // We don't know which version is current, or its doc isn't among the ones we loaded
      // (our own commit can outrun its own doc into the cache).
      if (!currentId || !byId.has(currentId)) return { status: 'unknown', orphans: new Set() };
      const ancestors = new Set();
      let cur = currentId;
      while (cur && !ancestors.has(cur)) {
        if (!byId.has(cur)) {
          // A `base` pointing at a version that isn't here: the chain has a HOLE (a deleted
          // version whose children weren't re-parented, a lost seed, a partial sync). We
          // cannot tell what lies upstream of it.
          return { status: 'unknown', orphans: new Set() };
        }
        ancestors.add(cur);
        cur = byId.get(cur).base;
      }
      const orphans = new Set(
        versions.filter(v => !v.legacy && !ancestors.has(v.id)).map(v => v.id));
      return { status: orphans.size ? 'orphans' : 'clean', orphans };
    }

    // ── Confirm-to-act button helper ──
    // First tap arms (turns the button rose for 3s); a second tap within that window
    // fires the action. Tapping elsewhere or the timeout resets it.
    function confirmButton(btn, icon, confirmAction) {
      let pending = false;
      let timer = null;
      let card = null;   // resolved lazily on arm — btn isn't in the DOM yet at call time
      const reset = () => {
        pending = false;
        clearTimeout(timer);
        timer = null;
        document.removeEventListener('pointerdown', onOutside, true);
        btn.innerHTML = icon;
        if (btn.dataset.baseClass != null) btn.className = btn.dataset.baseClass;
        btn.style.background = '';
        btn.style.borderColor = '';
        if (card) card.classList.remove('act-delete');
      };
      const onOutside = (e) => { if (!btn.contains(e.target)) reset(); };
      // Don't let the tap steal focus from the open editor — blurring it closes the
      // on-screen keyboard, which shifts the sticky toolbar and makes the button you
      // must tap twice jump out from under your finger between taps.
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (pending) {
          reset();
          confirmAction();
          return;
        }
        reset(); // clear any stale timer/listener from a previous cycle
        pending = true;
        card = btn.closest('.entry-card');
        if (card) card.classList.add('act-delete');    // tint the edited row + ridge rose
        btn.dataset.baseClass = btn.className;
        btn.innerHTML = icon.replace(/stroke="currentColor"/g, 'stroke="#fff"');
        const bg = btn.querySelector('.icon-bg');
        if (bg) bg.style.fill = '#d4728c';
        btn.style.background = '#d4728c';
        btn.style.borderColor = '#d4728c';
        document.addEventListener('pointerdown', onOutside, true);
        timer = setTimeout(reset, 3000);
      });
    }

    function relativeTime(date) {
      const now = Date.now();
      const diff = now - date.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'now';
      if (mins < 60) return mins + 'min ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 7) return days + 'd ago';
      if (days < 30) return Math.floor(days / 7) + 'w ago';
      const months = Math.floor(days / 30);
      if (months < 12) return months + 'm ago';
      const years = Math.floor(months / 12);
      return years + 'y ago';
    }

    const strip = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();

    // Zone-split + stripped text per entry, memoized on content so each search
    // keystroke doesn't re-split and re-normalize every note.
    const searchTextCache = new Map(); // entry.id -> { content, zones, full }
    function getSearchText(entry) {
      const hit = searchTextCache.get(entry.id);
      if (hit && hit.content === entry.content) return hit;
      const text = stripImageRefs(entry.content);
      const lines = text.split('\n');
      let inCode = false;
      const zoneTexts = { h1: '', h2: '', h3: '', body: '', code: '' };
      for (const line of lines) {
        if (line.startsWith('```')) { inCode = !inCode; continue; }
        if (inCode) { zoneTexts.code += ' ' + line; }
        else if (line.startsWith('# ')) zoneTexts.h1 += ' ' + line;
        else if (line.startsWith('## ')) zoneTexts.h2 += ' ' + line;
        else if (line.startsWith('### ')) zoneTexts.h3 += ' ' + line;
        else zoneTexts.body += ' ' + line;
      }
      const computed = {
        content: entry.content,
        // Strip each zone once
        zones: [
          { text: strip(zoneTexts.h1), w: 4 },
          { text: strip(zoneTexts.h2), w: 3 },
          { text: strip(zoneTexts.h3), w: 2 },
          { text: strip(zoneTexts.body), w: 1 },
          { text: strip(zoneTexts.code), w: 0.5 },
        ],
        full: strip(text),
      };
      searchTextCache.set(entry.id, computed);
      return computed;
    }

    function searchScore(entry, tokens) {
      const { zones, full } = getSearchText(entry);
      let score = 0;
      for (const t of tokens) {
        let best = 0;
        for (const z of zones) {
          if (z.text.includes(t)) { best = Math.max(best, z.w); }
        }
        if (!best) return 0; // token not found anywhere
        score += best;
      }
      // Proximity bonus for multi-token queries
      if (tokens.length > 1) {
        const positions = tokens.map(t => full.indexOf(t));
        const span = Math.max(...positions) - Math.min(...positions);
        if (span < 100) score += 2;
      }
      return score;
    }

    // ── Firestore 1 MiB document-size guard ──
    // An entry is ONE document; content + editHistory + the images map all share the
    // 1,048,576-byte limit. Pasted images are stored ONCE in `images` and referenced
    // from text as `img:<id>`, so the bytes never duplicate across history versions.
    const DOC_LIMIT = 1048576;
    const byteLen = (s) => new TextEncoder().encode(s == null ? '' : String(s)).length;
    function estimateEntrySize(content, history, images) {
      let size = 300; // doc name + base overhead + small fields (owner, shared, timestamps)
      size += byteLen(content) + 10; // content field
      for (const h of (history || [])) {
        size += byteLen(h && h.content) + byteLen(h && h.editedAt) + 26; // map-entry overhead
      }
      if (images) for (const id in images) size += byteLen(id) + byteLen(images[id]) + 14; // images map

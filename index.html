<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7bae7f">
  <link rel="manifest" href="/manifest.json">
  <!-- App icon: Josefin Sans 700, sage #7bae7f -->
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>One List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    header h1 { font-size: 1.4rem; flex: 1; }

    .header-icons {
      display: flex;
      gap: 4px;
    }

    .header-icons button {
      padding: 0 10px;
      height: 36px;
      font-size: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icons button.active {
      background: #7bae7f;
      color: #fff;
      border-color: #7bae7f;
    }

    #auth-btn {
      padding: 8px 16px;
      font-size: 0.9rem;
      background: #7bae7f;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #auth-section {
      display: none;
      text-align: center;
      margin-top: 40vh;
    }

    #auth-section button {
      padding: 12px 24px;
      font-size: 1rem;
      background: #7bae7f;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #app { display: none; }
    #app.cached { display: block; }

    #input-area { display: none; margin-bottom: 16px; }
    #input-area.open { display: block; }
    #search-area { display: none; }

    #new-entry {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      margin-bottom: 8px;
      outline: none;
    }
    #new-entry:focus { border-color: #7bae7f; box-shadow: 0 0 0 2px rgba(123,174,127,0.3); }

    .esc-hint {
      font-size: 0.8rem;
      color: #888;
    }

    #search-area.open {
      display: block;
      position: sticky;
      top: 0;
      background: #f5f5f5;
      padding: 8px 0;
      z-index: 10;
      margin-bottom: 8px;
    }

    #search-input {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }
    #search-input:focus { border-color: #7bae7f; box-shadow: 0 0 0 2px rgba(123,174,127,0.3); }

    .entry-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .entry-card.shared { border-left: 3px solid #7bae7f; }

    .entry-date {
      font-size: 0.8rem;
      color: #888;
      margin-left: auto;
      white-space: nowrap;
    }

    .entry-content {
      word-break: break-word;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .entry-content p { margin: 0 0 8px 0; }
    .entry-content p:last-child { margin-bottom: 0; }
    .entry-content ul, .entry-content ol { margin: 0 0 8px 0; padding-left: 24px; }
    .entry-content code { background: #eee; padding: 1px 4px; border-radius: 3px; font-size: 0.9em; }
    .entry-content pre { background: #eee; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 0 0 8px 0; }
    .entry-content pre code { background: none; padding: 0; }
    .entry-content blockquote { border-left: 3px solid #ccc; margin: 0 0 8px 0; padding-left: 12px; color: #666; }
    .entry-content h1 { font-size: 1.2rem; margin: 0 0 6px 0; }
    .entry-content h2 { font-size: 1.1rem; margin: 0 0 6px 0; }
    .entry-content h3 { font-size: 1rem; margin: 0 0 6px 0; }
    .entry-content a { color: #5e9462; }
    .entry-content li:has(input[type="checkbox"]) { list-style: none; margin-left: -24px; }
    .entry-content li:has(input[type="checkbox"]) input[type="checkbox"] { margin-right: 6px; }
    .entry-content li:has(input[type="checkbox"]) > ul { margin-left: 24px; }
    .entry-content input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; min-width: 18px;
      border: 2px solid #888; border-radius: 4px;
      cursor: pointer; position: relative; top: 2px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .entry-content input[type="checkbox"]:checked {
      background: #7bae7f; border-color: #7bae7f;
    }
    .entry-content input[type="checkbox"]:checked::after {
      content: '✓'; color: white; font-size: 13px; font-weight: bold;
    }
    .entry-content input[type="checkbox"]:hover {
      border-color: #7bae7f;
    }

    .entry-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .entry-actions button {
      padding: 6px 10px;
      font-size: 0.85rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .entry-actions button:active { background: #eee; }
    .icon-bg { fill: #fff; }

    .version-icon {
      cursor: pointer;
      font-size: 0.8rem;
      color: #888;
      margin-left: 4px;
      display: inline;
      user-select: none;
      vertical-align: middle;
    }

    .history-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #888;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .history-nav button {
      padding: 6px 10px;
      font-size: 0.85rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .history-nav button:disabled { opacity: 0.3; cursor: default; }

    .history-viewing .entry-content { opacity: 0.7; }

    .btn-clear-history { color: #d4728c; border-color: #d4728c; font-size: 0.8rem; padding: 2px 8px; }

    .btn-edit { }
    .btn-rescue { }
    .btn-delete { }
    .btn-confirm-delete { background: #d4728c !important; color: #fff !important; border-color: #d4728c; }

    .edit-textarea {
      width: 100%;
      min-height: 80px;
      padding: 8px;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #7bae7f;
      border-radius: 6px;
      outline: none;
      resize: none;
      margin-bottom: 8px;
      overflow-y: hidden;
    }
    .edit-textarea:focus { border-color: #7bae7f; box-shadow: 0 0 0 2px rgba(123,174,127,0.3); }

    #status {
      text-align: center;
      font-size: 0.8rem;
      color: #888;
      padding: 8px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e0e0e0; }
      #new-entry { background: #2a2a2a; color: #e0e0e0; border-color: #444; }
      #search-input { background: #2a2a2a; color: #e0e0e0; border-color: #444; }
      #search-area.open { background: #1a1a1a; }
      .header-icons button { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
      .entry-card { background: #2a2a2a; border-color: #444; }
      .entry-card.shared { border-left-color: #7bae7f; }
      .entry-actions button { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
      .entry-actions button:active { background: #333; }
      .icon-bg { fill: #2a2a2a; }
      .entry-content code { background: #383838; }
      .entry-content pre { background: #383838; }
      .entry-content blockquote { border-color: #555; color: #aaa; }
      .entry-content a { color: #8ab4f8; }
      .history-nav button { background: #2a2a2a; border-color: #444; color: #e0e0e0; }
      .version-icon { color: #aaa; }
      .btn-clear-history { color: #e0a0b0; border-color: #e0a0b0; }
      .btn-edit { }
      .btn-rescue { }
      .btn-delete { }
      .edit-textarea { background: #2a2a2a; color: #e0e0e0; border-color: #7bae7f; }
      .btn-confirm-delete { background: #d4728c !important; color: #fff !important; }
    }
  </style>
</head>
<body>

  <div id="auth-section">
    <h1>One List</h1>
    <p style="margin: 16px 0; color: #666;">Append & Review</p>
    <button id="sign-in-btn">Sign in with Google</button>
  </div>

  <div id="app">
    <header>
      <h1 style="display:flex;align-items:center;gap:8px"><img src="/icon-192.png" alt="One List" width="32" height="32" style="border-radius:20%;flex-shrink:0"><span id="deploy-date" style="font-size:0.45em;color:#aaa;font-weight:normal">2026-03-23 11:14</span></h1>
      <div class="header-icons">
        <button id="toggle-view" title="Filter view"></button>
        <button id="toggle-search" title="Search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><line x1="22" y1="22" x2="15" y2="15"/></svg></button>
        <button id="toggle-new" title="New entry"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
    </header>

    <div id="input-area">
      <textarea id="new-entry" placeholder="What's on your mind?"></textarea>
      <div class="entry-actions">
        <button id="append-btn" class="btn-edit">Save</button>
        <button id="cancel-new" class="btn-delete">Cancel</button>
        <span id="new-esc-hint" class="esc-hint"></span>
        <button id="new-bullet-btn" title="Toggle bullet list" style="margin-left:auto;"></button>
        <button id="new-checkbox-btn" title="Toggle checkbox"></button>
      </div>
    </div>

    <div id="search-area">
      <input type="search" id="search-input" placeholder="Search entries...">
    </div>

    <div id="entries-list"></div>
    <div id="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"
          integrity="sha384-H+hy9ULve6xfxRkWIh/YOtvDdpXgV2fmAGQkIDTxIgZwNoaoBal14Di2YTMR6MzR"
          crossorigin="anonymous"></script>
  <script type="module">
    const renderer = new marked.Renderer();
    const originalLink = renderer.link.bind(renderer);
    renderer.link = function(token) {
      if (token.href && !/^https?:\/\/|^mailto:/i.test(token.href)) {
        token.href = 'https://' + token.href;
      }
      return originalLink(token);
    };
    marked.setOptions({ breaks: true, gfm: true, renderer });

    const pendingCheckboxUpdates = new Set();
    function attachCheckboxHandlers(contentEl, entry) {
      contentEl.querySelectorAll('input[type="checkbox"]').forEach((cb, idx) => {
        cb.disabled = false;
        cb.addEventListener('change', async () => {
          let count = 0;
          const newContent = entry.content.replace(/^(\s*[-*]\s+)\[([ xX])\]/gm, (match, prefix, check) => {
            if (count++ === idx) {
              return prefix + (cb.checked ? '[x]' : '[ ]');
            }
            return match;
          });
          if (newContent !== entry.content) {
            entry.content = newContent;
            pendingCheckboxUpdates.add(entry.id);
            await updateDoc(doc(db, 'entries', entry.id), { content: newContent });
            pendingCheckboxUpdates.delete(entry.id);
          }
        });
      });
    }
    function handleListContinuation(e, textarea) {
      if (e.key !== 'Enter' || e.ctrlKey || e.metaKey || e.shiftKey) return false;
      const { selectionStart, value } = textarea;
      const before = value.slice(0, selectionStart);
      const lineStart = before.lastIndexOf('\n') + 1;
      const line = before.slice(lineStart);
      // Match bullet/checkbox/numbered list patterns
      const match = line.match(/^(\s*)([-*]\s+\[([ xX])\]\s?|[-*]\s+|(\d+)\.\s+)(.*)/);
      if (!match) return false;
      const [, indent, prefix, checkbox, num, content] = match;
      // If current line's content is empty, clear the list marker instead
      if (!content) {
        e.preventDefault();
        textarea.setRangeText('', lineStart, selectionStart, 'end');
        textarea.dispatchEvent(new Event('input'));
        return true;
      }
      let newPrefix;
      if (checkbox !== undefined) {
        // Checkbox list - always insert unchecked
        newPrefix = indent + prefix.replace(/\[[ xX]\]/, '[ ]');
      } else if (num) {
        newPrefix = indent + (parseInt(num) + 1) + '. ';
      } else {
        newPrefix = indent + prefix;
      }
      e.preventDefault();
      textarea.setRangeText('\n' + newPrefix, selectionStart, selectionStart, 'end');
      textarea.dispatchEvent(new Event('input'));
      return true;
    }

    function toggleCheckboxMarker(textarea) {
      const { selectionStart, selectionEnd, value } = textarea;
      // Expand to full line boundaries
      const fullStart = value.lastIndexOf('\n', selectionStart - 1) + 1;
      const rawEnd = selectionStart === selectionEnd
        ? value.indexOf('\n', selectionStart)
        : value.indexOf('\n', selectionEnd);
      const fullEnd = rawEnd === -1 ? value.length : rawEnd;

      const before = value.slice(0, fullStart);
      const selected = value.slice(fullStart, fullEnd);
      const after = value.slice(fullEnd);
      const lines = selected.split('\n');
      const hasContent = lines.some(l => l.trim());
      const allHaveCheckbox = hasContent && lines.every(l => !l.trim() || /^\s*[-*]\s+\[[ xX]\]\s/.test(l));
      const replacement = lines.map(line => {
        if (hasContent && !line.trim()) return line;
        if (allHaveCheckbox) {
          return line.replace(/^(\s*)[-*]\s+\[[ xX]\]\s?/, '$1');
        }
        if (/^\s*[-*]\s+\[[ xX]\]\s/.test(line)) return line;
        // Strip existing bullet prefix before adding checkbox
        const stripped = line.replace(/^(\s*)[-*]\s+/, '$1');
        return stripped.replace(/^(\s*)/, '$1- [ ] ');
      }).join('\n');
      textarea.value = before + replacement + after;
      textarea.selectionStart = before.length;
      textarea.selectionEnd = before.length + replacement.length;
      textarea.dispatchEvent(new Event('input'));
      textarea.focus();
    }

    function makeCheckboxButton(textarea) {
      const btn = document.createElement('button');
      btn.innerHTML = ICON.checkbox;
      btn.title = 'Toggle checkbox';
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        toggleCheckboxMarker(textarea);
      });
      return btn;
    }

    function toggleBulletMarker(textarea) {
      const { selectionStart, selectionEnd, value } = textarea;
      const fullStart = value.lastIndexOf('\n', selectionStart - 1) + 1;
      const rawEnd = selectionStart === selectionEnd
        ? value.indexOf('\n', selectionStart)
        : value.indexOf('\n', selectionEnd);
      const fullEnd = rawEnd === -1 ? value.length : rawEnd;

      const before = value.slice(0, fullStart);
      const selected = value.slice(fullStart, fullEnd);
      const after = value.slice(fullEnd);
      const lines = selected.split('\n');
      const hasContent = lines.some(l => l.trim());
      const allHaveBullet = hasContent && lines.every(l => !l.trim() || (/^\s*[-*]\s+/.test(l) && !/^\s*[-*]\s+\[[ xX]\]\s/.test(l)));
      const replacement = lines.map(line => {
        if (hasContent && !line.trim()) return line;
        if (allHaveBullet) {
          return line.replace(/^(\s*)[-*]\s+/, '$1');
        }
        // Already a plain bullet (not checkbox) — keep it
        if (/^\s*[-*]\s+/.test(line) && !/^\s*[-*]\s+\[[ xX]\]\s/.test(line)) return line;
        // Strip existing checkbox prefix before adding bullet
        const stripped = line.replace(/^(\s*)[-*]\s+\[[ xX]\]\s?/, '$1');
        return stripped.replace(/^(\s*)/, '$1- ');
      }).join('\n');
      textarea.value = before + replacement + after;
      textarea.selectionStart = before.length;
      textarea.selectionEnd = before.length + replacement.length;
      textarea.dispatchEvent(new Event('input'));
      textarea.focus();
    }

    function makeBulletButton(textarea) {
      const btn = document.createElement('button');
      btn.innerHTML = ICON.bulletList;
      btn.title = 'Toggle bullet list';
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        toggleBulletMarker(textarea);
      });
      return btn;
    }

    // ── Firebase SDK imports ──
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
    import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, GoogleAuthProvider, onAuthStateChanged }
      from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';
    import { initializeFirestore, persistentLocalCache, persistentSingleTabManager,
             collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot,
             query, orderBy, where, serverTimestamp, arrayUnion, getDoc }
      from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js';

    // ── Firebase config ──
    const firebaseConfig = {
      apiKey: "AIzaSyAYejZ0JRpolX9NBAYtYYG4Q4krA7z5QKw",
      authDomain: "one-list-ce90d.firebaseapp.com",
      projectId: "one-list-ce90d",
      storageBucket: "one-list-ce90d.firebasestorage.app",
      messagingSenderId: "1046982287763",
      appId: "1:1046982287763:web:fdd863e848a72d23d10866"
    };

    // ── Init ──
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = initializeFirestore(app, {
      localCache: persistentLocalCache({ tabManager: persistentSingleTabManager() })
    });

    const entriesRef = collection(db, 'entries');

    // ── Icons (outline SVGs) ──
    const svgAttrs = 'width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
    const ICON = {
      bump: `<svg ${svgAttrs}><line x1="12" y1="21" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`,
      edit: `<svg ${svgAttrs}><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>`,
      trash: `<svg ${svgAttrs}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
      share: `<svg ${svgAttrs}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`,
      unshare: `<svg ${svgAttrs}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
      clearHistory: `<svg ${svgAttrs}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><circle class="icon-bg" cx="17" cy="17" r="5" stroke-width="1.5"/><path d="M17 15v2l1.5 1" stroke-width="1.5"/></svg>`,
      viewAll: `<svg ${svgAttrs}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
      viewShared: `<svg ${svgAttrs}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`,
      viewUnshared: `<svg ${svgAttrs}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
      checkbox: `<svg ${svgAttrs}><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg>`,
      bulletList: `<svg ${svgAttrs}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
    };

    // ── State ──
    let allEntries = [];
    let currentFilter = '';
    let currentUserEmail = null;
    let viewMode = 'all'; // 'all' | 'shared' | 'unshared'
    let unsubOwn = null;
    let unsubShared = null;
    let ownEntries = [];
    let sharedEntries = [];
    const activeEdits = new Map(); // entryId -> { value, card }
    let renderAbort = null; // AbortController for per-render listeners

    // ── DOM refs ──
    const authSection = document.getElementById('auth-section');
    const appSection = document.getElementById('app');
    const signInBtn = document.getElementById('sign-in-btn');
    const authBtn = document.getElementById('auth-btn');
    const newEntry = document.getElementById('new-entry');
    const appendBtn = document.getElementById('append-btn');
    const searchInput = document.getElementById('search-input');
    const entriesList = document.getElementById('entries-list');
    const statusEl = document.getElementById('status');
    const toggleViewBtn = document.getElementById('toggle-view');
    const toggleSearchBtn = document.getElementById('toggle-search');
    const toggleNewBtn = document.getElementById('toggle-new');
    const inputArea = document.getElementById('input-area');
    const searchArea = document.getElementById('search-area');

    function updateViewBtn() {
      const map = { all: [ICON.viewAll, 'All', ''], shared: [ICON.viewShared, 'Shared', 'color:#7bae7f;border-color:#7bae7f'], unshared: [ICON.viewUnshared, 'Unshared', ''] };
      const [icon, label, style] = map[viewMode];
      toggleViewBtn.innerHTML = icon + '<span style="margin-left:4px">' + label + '</span>';
      toggleViewBtn.style.cssText = style;
    }
    updateViewBtn();

    toggleViewBtn.addEventListener('click', () => {
      if (viewMode === 'all') viewMode = 'shared';
      else if (viewMode === 'shared') viewMode = 'unshared';
      else viewMode = 'all';
      updateViewBtn();
      renderEntries();
    });

    toggleSearchBtn.addEventListener('click', () => {
      const opened = searchArea.classList.toggle('open');
      toggleSearchBtn.classList.toggle('active', opened);
      if (opened) { searchInput.focus(); }
      else { searchInput.value = ''; currentFilter = ''; renderEntries(); }
    });

    toggleNewBtn.addEventListener('click', () => {
      const opened = inputArea.classList.toggle('open');
      toggleNewBtn.classList.toggle('active', opened);
      if (opened) { newEntry.focus(); }
    });

    // ── Auth ──
    const provider = new GoogleAuthProvider();

    signInBtn.addEventListener('click', () => {
      signInWithPopup(auth, provider).catch(() => signInWithRedirect(auth, provider));
    });
    getRedirectResult(auth).catch(() => {});

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUserEmail = user.email;
        // Check if user is in allowed list
        try {
          const allowedDoc = await getDoc(doc(db, 'config', 'allowedUsers'));
          if (allowedDoc.exists() && !allowedDoc.data().emails.includes(user.email)) {
            await signOut(auth);
            alert('Access denied. Your email is not authorized.');
            return;
          }
        } catch (e) {
          // If config doc doesn't exist yet, allow access (initial setup)
        }
        authSection.style.display = 'none';
        appSection.style.display = 'block';
        startListening();

        // ── Handle Web Share Target ──
        const shareParams = new URLSearchParams(window.location.search);
        const shareTitle = shareParams.get('title');
        const shareText = (shareParams.get('text') || '').replace(/^"?Share via"?\s*/i, '').trim() || null;
        const shareUrl = shareParams.get('url');
        if (shareTitle || shareText || shareUrl) {
          const parts = [shareTitle, shareText, shareUrl].filter(Boolean);
          newEntry.value = parts.join('\n\n');
          inputArea.classList.add('open');
          toggleNewBtn.classList.add('active');
          newEntry.dispatchEvent(new Event('input'));
          newEntry.focus();
          history.replaceState(null, '', '/');
        }
      } else {
        currentUserEmail = null;
        authSection.style.display = 'block';
        appSection.style.display = 'none';
        if (unsubOwn) { unsubOwn(); unsubOwn = null; }
        if (unsubShared) { unsubShared(); unsubShared = null; }
      }
    });

    // ── Real-time listeners (two queries merged) ──
    function startListening() {
      if (unsubOwn) return;

      const ownQuery = query(entriesRef, where('owner', '==', currentUserEmail), orderBy('sortTime', 'desc'));
      const sharedQuery = query(entriesRef, where('shared', '==', true), orderBy('sortTime', 'desc'));

      unsubOwn = onSnapshot(ownQuery, { includeMetadataChanges: true }, (snapshot) => {
        ownEntries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        mergeAndRender();
        const hasPending = snapshot.metadata.hasPendingWrites;
        statusEl.textContent = hasPending ? 'Saving...' : '';
      });

      unsubShared = onSnapshot(sharedQuery, { includeMetadataChanges: true }, (snapshot) => {
        sharedEntries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        mergeAndRender();
        const hasPending = snapshot.metadata.hasPendingWrites;
        statusEl.textContent = hasPending ? 'Saving...' : '';
      });
    }

    function mergeAndRender() {
      const map = new Map();
      for (const e of ownEntries) map.set(e.id, e);
      for (const e of sharedEntries) map.set(e.id, e);
      allEntries = [...map.values()].sort((a, b) => {
        const ta = a.sortTime?.toMillis?.() || 0;
        const tb = b.sortTime?.toMillis?.() || 0;
        return tb - ta;
      });
      renderEntries();
    }

    // ── Render ──
    const cardCache = new Map(); // entry.id -> { card, entry, contentEl, dateText, ts, fmtOpts, versions, buildViewMode }

    function renderEntries() {
      if (renderAbort) renderAbort.abort();
      renderAbort = new AbortController();
      const filter = currentFilter.toLowerCase();

      const visibleIds = new Set();
      const orderedCards = [];

      for (let entry of allEntries) {
        // View mode filter
        const isOwn = entry.owner === currentUserEmail;
        if (viewMode === 'unshared' && (!isOwn || entry.shared)) continue;
        if (viewMode === 'shared' && !entry.shared) continue;
        if (filter && !entry.content.toLowerCase().includes(filter)) continue;

        visibleIds.add(entry.id);

        // Reuse existing DOM for entries being edited
        const edit = activeEdits.get(entry.id);
        if (edit && edit.card) {
          orderedCards.push(edit.card);
          continue;
        }

        // Check if we can reuse an existing card
        const cached = cardCache.get(entry.id);
        if (cached && !activeEdits.has(entry.id)) {
          // Skip re-render while a checkbox toggle is in flight to prevent flicker
          if (pendingCheckboxUpdates.has(entry.id)) {
            orderedCards.push(cached.card);
            continue;
          }
          const prev = cached.entry;
          const prevHistLen = (prev.editHistory || []).length;
          const curHistLen = (entry.editHistory || []).length;
          // If history length changed, or history content changed, invalidate cache so it rebuilds
          const histChanged = prevHistLen !== curHistLen ||
            JSON.stringify(prev.editHistory) !== JSON.stringify(entry.editHistory);
          if (histChanged) {
            cardCache.delete(entry.id);
          } else {
            // Update in-place if only content or shared changed
            if (prev.content !== entry.content || prev.shared !== entry.shared) {
              cached.entry = entry;
              cached.card.className = 'entry-card' + (entry.shared ? ' shared' : '');
              cached.contentEl.innerHTML = marked.parse(entry.content);
              attachCheckboxHandlers(cached.contentEl, entry);
              const ts = entry.sortTime?.toDate?.() || entry.createdAt?.toDate?.() || new Date();
              cached.dateText.textContent = ts.toLocaleDateString('en-US', cached.fmtOpts);
              cached.buildViewMode(entry);
            }
            orderedCards.push(cached.card);
            continue;
          }
        }

        const card = document.createElement('div');
        card.className = 'entry-card' + (entry.shared ? ' shared' : '');

        const dateEl = document.createElement('div');
        dateEl.className = 'entry-date';
        const ts = entry.sortTime?.toDate?.() || entry.createdAt?.toDate?.() || new Date();
        const fmtOpts = { year: 'numeric', month: 'short', day: 'numeric' };
        const dateText = document.createElement('span');
        dateText.textContent = ts.toLocaleDateString('en-US', fmtOpts);
        dateEl.appendChild(dateText);

        // History state
        const history = entry.editHistory || [];
        const hasHistory = history.length > 0;
        let historyOpen = false;
        // versions: [oldest edit, ..., newest edit, current]
        let versions = hasHistory
          ? [...history.map(h => ({ content: h.content, date: h.editedAt })), { content: entry.content, date: null }]
          : [{ content: entry.content, date: null }];
        let versionIdx = versions.length - 1;

        const closeHistory = () => {
          historyOpen = false;
          histNav.style.display = 'none';
          actions.style.display = 'flex';
          versionIdx = versions.length - 1;
          card.classList.remove('history-viewing');
          contentEl.innerHTML = marked.parse(entry.content);
          attachCheckboxHandlers(contentEl, entry);
          dateText.textContent = ts.toLocaleDateString('en-US', fmtOpts);
        };

        // Version icon (clock icon like Google Docs) - shown next to date if entry has history
        if (hasHistory) {
          const toggleHistory = () => {
            if (historyOpen) { closeHistory(); return; }
            historyOpen = true;
            histNav.style.display = 'flex';
            actions.style.display = 'none';
            updateHistoryView();
          };
          const versionIcon = document.createElement('span');
          versionIcon.className = 'version-icon';
          versionIcon.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>';
          versionIcon.title = `${versions.length} versions`;
          dateEl.style.cursor = 'pointer';
          dateEl.addEventListener('click', toggleHistory);
          document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && historyOpen) { e.preventDefault(); closeHistory(); }
          }, { signal: renderAbort.signal });
          dateEl.insertBefore(document.createTextNode(' '), dateEl.firstChild);
          dateEl.insertBefore(versionIcon, dateEl.firstChild);
        }

        const contentEl = document.createElement('div');
        contentEl.className = 'entry-content';
        contentEl.innerHTML = marked.parse(entry.content);
        attachCheckboxHandlers(contentEl, entry);

        const actions = document.createElement('div');
        actions.className = 'entry-actions';

        // History navigation (hidden by default, placed after actions)
        const histNav = document.createElement('div');
        histNav.className = 'history-nav';
        histNav.style.display = 'none';

        const fmtDate = (iso) => new Date(iso).toLocaleDateString('en-US', fmtOpts);

        const prevBtn = document.createElement('button');
        prevBtn.textContent = '\u2190';
        const nextBtn = document.createElement('button');
        nextBtn.textContent = '\u2192';
        const label = document.createElement('span');

        const updateHistoryView = () => {
          if (!historyOpen) return;
          const isCurrent = versionIdx === versions.length - 1;
          contentEl.innerHTML = marked.parse(versions[versionIdx].content);
          prevBtn.disabled = versionIdx === 0;
          nextBtn.disabled = isCurrent;
          const counter = `${versionIdx + 1}/${versions.length}`;
          label.textContent = counter;
          dateText.textContent = isCurrent
            ? ts.toLocaleDateString('en-US', fmtOpts)
            : fmtDate(versions[versionIdx].date);
          card.classList.toggle('history-viewing', !isCurrent);
          buildHistoryActions();
        };

        prevBtn.addEventListener('click', () => { if (versionIdx > 0) { versionIdx--; updateHistoryView(); } });
        nextBtn.addEventListener('click', () => { if (versionIdx < versions.length - 1) { versionIdx++; updateHistoryView(); } });

        // Build version-specific action buttons inside history nav
        const histActions = document.createElement('span');
        histActions.style.cssText = 'display:flex;gap:8px;';

        const histRight = document.createElement('span');
        histRight.style.cssText = 'display:flex;gap:8px;align-items:center;margin-left:auto;';

        function buildHistoryActions() {
          histActions.innerHTML = '';
          const isCurrent = versionIdx === versions.length - 1;
          const entryIsOwn = entry.owner === currentUserEmail;

          // Bump button (only for non-current versions)
          if (!isCurrent) {
            const rescueVerBtn = document.createElement('button');
            rescueVerBtn.className = 'btn-rescue';
            rescueVerBtn.innerHTML = ICON.bump;
            rescueVerBtn.title = 'Bump';
            rescueVerBtn.addEventListener('click', async () => {
              const rescuedContent = versions[versionIdx].content;
              const newHistory = history.map((h, i) => i === versionIdx
                ? { content: entry.content, editedAt: (entry.sortTime?.toDate?.() || new Date()).toISOString() }
                : h
              );
              await updateDoc(doc(db, 'entries', entry.id), {
                content: rescuedContent,
                sortTime: serverTimestamp(),
                editHistory: newHistory
              });
            }, { once: true });
            histActions.appendChild(rescueVerBtn);
          }

          // Edit button (for any version)
          const editVerBtn = document.createElement('button');
          editVerBtn.className = 'btn-edit';
          editVerBtn.innerHTML = ICON.edit;
          editVerBtn.title = 'Edit';
          editVerBtn.addEventListener('click', () => {
            histNav.style.display = 'none';
            activeEdits.set(entry.id, { value: versions[versionIdx].content, card });
            buildEditMode(versions[versionIdx].content, !isCurrent, true);
          }, { once: true });
          histActions.appendChild(editVerBtn);

          // Delete button on the right — swaps between delete version and delete all history
          histDeleteSlot.innerHTML = '';
          if (entryIsOwn) {
            if (!isCurrent) {
              // Delete this version
              const delVerBtn = document.createElement('button');
              delVerBtn.innerHTML = ICON.trash;
              delVerBtn.title = 'Delete version';
              delVerBtn.addEventListener('click', () => {
                delVerBtn.textContent = 'Confirm?';
                delVerBtn.className = 'btn-confirm-delete';
                delVerBtn.addEventListener('click', async () => {
                  const newHistory = history.filter((_, i) => i !== versionIdx);
                  await updateDoc(doc(db, 'entries', entry.id), { editHistory: newHistory });
                }, { once: true });
                setTimeout(() => {
                  delVerBtn.innerHTML = ICON.trash;
                  delVerBtn.className = '';
                }, 3000);
              }, { once: true });
              histDeleteSlot.appendChild(delVerBtn);
            } else {
              // Delete all history
              const clearBtn = document.createElement('button');
              clearBtn.innerHTML = ICON.clearHistory;
              clearBtn.title = 'Delete all history';
              clearBtn.addEventListener('click', () => {
                clearBtn.textContent = 'Confirm?';
                clearBtn.className = 'btn-confirm-delete';
                clearBtn.addEventListener('click', async () => {
                  await updateDoc(doc(db, 'entries', entry.id), { editHistory: [] });
                }, { once: true });
                setTimeout(() => {
                  clearBtn.innerHTML = ICON.clearHistory;
                  clearBtn.className = '';
                }, 3000);
              }, { once: true });
              histDeleteSlot.appendChild(clearBtn);
            }
          }

        }

        // Layout: [Bump Edit] ... [← 3/4 → ✕] [Delete]
        histNav.appendChild(histActions);

        const histDeleteSlot = document.createElement('span');
        histDeleteSlot.style.cssText = 'display:flex;';

        histRight.appendChild(prevBtn);
        histRight.appendChild(label);
        histRight.appendChild(nextBtn);
        if (hasHistory) {
          const closeHistBtn = document.createElement('button');
          closeHistBtn.textContent = '✕';
          closeHistBtn.title = 'Close history';
          closeHistBtn.addEventListener('click', closeHistory);
          histRight.appendChild(closeHistBtn);
        }
        histRight.appendChild(histDeleteSlot);
        histNav.appendChild(histRight);

        function buildViewMode(currentEntry) {
          if (currentEntry) entry = currentEntry;
          actions.style.display = 'flex';
          actions.innerHTML = '';
          const entryIsOwn = entry.owner === currentUserEmail;

          const bumpBtn = document.createElement('button');
          bumpBtn.className = 'btn-rescue';
          bumpBtn.innerHTML = ICON.bump;
          bumpBtn.title = 'Bump';
          bumpBtn.addEventListener('click', () => rescueEntry(entry.id));

          const editBtn = document.createElement('button');
          editBtn.className = 'btn-edit';
          editBtn.innerHTML = ICON.edit;
          editBtn.title = 'Edit';
          editBtn.addEventListener('click', () => {
            activeEdits.set(entry.id, { value: entry.content, card });
            buildEditMode(entry.content, false);
          }, { once: true });

          actions.appendChild(bumpBtn);
          actions.appendChild(editBtn);

          if (entryIsOwn) {
            const shareBtn = document.createElement('button');
            shareBtn.innerHTML = entry.shared ? ICON.share : ICON.unshare;
            shareBtn.title = entry.shared ? 'Unshare' : 'Share';
            if (entry.shared) shareBtn.style.cssText = 'color:#7bae7f;border-color:#7bae7f';
            shareBtn.addEventListener('click', async () => {
              await updateDoc(doc(db, 'entries', entry.id), { shared: !entry.shared });
            });
            actions.appendChild(shareBtn);
          } else {
            const ownerLabel = document.createElement('span');
            ownerLabel.className = 'entry-date';
            ownerLabel.textContent = (entry.owner || '').split('@')[0];
            actions.appendChild(ownerLabel);
          }

          actions.appendChild(dateEl);

          if (entryIsOwn) {
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.innerHTML = ICON.trash;
            deleteBtn.title = 'Delete';
            deleteBtn.addEventListener('click', () => {
              deleteBtn.textContent = 'Confirm?';
              deleteBtn.className = 'btn-confirm-delete';
              deleteBtn.addEventListener('click', () => removeEntry(entry.id), { once: true });
              setTimeout(() => {
                deleteBtn.innerHTML = ICON.trash;
                deleteBtn.className = 'btn-delete';
              }, 3000);
            }, { once: true });
            actions.appendChild(deleteBtn);
          }

          // Reset history view to current
          versionIdx = versions.length - 1;
          card.classList.remove('history-viewing');
          contentEl.innerHTML = marked.parse(entry.content);
          attachCheckboxHandlers(contentEl, entry);
          dateText.textContent = ts.toLocaleDateString('en-US', fmtOpts);
        }

        function buildEditMode(initialValue, makeCurrentOnSave, returnToHistory) {
          // Swap content for textarea
          const textarea = document.createElement('textarea');
          textarea.className = 'edit-textarea';
          textarea.value = initialValue;
          const currentContent = card.querySelector('.entry-content, .edit-textarea');
          if (currentContent) currentContent.replaceWith(textarea);
          textarea.style.height = 'auto';
          textarea.style.height = textarea.scrollHeight + 'px';
          textarea.addEventListener('input', () => {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
            activeEdits.set(entry.id, { value: textarea.value, card });
          });
          textarea.focus();

          // Replace action buttons with Save + Cancel
          actions.style.display = 'flex';
          actions.innerHTML = '';
          const saveBtn = document.createElement('button');
          saveBtn.className = 'btn-edit';
          saveBtn.textContent = 'Save';
          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'btn-delete';
          cancelBtn.textContent = 'Cancel';
          const escHint = document.createElement('span');
          escHint.className = 'esc-hint';

          const cancelEdit = () => {
            activeEdits.delete(entry.id);
            contentEl.innerHTML = marked.parse(entry.content);
            attachCheckboxHandlers(contentEl, entry);
            textarea.replaceWith(contentEl);
            if (returnToHistory) {
              actions.style.display = 'none';
              histNav.style.display = 'flex';
              updateHistoryView();
            } else {
              buildViewMode();
            }
          };

          const saveEdit = async () => {
            const newContent = textarea.value.trim();
            if (newContent && newContent !== entry.content) {
              activeEdits.delete(entry.id);
              // Restore view mode immediately so the snapshot re-render finds contentEl in the DOM
              textarea.replaceWith(contentEl);
              contentEl.innerHTML = marked.parse(newContent);
              attachCheckboxHandlers(contentEl, { ...entry, content: newContent });
              buildViewMode();
              await updateDoc(doc(db, 'entries', entry.id), {
                content: newContent,
                editHistory: arrayUnion({ content: entry.content, editedAt: (entry.sortTime?.toDate?.() || new Date()).toISOString() })
              });
            } else if (makeCurrentOnSave && newContent === initialValue && newContent !== entry.content) {
              activeEdits.delete(entry.id);
              textarea.replaceWith(contentEl);
              contentEl.innerHTML = marked.parse(newContent);
              attachCheckboxHandlers(contentEl, { ...entry, content: newContent });
              buildViewMode();
              await updateDoc(doc(db, 'entries', entry.id), {
                content: newContent,
                editHistory: arrayUnion({ content: entry.content, editedAt: (entry.sortTime?.toDate?.() || new Date()).toISOString() })
              });
            } else {
              cancelEdit();
            }
          };

          saveBtn.addEventListener('click', saveEdit);
          cancelBtn.addEventListener('click', cancelEdit);

          let editEscPending = false;
          textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
              e.preventDefault();
              if (textarea.value.trim() === entry.content) {
                cancelEdit();
              } else if (editEscPending) {
                cancelEdit();
              } else {
                editEscPending = true;
                escHint.textContent = 'Esc again to discard';
                setTimeout(() => { editEscPending = false; escHint.textContent = ''; }, 3000);
              }
            }
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveEdit(); }
            else if (e.key === 'Enter') { handleListContinuation(e, textarea); }
          });

          actions.appendChild(saveBtn);
          actions.appendChild(cancelBtn);
          actions.appendChild(escHint);
          const blBtn = makeBulletButton(textarea);
          blBtn.style.marginLeft = 'auto';
          actions.appendChild(blBtn);
          const cbBtn = makeCheckboxButton(textarea);
          actions.appendChild(cbBtn);
        }

        card.appendChild(contentEl);
        card.appendChild(actions);
        card.appendChild(histNav);

        // Cache the card for reuse
        cardCache.set(entry.id, { card, entry, contentEl, dateText, ts, fmtOpts, versions, buildViewMode });

        if (activeEdits.has(entry.id)) {
          buildEditMode(activeEdits.get(entry.id).value, false);
        } else {
          buildViewMode();
        }
        orderedCards.push(card);
      }

      // Remove cards for entries no longer visible
      for (const [id] of cardCache) {
        if (!visibleIds.has(id)) cardCache.delete(id);
      }

      // FLIP animation: record old positions
      const oldRects = new Map();
      for (const card of entriesList.children) {
        oldRects.set(card, card.getBoundingClientRect());
      }

      // Reconcile DOM order without removing/re-adding unchanged cards
      let i = 0;
      for (const card of orderedCards) {
        const existing = entriesList.children[i];
        if (existing !== card) {
          entriesList.insertBefore(card, existing || null);
        }
        i++;
      }
      // Remove extra trailing children
      while (entriesList.children.length > orderedCards.length) {
        entriesList.removeChild(entriesList.lastChild);
      }

      // FLIP animation: animate cards that moved, only if both old and new positions are near viewport
      const vh = window.innerHeight;
      for (const card of orderedCards) {
        const oldRect = oldRects.get(card);
        if (!oldRect) continue;
        const newRect = card.getBoundingClientRect();
        const dy = oldRect.top - newRect.top;
        const nearViewport = oldRect.bottom > -vh && oldRect.top < 2 * vh
                          && newRect.bottom > -vh && newRect.top < 2 * vh;
        if (Math.abs(dy) > 1 && nearViewport) {
          card.style.transform = `translateY(${dy}px)`;
          card.style.transition = 'none';
          requestAnimationFrame(() => {
            card.style.transition = 'transform 0.3s ease';
            card.style.transform = '';
            card.addEventListener('transitionend', () => {
              card.style.transition = '';
            }, { once: true });
          });
        }
      }
    }

    // ── Actions ──
    async function appendEntry() {
      const content = newEntry.value.trim();
      if (!content) return;
      closeNewEntry();
      await addDoc(entriesRef, {
        content,
        createdAt: serverTimestamp(),
        sortTime: serverTimestamp(),
        owner: currentUserEmail,
        shared: false
      });
    }

    async function rescueEntry(id) {
      await updateDoc(doc(db, 'entries', id), { sortTime: serverTimestamp() });
    }

    async function removeEntry(id) {
      await deleteDoc(doc(db, 'entries', id));
    }

    // ── Event listeners ──
    const cancelNewBtn = document.getElementById('cancel-new');
    const newCheckboxBtn = document.getElementById('new-checkbox-btn');
    const newBulletBtn = document.getElementById('new-bullet-btn');
    const newEscHint = document.getElementById('new-esc-hint');
    newCheckboxBtn.innerHTML = ICON.checkbox;
    newCheckboxBtn.addEventListener('click', (e) => { e.preventDefault(); toggleCheckboxMarker(newEntry); });
    newBulletBtn.innerHTML = ICON.bulletList;
    newBulletBtn.addEventListener('click', (e) => { e.preventDefault(); toggleBulletMarker(newEntry); });

    function closeNewEntry() {
      newEntry.value = '';
      newEntry.style.height = 'auto';
      newEscHint.textContent = '';
      inputArea.classList.remove('open');
      toggleNewBtn.classList.remove('active');
    }

    appendBtn.addEventListener('click', appendEntry);
    cancelNewBtn.addEventListener('click', () => closeNewEntry());

    newEntry.addEventListener('input', () => {
      newEntry.style.height = 'auto';
      newEntry.style.height = newEntry.scrollHeight + 'px';
    });

    let newEscPending = false;
    newEntry.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        appendEntry();
      } else if (e.key === 'Enter') {
        handleListContinuation(e, newEntry);
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        if (!newEntry.value.trim() || newEscPending) {
          closeNewEntry();
          newEscPending = false;
        } else {
          newEscPending = true;
          newEscHint.textContent = 'Esc again to discard';
          setTimeout(() => { newEscPending = false; newEscHint.textContent = ''; }, 3000);
        }
      }
    });

    searchInput.addEventListener('input', (e) => {
      currentFilter = e.target.value;
      renderEntries();
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        currentFilter = '';
        searchArea.classList.remove('open');
        toggleSearchBtn.classList.remove('active');
        renderEntries();
      }
    });

    // ── Service worker ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
